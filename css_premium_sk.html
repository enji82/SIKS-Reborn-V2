<style>
/* 
   ======================================================================
   SULTAN MASTER SYSTEM (SMS) v8.0 - THE EXECUTIVE DESIGN SYSTEM
   Format: CSS Core | Scope: Global Dashboard
   
   ╔══════════════════════════════════════════════════════════════════╗
   ║          PANDUAN MAINTENANCE - SATU PINTU KENDALI               ║
   ╠══════════════════════════════════════════════════════════════════╣
   ║ WARNA UTAMA       → ubah  --sk-primary                          ║
   ║ WARNA HEADER TBL  → ubah  --sk-header-color                     ║
   ║ UKURAN FONT HEADER → ubah --sk-size-header                      ║
   ║ UKURAN FONT ISI   → ubah  --sk-size-body-main                   ║
   ║ UKURAN FONT SUB   → ubah  --sk-size-body-sub                    ║
   ║ UKURAN FONT FILTER → ubah --sk-size-filter                      ║
   ║ UKURAN FONT BADGE → ubah  --sk-size-badge                       ║
   ║ TINGGI BARIS TBL  → ubah  --sk-table-py                         ║
   ║ WARNA BADGE STATUS → ubah variabel --sk-badge-*                 ║
   ║ SUDUT ROUNDED     → ubah  --sk-radius-card / --sk-radius-badge  ║
   ║ KECEPATAN ANIMASI → ubah  --sk-transition-speed                 ║
   ╚══════════════════════════════════════════════════════════════════╝
   ======================================================================
*/

/* 1. ROOT VARIABLES & DESIGN TOKENS (v8.0 - Full Design System) */
:root {
    /* ── WARNA DASAR ─────────────────────────────────────────────── */
    --sk-primary:        #3C50E0;   /* Warna aksen utama (biru eksekutif) */
    --sk-surface:        #FFFFFF;   /* Latar kartu/modal */
    --sk-section:        #F8FAFC;   /* Latar header tabel / section */
    --sk-border:         #E2E8F0;   /* Warna garis pembatas */
    --sk-text:           #1C2434;   /* Warna teks utama */
    --sk-text-muted:     #64748B;   /* Warna teks sekunder/sub */
    --sk-input-bg:       #FFFFFF;   /* Latar input & select */
    --sk-input-border:   #E2E8F0;   /* Border input & select */
    --sk-overlay:        rgba(15, 23, 42, 0.4); /* Overlay modal */

    /* ── TIPOGRAFI ───────────────────────────────────────────────── */
    --sk-header-color:   #3C50E0;   /* Warna font header tabel */
    --sk-size-header:    12px;      /* Ukuran font header tabel */
    --sk-size-body-main: 14px;      /* Ukuran font isi baris utama (nama) */
    --sk-size-body-sub:  12px;      /* Ukuran font isi baris sekunder (NPSN) */
    --sk-size-filter:    12px;      /* Ukuran font dropdown filter */
    --sk-size-badge:     10px;      /* Ukuran font badge status */

    /* ── SPASI TABEL ─────────────────────────────────────────────── */
    --sk-table-py:       0.75rem;   /* Padding vertikal sel tabel (py-3) */
    --sk-table-px:       1rem;      /* Padding horizontal sel tabel (px-4) */

    /* ── WARNA BADGE STATUS ──────────────────────────────────────── */
    --sk-badge-approved-bg:     #ECFDF5;  /* Latar badge Disetujui (light) */
    --sk-badge-approved-text:   #059669;  /* Teks badge Disetujui (light) */
    --sk-badge-approved-border: #A7F3D0;  /* Border badge Disetujui (light) */

    --sk-badge-revision-bg:     #EFF6FF;  /* Latar badge Revisi (light) */
    --sk-badge-revision-text:   #2563EB;  /* Teks badge Revisi (light) */
    --sk-badge-revision-border: #BFDBFE;  /* Border badge Revisi (light) */

    --sk-badge-rejected-bg:     #FFF1F2;  /* Latar badge Ditolak (light) */
    --sk-badge-rejected-text:   #E11D48;  /* Teks badge Ditolak (light) */
    --sk-badge-rejected-border: #FECDD3;  /* Border badge Ditolak (light) */

    --sk-badge-process-bg:      #FFFBEB;  /* Latar badge Proses (light) */
    --sk-badge-process-text:    #D97706;  /* Teks badge Proses (light) */
    --sk-badge-process-border:  #FDE68A;  /* Border badge Proses (light) */

    /* ── BORDER RADIUS ───────────────────────────────────────────── */
    --sk-radius-card:    16px;      /* Radius sudut kartu/panel */
    --sk-radius-badge:   9999px;    /* Radius sudut badge (pill) */
    --sk-radius-input:   12px;      /* Radius sudut input & tombol */
    --sk-radius-modal:   24px;      /* Radius sudut modal */

    /* ── ANIMASI & TRANSISI ──────────────────────────────────────── */
    --sk-transition-speed: 0.2s;    /* Kecepatan animasi hover/transisi global */
}

/* SEMANTIC UTILITY CLASSES (Gunakan ini, jangan hardcode angka) */
.sk-text-header   { color: var(--sk-header-color) !important; font-size: var(--sk-size-header) !important; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.sk-text-body-main{ font-size: var(--sk-size-body-main) !important; font-weight: 700; }
.sk-text-body-sub { font-size: var(--sk-size-body-sub) !important; font-weight: 400; }
.sk-text-filter   { font-size: var(--sk-size-filter) !important; font-weight: 700; }
.sk-text-badge    { font-size: var(--sk-size-badge) !important; font-weight: 900; }
.sk-cell-padding  { padding-top: var(--sk-table-py) !important; padding-bottom: var(--sk-table-py) !important; padding-left: var(--sk-table-px) !important; padding-right: var(--sk-table-px) !important; }

/* BADGE SEMANTIC CLASSES (Warna dikendalikan dari variabel di atas) */
.sk-badge-approved { background: var(--sk-badge-approved-bg) !important; color: var(--sk-badge-approved-text) !important; border: 2px solid var(--sk-badge-approved-border) !important; }
.sk-badge-revision { background: var(--sk-badge-revision-bg) !important; color: var(--sk-badge-revision-text) !important; border: 2px solid var(--sk-badge-revision-border) !important; }
.sk-badge-rejected { background: var(--sk-badge-rejected-bg) !important; color: var(--sk-badge-rejected-text) !important; border: 2px solid var(--sk-badge-rejected-border) !important; }
.sk-badge-process  { background: var(--sk-badge-process-bg) !important;  color: var(--sk-badge-process-text) !important;  border: 2px solid var(--sk-badge-process-border) !important; }

.dark {
    /* ── WARNA DASAR (DARK MODE) ─────────────────────────────────── */
    --sk-surface:        #1B2431;
    --sk-section:        #24303F;
    --sk-border:         rgba(255, 255, 255, 0.05);
    --sk-text:           #FFFFFF;
    --sk-text-muted:     #AEB7C0;
    --sk-input-bg:       rgba(255, 255, 255, 0.02);
    --sk-input-border:   rgba(255, 255, 255, 0.1);
    --sk-overlay:        rgba(0, 0, 0, 0.7);
    --sk-header-color:   #60A5FA;   /* Lebih terang untuk visibilitas dark mode */

    /* ── WARNA BADGE STATUS (DARK MODE) ─────────────────────────── */
    --sk-badge-approved-bg:     rgba(5, 150, 105, 0.15);
    --sk-badge-approved-text:   #34D399;
    --sk-badge-approved-border: rgba(52, 211, 153, 0.3);

    --sk-badge-revision-bg:     rgba(37, 99, 235, 0.15);
    --sk-badge-revision-text:   #60A5FA;
    --sk-badge-revision-border: rgba(96, 165, 250, 0.3);

    --sk-badge-rejected-bg:     rgba(225, 29, 72, 0.15);
    --sk-badge-rejected-text:   #FB7185;
    --sk-badge-rejected-border: rgba(251, 113, 133, 0.3);

    --sk-badge-process-bg:      rgba(217, 119, 6, 0.15);
    --sk-badge-process-text:    #FBBF24;
    --sk-badge-process-border:  rgba(251, 191, 36, 0.3);
}

/* 2. ANIMATIONS (SHIMMER & REVEAL) */
@keyframes sms-reveal {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes sk-shimmer {
    0% { background-position: -468px 0; }
    100% { background-position: 468px 0; }
}

.sk-shimmer {
    background: #f6f7f8;
    background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
    background-repeat: no-repeat;
    background-size: 800px 104px; 
    display: inline-block;
    position: relative; 
    animation: sk-shimmer 1.2s linear infinite forwards;
}

.dark .sk-shimmer {
    background: #24303F;
    background-image: linear-gradient(to right, #24303F 0%, #2C3A4B 20%, #24303F 40%, #24303F 100%);
}

.sms-reveal {
    animation: sms-reveal 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* 3. LAYOUT & TYPOGRAPHY SCOPE */
.sms-layout-root {
    display: block !important;
    width: 100% !important;
    min-height: 200px !important;
    opacity: 1 !important;
    visibility: visible !important;
}

#sultan-master-scope, 
#sultan-master-scope h1, 
#sultan-master-scope h2, 
#sultan-master-scope span, 
#sultan-master-scope div, 
#sultan-master-scope select, 
#sultan-master-scope button, 
#sultan-master-scope table {
/* GLOBAL TYPOGRAPHY - ONE DOOR SYSTEM */
body, table, input, select, textarea, button, .sms-layout-root {
    font-family: 'Satoshi', 'Inter', sans-serif !important;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* 4. EXECUTIVE HEADER & BREADCRUMB */
header.sms-header-group { 
    display: flex !important; 
    flex-direction: column !important; 
    margin-bottom: 24px !important; 
    gap: 4px !important;
}

.sms-header-title {
    font-size: 22px !important; 
    font-weight: 900 !important;
    color: var(--sk-text) !important;
    letter-spacing: -0.01em !important;
    line-height: 1 !important;
    text-transform: uppercase !important;
    margin: 0 !important;
}

.sk-form-label {
    display: block !important;
    font-size: 10px !important;
    font-weight: 900 !important;
    color: var(--sk-text-muted) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
    margin-bottom: 6px !important;
    padding-left: 2px !important;
}

.sms-header-underline {
    width: 250px !important;
    height: 3px !important;
    background: linear-gradient(to right, var(--sk-primary) 0%, rgba(60, 80, 224, 0.4) 50%, transparent 100%) !important;
    border-radius: 99px !important;
    margin-top: 8px !important;
    opacity: 0.8 !important;
}

/* 5. SULTAN CARD SYSTEM (v32.0) */
.sms-table-card {
    background-color: var(--sk-surface) !important;
    border-radius: 16px !important;
    border: 1px solid var(--sk-border) !important;
    overflow: hidden !important;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05) !important;
}

.sms-breadcrumb {
    display: none !important; /* Managed by Global Nav */
}

/* 6. SULTAN ALERT SYSTEM (BLUEPRINT v7.0) */
.sk-alert-blue {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px; border-radius: 12px;
    background: rgba(239, 246, 255, 0.05) !important; 
    border: 1px solid rgba(191, 219, 254, 0.15) !important;
    border-left: 5px solid var(--sk-primary) !important;
    color: var(--sk-primary) !important; 
    box-shadow: 0 4px 12px rgba(29, 78, 216, 0.03);
    transition: all 0.3s ease;
}

.dark .sk-alert-blue {
    background: rgba(30, 64, 175, 0.08) !important;
    border-color: rgba(30, 64, 175, 0.2) !important;
    color: #60A5FA !important;
}

/* 7. SULTAN TYPOGRAPHY UTILITIES (v61.0) */
.sms-badge-mini-action {
    background: linear-gradient(135deg, var(--sk-primary) 0%, #1E40AF 100%) !important;
    color: #FFFFFF !important;
    padding: 2px 8px !important;
    border-radius: 6px !important;
    font-size: 11px !important;
    font-weight: 900 !important;
    display: inline-flex !important;
    align-items: center !important;
    vertical-align: middle !important;
    box-shadow: 0 4px 10px rgba(60, 80, 224, 0.4) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    margin: 0 4px !important;
    border: none !important;
}

.sms-text-soft-danger {
    color: #FB7185 !important; /* Premium Rose Glow */
    font-weight: 800 !important;
    letter-spacing: 0.02em !important;
}

/* 8. EXECUTIVE MODAL SYSTEM (v63.1 - Z-SUPREMACY) */
.sk-modal-overlay {
    position: fixed !important; inset: 0 !important;
    z-index: 1000000 !important; /* Above everything including sidebars on mobile */
    background: rgba(15, 23, 42, 0.85) !important;
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
    transition: all 0.3s ease !important;
    display: none; /* Default Hidden */
}

.sk-modal-overlay.active {
    display: flex !important;
}

.sk-modal-box {
    background: var(--sk-surface) !important;
    border-radius: 24px !important;
    border: 1px solid var(--sk-border) !important;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
    max-height: 90vh;
    animation: sk-modal-reveal 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

@keyframes sk-modal-reveal {
    from { opacity: 0; transform: translateY(30px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* CONTEXTUAL BRANDED HEADERS (SULTAN SHIMMER) */
.sk-modal-header-primary {
    background: linear-gradient(135deg, #3C50E0 0%, #1E40AF 100%) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 23px 23px 0 0 !important; /* Fix corner leak */
}

.sk-modal-header-warning {
    background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 23px 23px 0 0 !important;
}

.sk-modal-header-danger {
    background: linear-gradient(135deg, #FB7185 0%, #E11D48 100%) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 23px 23px 0 0 !important;
}

.sk-modal-header-success {
    background: linear-gradient(135deg, #10B981 0%, #059669 100%) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    border-radius: 23px 23px 0 0 !important;
}

.sk-modal-title {
    color: #FFFFFF !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.15em !important;
    font-size: 15px !important;
    display: flex; align-items: center; gap: 12px;
}

.sk-modal-close {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255, 255, 255, 0.1) !important;
    color: #FFFFFF !important; border: none !important;
    transition: all 0.2s !important;
    cursor: pointer !important;
}

.sk-modal-close:hover { background: rgba(255, 255, 255, 0.2) !important; transform: rotate(90deg); }

.sk-modal-body {
    padding: 24px 32px !important;
    background: var(--sk-surface) !important;
}

.sk-modal-footer {
    padding: 18px 32px !important;
    border-top: 1px solid var(--sk-border) !important;
    background: var(--sk-section) !important;
    display: flex; justify-content: flex-end; gap: 12px;
    border-radius: 0 0 24px 24px;
}

/* VERIFICATION PANEL SYSTEM (v71.0 Adaptive Harmony) */
.sk-modal-panel-right {
    background: var(--sk-surface) !important;
    border-left: 1px solid var(--sk-border) !important;
    display: flex; flex-direction: column;
}

.sk-verif-identity-box {
    background: var(--sk-section) !important;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--sk-border);
}

/* Modal Body Adaptive Force (v72.1) */
.sk-modal-body-adaptive {
    background: var(--sk-surface) !important;
    flex: 1; display: flex; flex-direction: column;
}

.sk-verif-identity-title {
    font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--sk-primary); border-bottom: 2px solid rgba(60, 80, 224, 0.1);
    padding-bottom: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}

.dark .sk-verif-identity-title {
    color: #10B981 !important; border-bottom-color: rgba(16, 185, 129, 0.2);
}

.sk-verif-row {
    display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px;
}

.sk-verif-label {
    font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--sk-text-muted); letter-spacing: 0.05em;
}

.sk-verif-value {
    font-size: 14px; font-weight: 700; color: var(--sk-text); font-family: 'Satoshi', sans-serif;
}

.dark .sk-verif-value {
    color: #FFFFFF !important;
}

/* Fix for Left Space Gap - Cinematic Black */
.sk-preview-container {
    flex: 1; position: relative; background: #000000; overflow: hidden;
}

.sk-preview-iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: none;
}

/* 7. SULTAN GLOBAL ACTION SYSTEM (v58.0 - Cache Bust) */
.sms-btn-premium-action {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    height: 42px !important;
    padding: 0 24px !important;
    font-size: 13px !important;
    font-weight: 900 !important;
    color: #FFFFFF !important;
    background: linear-gradient(135deg, var(--sk-primary) 0%, #1E40AF 100%) !important;
    border: none !important;
    border-radius: 14px !important;
    box-shadow: 0 8px 20px -6px rgba(60, 80, 224, 0.6) !important;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    cursor: pointer !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    white-space: nowrap !important;
    outline: none !important;
}

.sms-btn-premium-action:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 12px 28px -6px rgba(60, 80, 224, 0.7) !important;
    filter: brightness(1.15) !important;
}

.sms-btn-premium-action:active {
    transform: translateY(-1px) scale(0.97);
    box-shadow: 0 4px 12px -2px rgba(60, 80, 224, 0.4) !important;
}

.sms-btn-premium-action:disabled {
    background: #D1D5DB !important;
    color: #9CA3AF !important;
    box-shadow: none !important;
    cursor: not-allowed !important;
    transform: none !important;
    filter: grayscale(1) opacity(0.7) !important;
}

.dark .sk-alert-blue {
    background: linear-gradient(180deg, rgba(30, 64, 175, 0.15) 0%, rgba(30, 64, 175, 0.05) 100%) !important;
    border-color: rgba(30, 64, 175, 0.2) !important;
    border-left-color: var(--sk-primary) !important;
    color: #60A5FA !important;
}

.sk-alert-danger {
    background-color: var(--sk-surface) !important;
    border-radius: 18px !important;
    border: 1px solid var(--sk-border) !important;
    overflow: hidden !important;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05) !important;
}

.sms-thead-executive tr { background-color: var(--sk-section) !important; }

.sms-th-executive {
    padding: 0 16px !important;       /* Padding horizontal dikunci agar stabil */
    height: 50px !important;           /* Tinggi dikunci agar header tidak collapse */
    min-height: 50px !important;
    font-weight: 700 !important;
    color: var(--sk-header-color) !important;  /* → ubah --sk-header-color di :root */
    background: var(--sk-section) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.05em !important;
    font-size: var(--sk-size-header) !important; /* → ubah --sk-size-header di :root */
    vertical-align: middle !important;
    border-bottom: 2px solid var(--sk-border) !important;
    white-space: nowrap !important;
}

.sms-table-executive td {
    padding: 16px !important;          /* Padding dikunci pada nilai stabil */
    vertical-align: middle !important;
    border-bottom: 1px solid var(--sk-border) !important;
    color: var(--sk-text) !important;
}

/* Gunakan sk-cell-padding untuk override padding via variabel pada halaman tertentu */

/* EXECUTIVE ROW TYPOGRAPHY (The Hierarchy Fix) */
.sk-row-title {
    font-weight: 700 !important;
    color: var(--sk-text) !important;
    line-height: 1.2 !important;
    font-size: var(--sk-size-body-main) !important;
}

.sk-row-subtitle {
    font-size: var(--sk-size-body-sub) !important;
    font-weight: 400 !important;
    color: var(--sk-text-muted) !important;
    margin-top: 4px !important;
}
.dark .sk-row-subtitle { color: #8A99AF !important; }

/* 6. SULTAN DANGER SYSTEM (v19.0) */
.sk-alert-danger {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 16px 20px; border-radius: 16px; 
    background: #FFF1F2 !important; border: 1.5px solid #FECDD3 !important;
    color: #9F1239 !important; shadow: 0 4px 6px -1px rgba(159, 18, 57, 0.05);
}

.dark .sk-alert-danger {
    background: rgba(159, 18, 57, 0.1) !important; 
    border-color: rgba(159, 18, 57, 0.2) !important;
    color: #FDA4AF !important;
}

.sk-alert-warning {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: #FFFBEB !important; border-left: 4px solid #F59E0B !important;
    color: #92400E !important; font-size: 13px;
}

.dark .sk-alert-warning {
    background: rgba(245, 158, 11, 0.05) !important;
    border-left-color: #F59E0B !important;
    color: #FCD34D !important;
}

/* 8. SULTAN COMPONENT SYSTEM (v48.0 - Distinction Refresh) */
.sms-status-tag {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 6px 12px 6px 10px !important;
    border-radius: 4px !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.05em !important;
    white-space: nowrap !important;
    text-transform: uppercase !important;
    border: 1px solid transparent !important;
}

.sms-status-success { background: rgba(16, 185, 129, 0.08) !important; color: #10B981 !important; border-left: 4px solid #10B981 !important; }
