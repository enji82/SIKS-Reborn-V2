<!-- 
  SULTAN MASTER SYSTEM (SMS) v6.0 - GOLDEN BOILERPLATE
  ---------------------------------------------------------
  This template is strictly managed by the SMS v6.0 Specification.
  DO NOT use inline Tailwind gap/typography classes for core layout.
  ---------------------------------------------------------

<div class="sms-layout-root">
    
    <!-- 1. EXECUTIVE HEADER -->
    <header class="sms-header-group">
        <h1 class="sms-header-title">[TITLE_MODULE]</h1>
        <p class="sms-header-subtitle">[DESCRIPTION_MODULE]</p>
    </header>

    <!-- 2. INFORMATION/GUIDE SECTION -->
    <section class="sms-table-card border-l-4 border-l-primary/50" x-data="{ isOpen: false }">
        <div class="py-2 px-3">
            <div class="flex items-center justify-between cursor-pointer" @click="isOpen = !isOpen">
                <div class="flex items-center text-primary font-black text-xs uppercase tracking-widest">
                    <i class="fas fa-info-circle mr-2"></i> PANDUAN PENGISIAN
                </div>
                <i class="fas text-muted transition-transform" :class="isOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </div>
            <div x-show="isOpen" x-transition class="mt-2 pt-2 border-t border-stroke dark:border-white/5 small text-body">
                <ul class="mb-0 pl-3 list-disc space-y-1">
                    <li>[GUIDE_ITEM_1]</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- 3. ACTIONS & FILTERS -->
    <section class="sms-table-card p-3 border-l-4 border-l-primary/30">
        <div class="flex flex-wrap items-center gap-3">
            <select id="[PREFIX]_filterUnit" class="rounded-xl border border-stroke bg-gray-2 dark:bg-strokedark py-1.5 px-3 text-xs font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark min-w-[200px]" disabled>
                <option value="">- Memvalidasi Akses... -</option>
            </select>

            <button type="button" id="[PREFIX]_btnRefresh" class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-primary/20 bg-primary/5 text-primary hover:bg-primary hover:text-white dark:border-white/10 dark:bg-white/5 dark:text-white transition-all shadow-sm active:scale-95">
                <i class="fab fa-gg text-xs"></i>
            </button>

            <div class="ml-auto">
                <button type="button" id="[PREFIX]_btnTambah" class="inline-flex items-center justify-center gap-2 rounded-xl bg-primary py-2 px-4 text-center text-xs font-bold text-white hover:bg-opacity-90 transition-all shadow-sm disabled:opacity-50" disabled>
                    <i class="fas fa-plus mr-1"></i> TAMBAH DATA
                </button>
            </div>
        </div>
    </section>

    <!-- 4. CORE DATA TABLE -->
    <section class="sms-table-card">
        <div id="[PREFIX]_tableState" style="display: none;">
            <table id="[PREFIX]_tabelUtama" class="w-full table-auto border-collapse text-xs">
                <thead>
                    <tr class="sms-thead-executive">
                        <th class="sms-th-executive text-center" style="width:120px;">AKSI</th>
                        <th class="sms-th-executive">[COL_1]</th>
                        <th class="sms-th-executive text-center text-slate-500">STATUS</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

</div>

    var [PREFIX]_TABEL_INSTANCE = null;

        [PREFIX]_tarikDataServer();
    });

        // [PREFIX]_TABEL_INSTANCE initialization code goes here
    }
</script>
