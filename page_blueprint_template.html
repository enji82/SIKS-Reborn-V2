<div class="flex flex-col gap-6 animate-reveal">
    
    <!-- 1. PAGE HEADER (SULTAN EXECUTIVE) -->
    <div class="mb-2 flex flex-col px-1">
        <h1 class="text-2xl md:text-3xl font-black text-black dark:text-white tracking-tight leading-tight sultan-title-sync">
            [TITLE_MODUL]
        </h1>
        <p class="text-xs font-bold text-primary dark:text-primary/70 uppercase tracking-widest mt-1">
            [SUBTITLE_DESCRIPTION_MODUL]
        </p>
    </div>

    <!-- 2. INFORMATION CARD (Collapsible) -->
    <div class="sultan-card group mb-0" x-data="{ isOpen: false }">
      <div class="py-2 px-3 border-l-4 border-l-primary/50">
        <div class="flex items-center justify-between cursor-pointer" @click="isOpen = !isOpen">
          <div class="flex items-center text-primary font-black text-xs uppercase tracking-widest">
            <i class="fas fa-info-circle mr-2"></i> PANDUAN PENGISIAN
          </div>
          <i class="fas text-muted transition-transform" :class="isOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </div>
        <div x-show="isOpen" x-transition class="mt-2 pt-2 border-t border-stroke dark:border-white/5 small text-body">
          <ul class="mb-0 pl-3 list-disc space-y-1">
            <li>[PANDUAN_ITEM_1]</li>
            <li>[PANDUAN_ITEM_2]</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 3. FILTER & ACTION CARD -->
    <div class="sultan-card p-2 md:p-3 shadow-sm border-l-4 border-l-primary/30">
        <div class="flex flex-wrap items-center gap-2 md:gap-3">
            <!-- Example Filter: Unit -->
            <select id="[MODUL]_filterUnit" class="rounded-xl border border-stroke bg-gray-2 dark:bg-strokedark py-1.5 px-3 text-xs font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark min-w-[200px]" disabled>
                <option value="">- Memvalidasi Akses... -</option>
            </select>

            <!-- Refresh Button -->
            <button type="button" id="[MODUL]_btnRefresh" class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-primary/20 bg-primary/5 text-primary hover:bg-primary hover:text-white dark:border-white/10 dark:bg-white/5 dark:text-white transition-all shadow-sm active:scale-95" title="Refresh Data">
                <i class="fab fa-gg text-xs"></i>
            </button>

            <!-- Primary Action -->
            <div class="ml-auto">
                <button type="button" id="[MODUL]_btnTambah" class="inline-flex items-center justify-center gap-2 rounded-xl bg-primary py-2 px-4 text-center text-xs font-bold text-white hover:bg-opacity-90 transition-all shadow-sm disabled:opacity-50" disabled>
                    <i class="fas fa-plus mr-1"></i> TAMBAH DATA
                </button>
            </div>
        </div>
    </div>

    <!-- 4. DATA TABLE AREA -->
    <div class="sultan-card overflow-hidden">
        <div class="p-0">
            <!-- Loading State -->
            <div id="[MODUL]_loadingState">
              <div class="flex flex-col items-center justify-center py-20">
                <div class="h-16 w-16 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
                <h6 class="mt-5 font-bold text-black dark:text-white uppercase tracking-widest text-[11px]">Sinkronisasi Data...</h6>
              </div>
            </div>

            <!-- Table State -->
            <div id="tugas_tableState" style="display: none;">
                <table id="tugas_tabelUtama" class="w-full table-auto border-collapse text-xs">
                    <thead>
                        <tr class="bg-gray-2 dark:bg-white/5 text-left border-b border-stroke dark:border-white/5">
                            <th class="py-4 px-6 font-black text-black dark:text-white text-center uppercase tracking-widest text-[11px]" style="width:120px;">AKSI</th>
                            <th class="py-4 px-4 font-black text-black dark:text-white uppercase tracking-widest text-[11px]">[COL_HEADER_1]</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
