<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div class="login-screen-wrapper">

  <style>
    /* ========================================================= */
    /* PREMIUM SAAS THEME (CLEAN & MINIMALIST)                   */
    /* ========================================================= */

    :root {
      --saas-primary: #4F46E5; /* Deep Indigo */
      --saas-primary-hover: #4338CA;
      --saas-bg: #F8FAFC; /* Off-white */
      --saas-card: #FFFFFF;
      --saas-border: #E2E8F0;
      --saas-text-main: #0F172A;
      --saas-text-muted: #64748B;
    }

    /* FIX Z-INDEX SWEETALERT (Hanya untuk Error) */
    .swal2-container { z-index: 2147483647 !important; }

    /* WRAPPER */
    .login-screen-wrapper {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--saas-bg);
      font-family: 'Inter', -apple-system, sans-serif;
      z-index: 9999; overflow: auto; 
    }

    /* LOGIN BOX */
    .login-box {
      width: 420px; max-width: 90%; position: relative; z-index: 10;
      opacity: 0; animation: zoomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .card-saas {
      background: var(--saas-card);
      border: 1px solid var(--saas-border);
      border-radius: 20px; 
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05), 0 2px 10px rgba(0,0,0,0.02);
      overflow: hidden; transition: all 0.5s ease;
      color: var(--saas-text-main);
    }

    .card-header-premium {
      background: var(--saas-card);
      padding: 40px 30px 20px; text-align: center;
      position: relative; z-index: 2;
    }

    .logo-container {
      width: 70px; height: 70px; background: var(--saas-card); border-radius: 16px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
      border: 1px solid var(--saas-border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      color: var(--saas-primary);
    }

    .login-body { padding: 10px 35px 40px; position: relative; min-height: 250px; }

    .input-wrapper { position: relative; margin-bottom: 20px; }
    .input-wrapper i {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: #94A3B8; font-size: 16px; transition: 0.3s;
    }

    .form-control-premium {
      width: 100%; padding: 22px 15px 6px 45px; border: 1px solid var(--saas-border);
      border-radius: 10px; background: #FFFFFF; font-size: 14px; font-weight: 600;
      transition: all 0.2s ease; outline: none; color: var(--saas-text-main);
      box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);
    }
    .form-control-premium::placeholder { color: transparent; }
    .form-control-premium:focus { border-color: var(--saas-primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
    .form-control-premium:focus ~ i.fa-user-circle, .form-control-premium:focus ~ i.fa-lock { color: var(--saas-primary); }

    .input-wrapper label {
      position: absolute; left: 45px; top: 14px; color: #94A3B8; font-size: 14px;
      pointer-events: none; transition: all 0.2s ease-out; margin: 0; font-weight: 500;
    }
    .form-control-premium:focus ~ label, .form-control-premium:not(:placeholder-shown) ~ label {
      top: 6px; font-size: 10.5px; color: var(--saas-primary); font-weight: 600;
    }

    .btn-premium {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--saas-text-main); color: white; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 10px;
    }
    .btn-premium:hover { background: #000000; box-shadow: 0 6px 12px rgba(0,0,0,0.15); transform: translateY(-1px); }
    .btn-premium:disabled { background: #94A3B8; cursor: not-allowed; transform: none; box-shadow: none; }

    /* SUCCESS STATE STYLES */
    #viewSuccess {
        display: none; text-align: center; padding-top: 10px; animation: fadeIn 0.6s ease;
    }
    
    .success-avatar {
        width: 90px; height: 90px; border-radius: 50%; 
        border: 2px solid var(--saas-border);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        margin-bottom: 20px; object-fit: cover;
    }
    
    .welcome-text { font-size: 22px; font-weight: 700; color: var(--saas-text-main); margin-bottom: 5px; }
    .user-name { font-size: 15px; font-weight: 500; color: var(--saas-text-muted); margin-bottom: 20px; }
    
    .loading-bar {
        height: 4px; width: 60%; background: #E2E8F0; margin: 0 auto; border-radius: 4px; overflow: hidden;
    }
    .loading-progress {
        height: 100%; width: 0%; background: var(--saas-primary);
        animation: progressLoad 1.5s ease-in-out forwards;
    }

    .login-footer {
      text-align: center; font-size: 12px; color: var(--saas-text-muted); margin-top: 30px;
      border-top: 1px solid var(--saas-border); padding-top: 20px;
    }

    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes progressLoad { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }
    
    .shake-effect { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    
    #confetti-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2147483647; }
  </style>

  <div class="login-box">
    <div class="card-saas" id="mainCard">
      
      <div class="card-header-premium" id="cardHeader">
        <div class="logo-container" id="logoBox">
          <i class="fas fa-book-reader fa-2x"></i>
        </div>
        <div id="headerText">
            <h2 class="font-weight-bold mb-1" style="font-size: 22px; color: var(--saas-text-main);">SIKS-REBORN</h2>
            <p class="small text-muted mt-0" style="font-weight: 500; font-size: 13px;">SISTEM INFORMASI KORWIL SECANG</p>
        </div>
      </div>

      <div class="login-body">
        
        <div id="viewForm">
            <form id="formLogin" onsubmit="handleLoginExec(event)">
              <div class="input-wrapper">
                <input type="text" id="username" name="username" class="form-control-premium" placeholder="NPSN / Username" required autocomplete="off">
                <i class="fas fa-user-circle"></i>
                <label>NPSN / Username</label>
              </div>
              <div class="input-wrapper">
                <input type="password" id="password" name="password" class="form-control-premium" placeholder="Kata Sandi" required>
                <i class="fas fa-lock"></i>
                <label>Kata Sandi</label>
                <i class="fas fa-eye" id="togglePass" style="left: auto; right: 15px; font-size: 15px; cursor: pointer; z-index:5;" onclick="togglePassword()"></i>
              </div>
              <button type="submit" id="tombolLogin" class="btn-premium">
                Masuk ke Dasbor &rarr;
              </button>
            </form>
            <div class="login-footer">
              <span style="font-weight: 500;">&copy; 2026 Korwil Disdikbud Kec. Secang</span>
            </div>
        </div>

        <div id="viewSuccess">
            <img src="https://ui-avatars.com/api/?name=User&background=random" id="userAvatar" class="success-avatar">
            <h3 class="welcome-text">Selamat Datang!</h3>
            <p class="user-name" id="welcomeName">Administrator</p>
            
            <div class="loading-bar mt-3">
                <div class="loading-progress"></div>
            </div>
            <p class="small text-muted mt-2">Menyiapkan Workspace...</p>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="confetti-wrapper"></div>

<script>
  console.log("🚀 Login Page Loaded SaaS Minimalist Theme");

  function togglePassword() {
    var x = document.getElementById("password");
    var icon = document.getElementById("togglePass");
    if (x.type === "password") {
      x.type = "text"; icon.classList.remove("fa-eye"); icon.classList.add("fa-eye-slash"); icon.style.color = "var(--saas-primary)";
    } else {
      x.type = "password"; icon.classList.remove("fa-eye-slash"); icon.classList.add("fa-eye"); icon.style.color = "#94A3B8";
    }
  }

  function runFireworks() {
    if(typeof confetti !== 'undefined'){
       var duration = 3000; var animationEnd = Date.now() + duration;
       var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2147483647 };
       var interval = setInterval(function() {
         var timeLeft = animationEnd - Date.now();
         if (timeLeft <= 0) { return clearInterval(interval); }
         var particleCount = 50 * (timeLeft / duration);
         confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 }, colors: ['#4F46E5', '#3B82F6', '#10B981'] }));
       }, 250);
    }
  }

  function handleLoginExec(e) {
    e.preventDefault(); 
    var u = $('#username').val();
    var p = $('#password').val();
    var btn = $('#tombolLogin');
    var box = $('.login-box');

    // UI Loading Button
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> Mengautentikasi...');
    
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.status === 'success') {
          console.log("✅ Login Sukses");
          
          var fullName = "User";
          if (res.userData) {
             fullName = res.userData.nama_lengkap || res.userData.username;
             if(!res.userData.nama_lengkap) res.userData.nama_lengkap = res.userData.username;
             localStorage.setItem("siksUser", JSON.stringify(res.userData));
          }

          runFireworks();

          $('#welcomeName').text(fullName);
          var avatarUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(fullName) + "&background=F1F5F9&color=0F172A&bold=true";
          if(res.userData && res.userData.photo && res.userData.photo.startsWith("http")) avatarUrl = res.userData.photo;
          else if(res.userData && res.userData.photo) avatarUrl = "https://drive.google.com/thumbnail?id=" + res.userData.photo + "&sz=200";
          $('#userAvatar').attr('src', avatarUrl);

          $('#logoBox').css('transform', 'scale(0.8)');
          $('#headerText').slideUp(300); 
          $('.card-header-premium').css('padding-bottom', '10px');

          $('#viewForm').fadeOut(300, function() {
              $('#viewSuccess').fadeIn(500);
          });

          setTimeout(function(){
            if(typeof updateNavbarUI === 'function' && res.userData) {
                updateNavbarUI(res.userData);
            }
            $('.login-screen-wrapper').fadeOut(600, function(){
                $('#konten-aplikasi').fadeIn(600); 
                if(typeof loadContent === 'function') {
                    loadContent('home'); 
                }
                $(window).trigger('resize');
            });
          }, 2000);

        } else {
          console.log("⛔ Login Gagal: " + res.message);
          btn.prop('disabled', false).html('Masuk ke Dasbor &rarr;');
          
          box.addClass('shake-effect');
          setTimeout(() => box.removeClass('shake-effect'), 500);
          
          if(typeof Swal !== 'undefined'){
              const Toast = Swal.mixin({
                toast: true, position: 'top', showConfirmButton: false, timer: 3000,
                timerProgressBar: true, background: '#fff', color: '#333', iconColor: '#EF4444',
                didOpen: (toast) => { toast.addEventListener('mouseenter', Swal.stopTimer); toast.addEventListener('mouseleave', Swal.resumeTimer); }
              });
              Toast.fire({ icon: 'error', title: 'Akses Ditolak', text: res.message || "Kredensial tidak sesuai." });
          } else {
              alert("LOGIN GAGAL: " + (res.message || "Username/Password Salah"));
          }
        }
      })
      .withFailureHandler(function(err) {
        btn.prop('disabled', false).html('Masuk ke Dasbor &rarr;');
        alert("Koneksi Server Terputus!");
      })
      .processLogin({username: u, password: p});
  }
</script>
