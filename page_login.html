<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* ================================================================
   LOGIN PAGE — Maroon Heritage Theme
   Selaras dengan sidebar & navbar SIKS-Reborn
   ================================================================ */

.swal2-container { z-index: 2147483647 !important; }

.login-screen-wrapper {
  position: fixed; inset: 0; display: flex; align-items: center;
  justify-content: center; z-index: 9999; overflow: auto;
  /* Background: subtle maroon gradient ala premium */
  background: linear-gradient(135deg, #6B0000 0%, #3A0000 50%, #1a0000 100%);
}

/* Partikel dekoratif di background */
.login-screen-wrapper::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(234,201,71,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04) 0%, transparent 35%);
  pointer-events: none;
}

/* Kartu login */
.login-box {
  width: 420px; max-width: 93vw; position: relative; z-index: 10;
  animation: loginZoom 0.55s cubic-bezier(0.16,1,0.3,1) both;
}

.card-login {
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.2);
}

/* ---- Header Maroon ---- */
.login-header {
  background: linear-gradient(160deg, #8B0000 0%, #5A0000 100%);
  padding: 2.2rem 2rem 1.8rem;
  text-align: center;
  position: relative;
}
.login-header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 20px;
  background: #fff;
  border-radius: 20px 20px 0 0;
}

/* Logo bulat */
.login-logo-ring {
  width: 76px; height: 76px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.login-logo-ring i { font-size: 2rem; color: #EAC947; }

.login-title {
  font-size: 1.4rem; font-weight: 800; color: #fff;
  letter-spacing: 1px; margin-bottom: 0.15rem;
}
.login-subtitle {
  font-size: 0.73rem; color: rgba(255,255,255,0.6);
  font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
}

/* ---- Form Body ---- */
.login-body {
  padding: 2rem 2rem 1.5rem;
  min-height: 220px;
}

/* Field floating label */
.field-group {
  position: relative; margin-bottom: 1.1rem;
}
.field-group .field-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: #94A3B8; font-size: 0.95rem; pointer-events: none;
  transition: color 0.2s;
}
.field-input {
  width: 100%; padding: 1.35rem 2.8rem 0.55rem 2.6rem;
  border: 1.5px solid #E2E8F0; border-radius: 12px;
  font-size: 0.9rem; font-weight: 600; color: #0F172A;
  background: #FAFAFA; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-sizing: border-box;
}
.field-input::placeholder { color: transparent; }
.field-input:focus {
  border-color: #8B0000;
  box-shadow: 0 0 0 3px rgba(139,0,0,0.1);
  background: #fff;
}
.field-input:focus ~ .field-icon { color: #8B0000; }

.field-label {
  position: absolute; left: 2.6rem; top: 1rem;
  font-size: 0.88rem; color: #94A3B8; font-weight: 500;
  pointer-events: none;
  transition: all 0.18s ease-out;
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 0.42rem; font-size: 0.68rem; color: #8B0000; font-weight: 700;
}

/* Toggle password */
.toggle-pass {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: #94A3B8; font-size: 0.9rem; cursor: pointer;
  transition: color 0.2s;
}
.toggle-pass:hover { color: #8B0000; }

/* Tombol login */
.btn-login {
  width: 100%; padding: 0.85rem;
  background: linear-gradient(135deg, #8B0000 0%, #5A0000 100%);
  color: #fff; border: none; border-radius: 12px;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer; margin-top: 0.3rem;
  box-shadow: 0 6px 20px rgba(139,0,0,0.35);
  transition: opacity 0.2s, transform 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.btn-login:hover:not(:disabled) {
  opacity: 0.9; transform: translateY(-1px);
}
.btn-login:disabled {
  opacity: 0.65; cursor: not-allowed; transform: none;
}

/* Footer */
.login-footer {
  text-align: center; font-size: 0.72rem; color: #94A3B8;
  padding: 1rem 2rem 1.5rem;
  border-top: 1px solid #F1F5F9;
}

/* ---- Success State ---- */
#viewSuccess {
  display: none; text-align: center;
  padding: 0.5rem 0 1rem;
  animation: fadeInUp 0.5s ease both;
}
.success-avatar {
  width: 88px; height: 88px; border-radius: 50%; object-fit: cover;
  border: 3px solid rgba(139,0,0,0.2);
  box-shadow: 0 6px 20px rgba(139,0,0,0.15);
  margin-bottom: 1rem;
}
.welcome-text { font-size: 1.3rem; font-weight: 800; color: #0F172A; margin-bottom: 0.2rem; }
.user-name { font-size: 0.9rem; color: #64748B; margin-bottom: 1.2rem; }
.progress-bar-wrap {
  height: 4px; background: #F1F5F9;
  border-radius: 4px; overflow: hidden;
  margin: 0 auto; width: 65%;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #8B0000, #EAC947);
  width: 0%; border-radius: 4px;
  animation: barFill 2s ease forwards;
}

/* ---- Animasi ---- */
@keyframes loginZoom {
  from { opacity: 0; transform: scale(0.94) translateY(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes barFill {
  0%   { width: 0%; }
  100% { width: 100%; }
}
@keyframes loginShake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-5px); }
  80%      { transform: translateX(4px); }
}
.shake-effect { animation: loginShake 0.4s ease both; }

#confetti-wrapper {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index: 2147483647;
}
</style>

<!-- ===== STRUKTUR HTML LOGIN ===== -->
<div class="login-screen-wrapper">
  <div class="login-box">
    <div class="card-login" id="cardLogin">

      <!-- Header Maroon -->
      <div class="login-header">
        <div class="login-logo-ring">
          <i class="fas fa-cube"></i>
        </div>
        <div class="login-title">SIKS-REBORN</div>
        <div class="login-subtitle">Sistem Informasi Korwil Disdikbud Secang</div>
      </div>

      <!-- Body Form -->
      <div class="login-body">

        <!-- VIEW: Form Login -->
        <div id="viewForm">
          <form id="formLogin" onsubmit="handleLoginExec(event)" autocomplete="off">

            <!-- Field Username -->
            <div class="field-group">
              <input type="text" id="username" name="username"
                     class="field-input" placeholder="NPSN / Username" required>
              <label class="field-label" for="username">NPSN / Username</label>
              <i class="fas fa-user field-icon"></i>
            </div>

            <!-- Field Password -->
            <div class="field-group">
              <input type="password" id="password" name="password"
                     class="field-input" placeholder="Kata Sandi" required>
              <label class="field-label" for="password">Kata Sandi</label>
              <i class="fas fa-lock field-icon"></i>
              <i class="fas fa-eye toggle-pass" id="togglePass" onclick="togglePassword()"></i>
            </div>

            <!-- Tombol Masuk -->
            <button type="submit" id="tombolLogin" class="btn-login">
              <i class="fas fa-sign-in-alt"></i>
              <span id="btnLoginText">Masuk ke Dasbor</span>
            </button>
          </form>
        </div>

        <!-- VIEW: Success -->
        <div id="viewSuccess">
          <img id="userAvatar"
               src="https://ui-avatars.com/api/?name=User&background=8B0000&color=fff"
               class="success-avatar" alt="Avatar">
          <div class="welcome-text">Selamat Datang! 👋</div>
          <div class="user-name" id="welcomeName">Administrator</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill"></div>
          </div>
          <p style="font-size:0.75rem; color:#94A3B8; margin-top:0.6rem;">
            Menyiapkan workspace...
          </p>
        </div>

      </div><!-- /login-body -->

      <!-- Footer -->
      <div class="login-footer">
        Copyright &copy; 2026 Korwil Disdikbud Kecamatan Secang. All rights reserved. (v2.0)
      </div>

    </div><!-- /card-login -->
  </div><!-- /login-box -->
</div>

<div id="confetti-wrapper"></div>

<script>
  /* ---- Toggle Lihat Password ---- */
  function togglePassword() {
    var inp  = document.getElementById('password');
    var icon = document.getElementById('togglePass');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.classList.replace('fa-eye','fa-eye-slash');
      icon.style.color = '#8B0000';
    } else {
      inp.type = 'password';
      icon.classList.replace('fa-eye-slash','fa-eye');
      icon.style.color = '#94A3B8';
    }
  }

  /* ---- Konfeti login sukses ---- */
  function runFireworks() {
    if (typeof confetti === 'undefined') return;
    var end = Date.now() + 2500;
    var colors = ['#8B0000','#EAC947','#fff','#ff6b6b'];
    (function frame() {
      confetti({ particleCount: 4, angle: 60,  spread: 55, origin: { x: 0 }, colors: colors, zIndex: 2147483647 });
      confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: colors, zIndex: 2147483647 });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  /* ---- Handler Login ---- */
  function handleLoginExec(e) {
    e.preventDefault();
    var u   = $('#username').val().trim();
    var p   = $('#password').val();
    var btn = $('#tombolLogin');
    if (!u || !p) return;

    btn.prop('disabled', true);
    $('#btnLoginText').text('Mengautentikasi...');
    btn.prepend('<i class="fas fa-spinner fa-spin" id="spinIcon"></i> ');

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.status === 'success') {

          /* Simpan user ke localStorage (Sultan v2 Format) */
          if (res.userData) {
            if (!res.userData.nama_lengkap) res.userData.nama_lengkap = res.userData.username;
            localStorage.setItem('sultan_siksUser', JSON.stringify(res.userData));
            localStorage.setItem('siksUser', JSON.stringify(res.userData)); // Legacy Sync
          }

          var fullName = (res.userData && res.userData.nama_lengkap) ? res.userData.nama_lengkap : 'User';
          var avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(fullName) + '&background=8B0000&color=fff&bold=true';
          if (res.userData && res.userData.photo) {
            avatarUrl = res.userData.photo.startsWith('http')
              ? res.userData.photo
              : 'https://drive.google.com/thumbnail?id=' + res.userData.photo + '&sz=200';
          }

          $('#userAvatar').attr('src', avatarUrl);
          $('#welcomeName').text(fullName);

          runFireworks();

          /* Ganti ke view sukses */
          $('#viewForm').fadeOut(280, function() {
            $('#viewSuccess').fadeIn(400);
          });

          /* Setelah animasi sukses, masuk ke dashboard */
          setTimeout(function() {
            $('.login-screen-wrapper').fadeOut(450, function() {
              /* Biarkan inisialisasiAplikasi() yang mengatur segalanya —
                 updateUI, tampilkanMenuAdmin, loadContent('home') — 
                 sehingga urutan selalu benar dan tidak ada race condition */
              if (typeof inisialisasiAplikasi === 'function') {
                inisialisasiAplikasi();
              } else {
                /* Fallback jika fungsi utama belum siap */
                $('#konten-aplikasi').fadeIn(400);
                if (typeof updateUI === 'function' && res.userData) updateUI(res.userData);
                if (typeof loadContent === 'function') loadContent('home');
              }
            });
          }, 2200);

        } else {
          /* Login gagal */
          btn.prop('disabled', false);
          $('#btnLoginText').text('Masuk ke Dasbor');
          $('#spinIcon').remove();
          $('.login-box').addClass('shake-effect');
          setTimeout(function() { $('.login-box').removeClass('shake-effect'); }, 500);

          if (typeof Swal !== 'undefined') {
            Swal.mixin({
              toast: true, position: 'top', showConfirmButton: false,
              timer: 3500, timerProgressBar: true
            }).fire({ icon: 'error', title: res.message || 'Username atau Password salah.' });
          } else {
            alert('LOGIN GAGAL: ' + (res.message || 'Kredensial tidak sesuai.'));
          }
        }
      })
      .withFailureHandler(function(err) {
        btn.prop('disabled', false);
        $('#btnLoginText').text('Masuk ke Dasbor');
        $('#spinIcon').remove();
        alert('Koneksi server terputus. Coba lagi.');
      })
      .processLogin({ username: u, password: p });
  }
</script>
