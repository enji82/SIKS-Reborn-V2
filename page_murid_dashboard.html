<div class="flex flex-col gap-2 md:gap-3 animate-reveal">
    
  <!-- 1. FILTER PERIODE -->
  <div class="sultan-card p-3 shadow-sm">
    <div class="flex flex-wrap items-center justify-center gap-4">
        <div class="flex items-center gap-2">
            <label class="text-sm font-bold text-primary flex items-center gap-2">
                <i class="fas fa-calendar-alt"></i> Periode:
            </label>
            <select id="dashTahun" class="rounded border border-stroke bg-transparent py-1.5 px-3 text-sm font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark"></select>
            <select id="dashBulan" class="rounded border border-stroke bg-transparent py-1.5 px-3 text-sm font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
        </div>
        <button type="button" class="inline-flex items-center justify-center gap-2.5 rounded-md bg-primary py-2 px-6 text-center font-medium text-white hover:bg-opacity-90 lg:px-8 transition-colors" onclick="loadDashboardMurid()">
            <i class="fab fa-gg"></i> TAMPILKAN
        </button>
        <span id="lastUpdateInfo" class="text-xs text-body italic hidden md:block"></span>
    </div>
  </div>

  <div id="contentDash" class="flex flex-col gap-2 md:gap-3">
    
    <!-- 2. KONDISI SD -->
    <div class="flex flex-col gap-2">
        <h3 class="font-bold text-black dark:text-white flex items-center gap-2 pl-1">
            <i class="fas fa-school text-primary"></i> KONDISI BULAN <span id="labelBulanIni" class="uppercase text-primary"></span> (SD)
        </h3>
        <div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
            <!-- Total Card -->
            <div class="col-span-1 lg:col-span-3 sultan-card p-4 md:p-5 border-l-4 border-l-primary shadow-sm hover:translate-y-[-2px] transition-all">
                <div class="flex h-11.5 w-11.5 items-center justify-center rounded-full bg-meta-2 dark:bg-meta-4 mb-4">
                    <i class="fas fa-users text-primary text-xl"></i>
                </div>
                <div>
                    <h4 class="text-3xl font-bold text-black dark:text-white mb-1" id="sd_total_t">
                        <i class="fas fa-spinner fa-spin text-body opacity-25"></i>
                    </h4>
                    <span class="text-sm font-medium text-body uppercase tracking-wider">Total Siswa SD</span>
                </div>
                <div class="mt-4 flex flex-col gap-2 border-t border-stroke pt-4 dark:border-strokedark text-xs font-bold uppercase">
                    <div class="flex justify-between">
                        <span class="text-body lowercase first-letter:uppercase text-[10px]">Negeri:</span>
                        <span class="text-black dark:text-white" id="sd_total_n">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-body lowercase first-letter:uppercase text-[10px]">Swasta:</span>
                        <span class="text-black dark:text-white" id="sd_total_s">0</span>
                    </div>
                </div>
            </div>

            <!-- Grade Breakdown Grid -->
            <div class="col-span-1 lg:col-span-9 grid grid-cols-3 md:grid-cols-6 gap-2 md:gap-3">
                <template x-for="i in [1,2,3,4,5,6]">
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                        <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas <span x-text="i"></span></span>
                        <h4 class="text-xl font-bold text-primary mb-2" :id="'sd_k' + i + '_t'">0</h4>
                        <div class="flex gap-2 text-[9px] font-bold text-body">
                            <span>N: <b :id="'sd_k' + i + '_n'" class="text-black dark:text-white">0</b></span>
                            <span class="text-stroke dark:text-strokedark">|</span>
                            <span>S: <b :id="'sd_k' + i + '_s'" class="text-black dark:text-white">0</b></span>
                        </div>
                    </div>
                </template>
                <!-- Manual fallback because Alpine might not be on the parent -->
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 1</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k1_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k1_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k1_s" class="text-black dark:text-white">0</b></span></div>
                </div>
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 2</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k2_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k2_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k2_s" class="text-black dark:text-white">0</b></span></div>
                </div>
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 3</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k3_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k3_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k3_s" class="text-black dark:text-white">0</b></span></div>
                </div>
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 4</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k4_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k4_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k4_s" class="text-black dark:text-white">0</b></span></div>
                </div>
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 5</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k5_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k5_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k5_s" class="text-black dark:text-white">0</b></span></div>
                </div>
                <div class="sultan-card p-3 shadow-sm flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold text-body uppercase mb-2">Kelas 6</span>
                    <h4 class="text-xl font-bold text-primary mb-2" id="sd_k6_t">0</h4>
                    <div class="flex gap-2 text-[9px] font-bold text-body"><span>N: <b id="sd_k6_n" class="text-black dark:text-white">0</b></span> <span class="text-stroke">|</span> <span>S: <b id="sd_k6_s" class="text-black dark:text-white">0</b></span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. KONDISI PAUD -->
    <div class="flex flex-col gap-2">
        <h3 class="font-bold text-black dark:text-white flex items-center gap-2 pl-1">
            <i class="fas fa-child text-primary"></i> KONDISI BULAN <span id="labelBulanIniPaud" class="uppercase text-primary"></span> (PAUD)
        </h3>
        <div class="grid grid-cols-1 gap-2 sm:grid-cols-3 md:gap-3">
            <!-- TK Card -->
            <div class="sultan-card p-3 md:p-4 shadow-sm border-b-4 border-b-warning hover:translate-y-[-2px] transition-all">
                <div class="flex items-center gap-4">
                    <div class="flex h-11 w-11 items-center justify-center rounded-full bg-warning/10">
                        <i class="fas fa-shapes text-warning text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-2xl font-bold text-black dark:text-white" id="paud_tk">
                            <i class="fas fa-spinner fa-spin text-body opacity-25"></i>
                        </h4>
                        <span class="text-sm font-medium text-body uppercase tracking-wider">Siswa TK</span>
                    </div>
                </div>
            </div>
            <!-- KB Card -->
            <div class="sultan-card p-3 md:p-4 shadow-sm border-b-4 border-b-success hover:translate-y-[-2px] transition-all">
                <div class="flex items-center gap-4">
                    <div class="flex h-11 w-11 items-center justify-center rounded-full bg-success/10">
                        <i class="fas fa-gamepad text-success text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-2xl font-bold text-black dark:text-white" id="paud_kb">
                            <i class="fas fa-spinner fa-spin text-body opacity-25"></i>
                        </h4>
                        <span class="text-sm font-medium text-body uppercase tracking-wider">Siswa KB</span>
                    </div>
                </div>
            </div>
            <!-- SPS Card -->
            <div class="sultan-card p-3 md:p-4 shadow-sm border-b-4 border-b-meta-5 hover:translate-y-[-2px] transition-all">
                <div class="flex items-center gap-4">
                    <div class="flex h-11 w-11 items-center justify-center rounded-full bg-meta-5/10">
                        <i class="fas fa-baby text-meta-5 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-2xl font-bold text-black dark:text-white" id="paud_sps">
                            <i class="fas fa-spinner fa-spin text-body opacity-25"></i>
                        </h4>
                        <span class="text-sm font-medium text-body uppercase tracking-wider">Siswa SPS</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. TREND CHART -->
    <div class="sultan-card overflow-hidden">
        <div class="border-b border-gray-100 dark:border-white/5 py-3 px-5 flex items-center justify-between">
            <h3 class="font-bold text-black dark:text-white flex items-center gap-2">
                <i class="fas fa-chart-area text-primary"></i> Tren Tahunan <span id="labelTahunGrafik"></span>
            </h3>
        </div>
        <div class="p-4 md:p-6">
            <div class="chart h-[350px]">
                <canvas id="chartMurid"></canvas>
            </div>
        </div>
    </div>

  </div> 

</div>


<script>
var CHART_MURID = null;

$(document).ready(function() {
    // 1. LOGIKA TANGGAL: DEFAULT BULAN LALU (VAKSIN OVERFLOW HARI)
    var d = new Date(); 
    d.setDate(1); // MENCEGAH BUG: Paksa tanggal ke 1 dulu sebelum mundur bulan
    d.setMonth(d.getMonth() - 1); 

    var thn = d.getFullYear(); 
    var bln = d.getMonth() + 1; // getMonth() dimulai dari 0 (Januari = 0)

    // 2. POPULASI FILTER TAHUN (ES5 Murni)
    var currentRealYear = new Date().getFullYear(); 
    var $selTahun = $('#dashTahun').empty();
    
    // Load opsi dari tahun depan s.d 2022
    for(var i = currentRealYear + 1; i >= 2022; i--) { 
        var selectedStr = (i === thn) ? ' selected' : '';
        $selTahun.append('<option value="' + i + '"' + selectedStr + '>' + i + '</option>'); 
    }
    
    // Set default Bulan
    $('#dashBulan').val(bln);

    // 3. INISIASI CHART.JS SECARA ASINKRON
    if (typeof Chart === 'undefined') {
        $.getScript("https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js")
         .done(function() { loadDashboardMurid(); });
    } else {
        loadDashboardMurid();
    }
});

function loadDashboardMurid() {
    var th = $('#dashTahun').val();
    var bl = $('#dashBulan').val();
    var namaBulan = $('#dashBulan option:selected').text();

    if(!th) th = new Date().getFullYear();

    // SPINNER STATE
    var spinPrimary = '<i class="fas fa-spinner fa-spin text-primary opacity-25"></i>';
    var spinBody = '<i class="fas fa-spinner fa-spin text-body opacity-25"></i>';

    $('#sd_total_t').html(spinBody);
    $('#sd_total_n, #sd_total_s').html(spinBody);
    
    for(var i = 1; i <= 6; i++) { 
        $('#sd_k' + i + '_t').html(spinPrimary); 
        $('#sd_k' + i + '_n, #sd_k' + i + '_s').html(spinBody);
    }
    
    $('#paud_tk, #paud_kb, #paud_sps').html(spinBody);

    $('#labelBulanIni, #labelBulanIniPaud').text(namaBulan);
    $('#labelTahunGrafik').text(th);
    
    google.script.run
        .withSuccessHandler(function(jsonString) {
            try {
                var data = JSON.parse(jsonString);
                renderCards(data.cards);
                renderChart(data.chart);
            } catch(e) { 
                console.error("Gagal membaca struktur data: ", e); 
            }
        })
        .withFailureHandler(function(e) { 
            if (typeof Sultan !== 'undefined') {
                Sultan.alert('error', 'Gagal Memuat Data', e.message);
            } else {
                alert("Koneksi gagal: " + e.message);
            }
        })
        .getDashboardMuridData(th, bl);
}

function renderCards(c) {
    if(!c) return;
    
    $('#sd_total_t').text(c.sd_total.t);
    $('#sd_total_n').text(c.sd_total.n);
    $('#sd_total_s').text(c.sd_total.s);

    for(var i = 1; i <= 6; i++) {
        var key = 'sd_k' + i;
        if (c[key]) {
            $('#' + key + '_t').text(c[key].t);
            $('#' + key + '_n').text(c[key].n);
            $('#' + key + '_s').text(c[key].s);
        }
    }

    $('#paud_tk').text(c.tk || 0);
    $('#paud_kb').text(c.kb || 0);
    $('#paud_sps').text(c.sps || 0);
}

function renderChart(c) {
    if(!c || typeof Chart === 'undefined') return;
    var ctx = document.getElementById('chartMurid').getContext('2d');

    if(CHART_MURID) {
        CHART_MURID.destroy();
    }

    CHART_MURID = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'],
            datasets: [
                { label: 'SD Negeri', data: c.sd_negeri, borderColor: '#85144b', backgroundColor: 'rgba(133, 20, 75, 0.05)', tension: 0.45, fill: true, borderWidth: 3 },
                { label: 'SD Swasta', data: c.sd_swasta, borderColor: '#3C50E0', backgroundColor: 'transparent', tension: 0.45, borderDash: [5, 5], borderWidth: 2 },
                { label: 'TK', data: c.tk, borderColor: '#F59E0B', backgroundColor: 'transparent', tension: 0.45, borderWidth: 2 },
                { label: 'KB', data: c.kb, borderColor: '#10B981', backgroundColor: 'transparent', tension: 0.45, borderWidth: 2 },
                { label: 'SPS', data: c.sps, borderColor: '#259AE6', backgroundColor: 'transparent', tension: 0.45, borderWidth: 2 }
            ]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { 
                legend: { position: 'bottom', labels: { padding: 20, font: { family: 'Poppins', size: 11, weight: '500' } } },
                tooltip: { backgroundColor: '#1c2434', padding: 12, cornerRadius: 8, titleFont: { size: 14 } }
            },
            scales: { 
                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Poppins', size: 11 } } },
                x: { grid: { display: false }, ticks: { font: { family: 'Poppins', size: 11 } } }
            }
        }
    });
}
</script>
