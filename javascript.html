<script>
/**
 * ====================================================================
 * SULTAN CORE ENGINE (v2026.1)
 * Centralized logic for Theme, Networking, UI & Performance.
 * ====================================================================
 */
var Sultan = {
    version: "2.2.0-Elite",
    
    // 1. CONFIGURATION (Sync with css_sultan.html)
    config: {
        theme: 'Navy Elite',
        colors: {
            primary: '#1D3573',
            gold: '#EAC947',
            success: '#059669',
            danger: '#D0412E',
            warning: '#d97706'
        }
    },

    // 2. BOOTSTRAP: Cache Buster & Version Management
    init: function() {
        console.log("Sultan Engine v" + this.version + " Initializing...");
        
        // Anti-Legacy Cache Buster
        const lastVersion = localStorage.getItem('sultan_v');
        if (lastVersion !== this.version) {
            sessionStorage.clear();
            localStorage.setItem('sultan_v', this.version);
        }

        // Apply dark mode on boot (redundant but safe)
        if (localStorage.getItem('sultan_darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    },

    // 2.1 THEME ENGINE
    theme: {
        toggle: function() {
            // Support both jQuery and Alpine.js context
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('sultan_darkMode', isDark);
            
            // Sync Alpine.js if present
            const body = document.querySelector('body');
            if (body && body.__x_data_stack) {
                body.__x_data_stack[0].darkMode = isDark;
            }

            Sultan.notif.toast('info', `Mode ${isDark ? 'Gelap' : 'Terang'} Aktif`);
        }
    },

    // 3. NETWORKING ENGINE (THE BRIDGE)
    // Standarisasi komunikasi ke Google Apps Script
    bridge: function(method, params, successCallback, failureCallback, loadingMsg) {
        if (typeof google === 'undefined' || !google.script) {
            console.error("Sultan Bridge: Google Script Environment not found.");
            if (failureCallback) failureCallback("No Environment");
            return;
        }
        
        if (loadingMsg) Sultan.notif.loading(loadingMsg);
        
        // Handle Success
        const onDone = function(response) {
            if (loadingMsg) Sultan.notif.tutup();
            if (successCallback) successCallback(response);
        };
        
        // Handle Failure
        const onFail = function(err) {
            if (loadingMsg) Sultan.notif.tutup();
            console.error("Sultan Bridge Error [" + method + "]:", err);
            Sultan.alert('error', 'Koneksi Gagal', err.message || "Terjadi kesalahan pada server.");
            if (failureCallback) failureCallback(err);
        };

        // Safer Dynamic Call Pattern (Incompatible with .apply in GAS Proxy)
        let runner = google.script.run.withSuccessHandler(onDone).withFailureHandler(onFail);
        
        try {
            if (params === undefined) {
                runner[method]();
            } else if (Array.isArray(params)) {
                // GAS Proxy doesn't support .apply(), must use call mapping for common arg lengths
                if (params.length === 0) runner[method]();
                else if (params.length === 1) runner[method](params[0]);
                else if (params.length === 2) runner[method](params[0], params[1]);
                else if (params.length === 3) runner[method](params[0], params[1], params[2]);
                else runner[method](params); // Multi-arg fallback
            } else {
                runner[method](params);
            }
        } catch(e) {
            onFail(e);
        }
    },

    // 4. STORAGE ENGINE (TURBO CACHE)
    db: {
        set: (key, val) => localStorage.setItem('sultan_' + key, JSON.stringify(val)),
        get: (key) => {
            try { 
                // Migration Check: support legacy siksUser key
                let val = localStorage.getItem('sultan_' + key);
                if (!val && key === 'siksUser') {
                    val = localStorage.getItem('siksUser');
                    if (val) localStorage.setItem('sultan_siksUser', val); // Auto-Migrate
                }
                return val ? JSON.parse(val) : null; 
            } catch(e) { return null; }
        },
        sessionSet: (key, val) => sessionStorage.setItem('sultan_tmp_' + key, JSON.stringify(val)),
        sessionGet: (key) => {
            try { 
                let val = sessionStorage.getItem('sultan_tmp_' + key);
                return val ? JSON.parse(val) : null; 
            } catch(e) { return null; }
        },
        clear: () => { 
            // Only clear our own keys to be safe
            Object.keys(localStorage).forEach(k => { if(k.startsWith('sultan_')) localStorage.removeItem(k); });
            sessionStorage.clear(); 
        }
    },

    // 5. NOTIFICATION SYSTEM (Premium UI)
    notif: {
        toast: (type, msg) => {
            const icons = { success:'fa-check-circle', error:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
            const colors = { success:'#059669', error:'#d63031', warning:'#d97706', info:'#1D3573' };
            
            Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true,
                background: 'rgba(255, 255, 255, 0.95)',
                customClass: { popup: 'sultan-alert-popup shadow-sm py-2 px-3', title: 'sultan-alert-text font-weight-bold ml-2' }
            }).fire({
                html: `<div class="d-flex align-items-center" style="color:${colors[type]||colors.info}"><i class="fas ${icons[type]||icons.info} mr-2"></i> ${msg}</div>`
            });
        },
        sukses: (msg) => Sultan.alert('success', 'Berhasil', msg),
        gagal: (msg) => Sultan.alert('error', 'Gagal', msg),
        info: (msg) => Sultan.alert('info', 'Informasi', msg),
        loading: (msg) => {
            Swal.fire({
                html: `<div class="d-flex flex-column align-items-center"><div class="sultan-orbit mb-3"></div><p class="font-weight-bold mb-0">${msg || 'Memproses...'}</p></div>`,
                showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'sultan-alert-popup' }
            });
        },
        tutup: () => Swal.close()
    },

    // 6. GLOBAL ALERTS & DIALOGS
    alert: (type, title, text) => {
        const typeClass = type === 'success' ? 'sultan-success-popup' : (type === 'warning' ? 'sultan-warning-popup' : 'sultan-error-popup');
        return Swal.fire({
            icon: type, title: title, text: text,
            showConfirmButton: true, confirmButtonText: 'OK', buttonsStyling: false,
            customClass: { popup: `sultan-alert-popup ${typeClass}`, title: 'sultan-alert-text font-weight-bold', confirmButton: 'sultan-swal-confirm' }
        });
    },
    konfirmasi: function(opsi, callbackYa) {
        return Swal.fire({
            icon: 'warning', title: opsi.judul || 'Konfirmasi', text: opsi.teks || 'Apakah Anda yakin?',
            showCancelButton: true, confirmButtonText: opsi.btnYa || 'Ya, Lanjutkan', cancelButtonText: opsi.btnBatal || 'Batal',
            buttonsStyling: false,
            customClass: { popup: 'sultan-alert-popup sultan-error-popup', title: 'sultan-alert-text font-weight-bold', confirmButton: 'sultan-swal-confirm mx-1', cancelButton: 'sultan-swal-cancel mx-1' }
        }).then((res) => { if (res.isConfirmed && callbackYa) callbackYa(); });
    },

    // 7. FORMATTERS (Clean Assets)
    format: {
        strip: (val) => (!val || val == "0" || val == "") ? "-" : val,
        rupiah: (v) => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(v || 0),
        tanggal: (s) => s ? new Date(s).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }) : "-",
        inputDate: (s) => {
            if(!s) return "";
            if(typeof s==='string' && s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
            let d = new Date(s);
            return isNaN(d) ? "" : d.toISOString().split('T')[0];
        }
    },

    // 8. UI COMPONENTS (Sultan Mode)
    ui: {
        badge: function(status) {
            if (!status || status === "-") return '<i class="fas fa-minus text-black-50 small opacity-25"></i>';
            let s = String(status).trim(), sl = s.toLowerCase();
            if (sl.includes('revisi') || sl.includes('perbaiki')) return `<div class="btn-icon-sultan btn-icon-sultan-warning badge-pulse-warning" title="${s}"><i class="fas fa-sync-alt"></i></div>`;
            if (sl.includes('tolak') || sl.includes('salah')) return `<div class="btn-icon-sultan btn-icon-sultan-danger" title="${s}"><i class="fas fa-times"></i></div>`;
            if (sl.includes('verif') || sl.includes('setuju') || sl.includes('valid')) return `<div class="btn-icon-sultan btn-icon-sultan-success" title="${s}"><i class="fas fa-check"></i></div>`;
            if (sl.includes('proses') || sl.includes('tunggu')) return `<div class="btn-icon-sultan btn-icon-sultan-info badge-pulse-warning" title="${s}"><i class="fas fa-spinner fa-spin"></i></div>`;
            
            let color = 'secondary', pulse = '';
            if (sl.includes('hadir') || sl.includes('aktif') || sl.includes('sudah')) color = 'success';
            else if (sl.includes('belum') || sl.includes('absen')) { color = 'danger'; pulse = 'badge-pulse-danger'; }
            else if (sl.includes('izin') || sl.includes('sakit')) color = 'warning';
            return `<span class="badge badge-pill badge-${color} ${pulse} shadow-sm px-3 py-1 font-weight-bold">${s}</span>`;
        },
        skeleton: function() {
            return `<div class="p-4 p-md-5 animate__animated animate__fadeIn">
                <div class="skeleton-box mb-4" style="width:40%; height:45px; border-radius:12px;"></div>
                <div class="skeleton-grid mt-5">
                    <div class="skeleton-box w-100 mb-3" style="height:120px; border-radius:18px;"></div>
                    <div class="skeleton-box w-100 mb-2" style="height:40px;"></div>
                    <div class="skeleton-box w-100 mb-2" style="height:40px;"></div>
                    <div class="skeleton-box w-75" style="height:40px;"></div>
                </div>
            </div>`;
        }
    }
};

/**
 * ====================================================================
 * CORE SPA ENGINE (ROUTING & APP LIFE CYCLE)
 * ====================================================================
 */
$(document).ready(function() {
    console.log("SIKS-REBORN: Sultan Engine v2.0 Activated.");
    Sultan.init(); // Initialize Engine & Themes

    // Theme Toggle Handler
    $('#dark-mode-toggle').on('click', function(e) {
        e.preventDefault();
        Sultan.theme.toggle();
    });
    
    // Emergency Preloader Force-Close (Safety First)
    setTimeout(() => {
        if($('#loading-awal').is(':visible')) {
            console.warn("Sultan Engine: Force-closing preloader due to timeout.");
            $('#loading-awal').fadeOut('slow');
        }
    }, 5000);

    // 9. NAVIGATION LISTENERS (TailAdmin Support)
    $(document).on('click', '.nav-link[data-page], .nav-link-tail[data-page], .submenu-link-tail[data-page], .btn-home-crumb', function(e) {
        e.preventDefault();
        let page = $(this).data('page') || 'home';
        loadContent(page);
        
        // Mobile Sidebar Close Logic (TailAdmin/Alpine compliant)
        const body = document.querySelector('body');
        if (body && body.__x_data_stack) {
            body.__x_data_stack[0].sidebarOpened = false;
        }
    });

    // Initial load
    inisialisasiAplikasi();
});

function inisialisasiAplikasi() {
    const $preloader = $('#loading-awal');
    const tutupPreloader = () => { if ($preloader.length) $preloader.fadeOut('fast'); };
    
    try {
        let user = Sultan.db.get('siksUser');
        if (!user) {
            $('#konten-aplikasi').hide(); 
            $('#gerbang-login').fadeIn('fast');
            tutupPreloader();
            return;
        }
        $('#gerbang-login').hide(); 
        $('#konten-aplikasi').show().css('display', 'flex'); 
        updateUI(user); 
        tampilkanMenuAdmin(user); 
        loadContent('home');
        tutupPreloader();
        
        // Sync Notifications
        setTimeout(sultan_updateAllNotifUI, 2000);
        setInterval(sultan_updateAllNotifUI, 3 * 60 * 1000);
    } catch(e) {
        console.error("Initialization Error:", e);
        tutupPreloader();
        $('#konten-aplikasi').show();
        loadContent('home');
    }
}

/**
 * SPA ROUTER: ANTI-BLINK TURBO MODE (DOUBLE BUFFERING)
 */
function loadContent(pageName) {
    if (!pageName) return;
    
    const $active = $('#app-content-active');
    const $buffer = $('#app-content-buffer');
    
    // Cleanup UI
    $('body > .modal, .modal-backdrop').remove();
    $('body').removeClass('modal-open').css('padding-right', '');
    
    highlightSidebar(pageName);
    updateBreadcrumb(pageName);

    if (window.NProgress) NProgress.start();
    
    // 1. Check Cache (Turbo Mode - Instant Swap)
    let cached = Sultan.db.sessionGet('cache_page_' + pageName);
    if (cached) {
        if (window.NProgress) NProgress.done();
        $buffer.html('<div class="slide-in-right active">' + cached + '</div>');
        $active.fadeOut(80, function() {
            $active.html('').hide();
            $buffer.css({'opacity':'1','display':'block'}).removeClass('buffer').addClass('active').attr('id','app-content-active');
            $active.removeClass('active').addClass('buffer').attr('id','app-content-buffer');
            runCounterUp();
        });
        return;
    }
    
    // 2. No Cache: Show Adaptive Skeleton only for new content
    $buffer.html(Sultan.ui.skeleton()).show().css('opacity', '0.5');
    
    // 3. Muat Konten Baru di Background (Server Call)
    Sultan.bridge('loadPage', [pageName], function(html) {
        if (window.NProgress) NProgress.done();
        
        // Simpan ke Cache
        Sultan.db.sessionSet('cache_page_' + pageName, html);
        
        // 4. Masukkan HTML ke Buffer & Tunggu Rendereing Selesai
        $buffer.html('<div class="slide-in-right active">' + html + '</div>');
        
        // 5. INSTANT SWAP (The Double-Buffering Magic)
        $active.fadeOut(100, function() {
            $active.html('').hide(); // Kosongkan active lama
            
            $buffer.css({
                'opacity': '1',
                'display': 'block'
            }).removeClass('buffer').addClass('active').attr('id', 'app-content-active');
            
            $active.removeClass('active').addClass('buffer').attr('id', 'app-content-buffer');
            
            runCounterUp();
        });
    }, function() {
        if (window.NProgress) NProgress.done();
        $buffer.html('<div class="alert alert-danger m-4 shadow-sm border-0" style="border-radius:12px;">Gagal memuat halaman.</div>').css('opacity', '1');
    });
}

/**
 * ====================================================================
 * ANALYTICS & NOTIFICATION ENGINE
 * ====================================================================
 */
function sultan_updateAllNotifUI() {
    let user = Sultan.db.get('siksUser');
    if (!user) return;
    
    let role = user.role || "";
    let isAdmin = role.toLowerCase().includes("admin") || role.toLowerCase().includes("verifikator");
    let identifier = user.npsn || user.unit || user.username || "";
    
    Sultan.bridge('sultan_getUnifiedNotificationCounts', [role, identifier], function(data) {
        if (!data) return;
        
        // Update Sidebars & Navbar (Implementation consistent with blueprint)
        const skb = $('#sk_data_badge'), lbb = $('#lapbul_kelola_badge'), nvb = $('#notif-badge'), nbc = $('#notif-list-container');
        const skpb = $('#sk_parent_badge'), lbpb = $('#lapbul_parent_badge');
        
        if (skb.length) data.sk > 0 ? skb.text(data.sk).show() : skb.hide();
        if (skpb.length) data.sk > 0 ? skpb.text(data.sk).show() : skpb.hide();
        
        if (lbb.length) data.lapbul > 0 ? lbb.text(data.lapbul).show() : lbb.hide();
        if (lbpb.length) data.lapbul > 0 ? lbpb.text(data.lapbul).show() : lbpb.hide();
        
        if (nvb.length && data.total > 0) {
            nvb.text(data.total > 99 ? '99+' : data.total).css('display', 'flex');
            $('#btn-notif-bell').css('color', Sultan.config.colors.danger);
            
            let html = '';
            (data.rincian || []).forEach((item, index) => {
                const statusColor = index % 2 === 0 ? 'status-online' : 'status-offline';
                const avatarInitials = (item.modul || 'SY').split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
                const avatarBg = ['#3C50E0','#10B981','#F59E0B','#EF4444','#8B5CF6'][index % 5];
                
                html += `
                <li class="notif-item">
                    <a href="#" class="notif-link" onclick="sk_notifNavigate('${item.page}', '${isAdmin?'Diproses':'Revisi'}'); return false;">
                        <div class="notif-avatar-wrap">
                            <div class="notif-avatar" style="background:${avatarBg}">${avatarInitials}</div>
                            <span class="notif-status-dot ${statusColor}"></span>
                        </div>
                        <div class="notif-content">
                            <p class="notif-text">
                                <span class="notif-name">${item.modul}</span> 
                                <span class="notif-action-text">meminta pembaruan pada</span>
                                <span class="notif-name">Data ${item.modul}</span>
                            </p>
                            <p class="notif-meta">
                                <span class="notif-meta-category">${item.modul}</span>
                                <span class="notif-dot">•</span>
                                <span>${item.jumlah} data baru</span>
                            </p>
                        </div>
                    </a>
                </li>`;
            });
            if (nbc.length) nbc.html(html);
        } else {
            if (nvb.length) nvb.hide();
            if (nbc.length) nbc.html('<li class="p-8 text-center text-xs italic" style="color:#94a3b8;">Tidak ada notifikasi baru</li>');
        }
    });
}

function sk_notifNavigate(page, filter) {
    window.SK_GLOBAL_FILTER_PRESET = filter;
    loadContent(page);
}

/**
 * LOGIN / LOGOUT ENGINE
 */
function handleLoginV2(event) {
    event.preventDefault();
    let btn = $('#tombolLogin'), form = $('#formLogin')[0];
    btn.prop('disabled', true).html('<i class="fas fa-circle-notch fa-spin mr-2"></i> Memproses...');
    
    Sultan.bridge('processLogin', [form], function(res) {
        if (res.status === "success") {
            Sultan.db.set('siksUser', res.userData || res);
            Sultan.notif.sukses('Selamat Datang!');
            setTimeout(() => inisialisasiAplikasi(), 600);
        } else {
            btn.prop('disabled', false).text('MASUK');
            Sultan.alert('error', 'Login Gagal', res.message || "Username/Password salah.");
        }
    }, () => btn.prop('disabled', false).text('MASUK'));
}

function handleLogout() {
    Sultan.konfirmasi({judul: 'Keluar Aplikasi?', teks: 'Sesi Anda akan diakhiri.'}, function() {
        Sultan.db.clear();
        $('#konten-aplikasi').hide();
        $('#app-content').empty();
        $('#gerbang-login').fadeIn('fast');
    });
}

/**
 * UI SYNC HELPERS
 */
function updateUI(u) {
    if (!u) return;
    let name = u.nama_lengkap || u.username || "User";
    let photo = u.photo || u.foto || "";
    let role = u.role || "User";
    let f = photo ? 'https://drive.google.com/thumbnail?id=' + photo + '&sz=200' : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1D3573&color=fff';
    
    $('#nav-user-photo, #dropdown-user-photo, #sidebar-user-photo').attr('src', f);
    $('#nav-user-name, #dropdown-user-name-big').text(name);
    $('#dropdown-user-role').text(role);
}

function tampilkanMenuAdmin(user) {
    let isAdmin = (user.role || "").toLowerCase().includes("admin");
    $(".menu-admin-only")[isAdmin ? 'show' : 'hide']();
}

/**
 * MENU MAPPING & BREADCRUMBS (THEME SYNCED)
 */
function updateBreadcrumb(pageName) {
    const $activeLink = $(`a[data-page="${pageName}"]`);
    let breadcrumbs = [];
    
    if (pageName === 'home') {
        breadcrumbs = ['BERANDA'];
    } else if ($activeLink.length > 0) {
        // Get current page label (clean text, no child elements)
        const currentLabel = $activeLink.clone().children().remove().end().text().trim() 
                          || $activeLink.text().trim();
        breadcrumbs.push(currentLabel);
        
        // --- LEVEL 3 CHECK: is this a .sub-submenu-link-tail inside .sub-submenu-tail? ---
        let $subSubmenuTail = $activeLink.closest('.sub-submenu-tail');
        if ($subSubmenuTail.length) {
            // Level 2 trigger: prev sibling .submenu-link-tail.has-sub
            let $level2Trigger = $subSubmenuTail.prev('.submenu-link-tail.has-sub');
            if ($level2Trigger.length) {
                let level2Label = $level2Trigger.find('span').first().text().trim()
                               || $level2Trigger.clone().children().remove().end().text().trim();
                breadcrumbs.push(level2Label);
            }
            
            // Now find Level 1: the parent .submenu-tail → prev .nav-link-tail
            let $submenuTail = $subSubmenuTail.closest('.submenu-tail');
            if ($submenuTail.length) {
                let $level1Trigger = $submenuTail.prev('.nav-link-tail');
                if ($level1Trigger.length) {
                    let level1Label = $level1Trigger.find('span.truncate').text().trim()
                                   || $level1Trigger.clone().children().remove().end().text().trim();
                    breadcrumbs.push(level1Label);
                }
            }
        } else {
            // --- LEVEL 2 CHECK: inside .submenu-tail → find parent .nav-link-tail ---
            let $submenuTail = $activeLink.closest('.submenu-tail');
            if ($submenuTail.length) {
                let $parentTrigger = $submenuTail.prev('.nav-link-tail');
                if ($parentTrigger.length) {
                    let parentLabel = $parentTrigger.find('span.truncate').text().trim()
                                   || $parentTrigger.clone().children().remove().end().text().trim();
                    breadcrumbs.push(parentLabel);
                }
            }
        }
    } else {
        breadcrumbs.push((window.MENU_MAPPING && MENU_MAPPING[pageName]) ? MENU_MAPPING[pageName] : pageName);
    }
    
    breadcrumbs = breadcrumbs.reverse();
    
    // Construct HTML string
    let bcHtml = '';
    if (pageName !== 'home') {
        breadcrumbs.forEach((crumb, idx) => {
            if (idx === breadcrumbs.length - 1) {
                bcHtml += `<li id="page-breadcrumb" class="font-bold text-primary tracking-wide animate-reveal uppercase">${crumb}</li>`;
            } else {
                bcHtml += `<li><span class="font-medium text-gray-500 uppercase">${crumb}</span></li><li class="text-gray-300">/</li>`;
            }
        });
    } else {
        bcHtml += '<li id="page-breadcrumb" class="font-bold text-primary tracking-wide animate-reveal uppercase">BERANDA</li>';
    }
    
    $('#dynamic-breadcrumb-container').html(bcHtml);
    document.title = "SIKS-REBORN | " + breadcrumbs.join(' ‣ ');
}

function highlightSidebar(page) {
    // Clear all active states across all 3 levels
    $('.nav-link-tail, .submenu-link-tail, .sub-submenu-link-tail').removeClass('active');
    
    // Find the active link across all 3 levels
    const $activeLink = $(
        `.nav-link-tail[data-page="${page}"], ` +
        `.submenu-link-tail[data-page="${page}"], ` +
        `.sub-submenu-link-tail[data-page="${page}"]`
    );
    $activeLink.addClass('active');

    // ---- LEVEL 3: grandchild active → open Level 2 trigger + Level 1 dropdown ----
    if ($activeLink.hasClass('sub-submenu-link-tail')) {
        // Open the Level 2 wrapper (Alpine x-data openXxx) — use click on the has-sub trigger
        const $subSubmenuTail = $activeLink.closest('.sub-submenu-tail');
        const $level2Trigger = $subSubmenuTail.prev('.submenu-link-tail.has-sub');
        if ($level2Trigger.length) {
            $level2Trigger.addClass('open'); // Visual open state via CSS
            $subSubmenuTail.show(); // Force show in case Alpine hasn't rendered yet
        }
        
        // Also open the Level 1 parent via Alpine custom event
        const $submenuTail = $subSubmenuTail.closest('.submenu-tail');
        const $level1Trigger = $submenuTail.prev('.nav-link-tail');
        if ($level1Trigger.length) {
            const clickAttr = $level1Trigger.attr('@click.prevent') || '';
            const match = clickAttr.match(/'([^']+)'/g);
            if (match && match[1]) {
                const menuId = match[1].replace(/'/g, '');
                window.dispatchEvent(new CustomEvent('open-sidebar-menu', { detail: { menuId } }));
            }
        }
        return;
    }
    
    // ---- LEVEL 2: child active → open Level 1 dropdown ----
    if ($activeLink.hasClass('submenu-link-tail')) {
        const $submenuTail = $activeLink.closest('.submenu-tail');
        const $level1Trigger = $submenuTail.prev('.nav-link-tail');
        if ($level1Trigger.length) {
            const clickAttr = $level1Trigger.attr('@click.prevent') || '';
            const match = clickAttr.match(/'([^']+)'/g);
            if (match && match[1]) {
                const menuId = match[1].replace(/'/g, '');
                window.dispatchEvent(new CustomEvent('open-sidebar-menu', { detail: { menuId } }));
            }
        }
    }
}

function runCounterUp() {
    $('.counter-up, h3.stat, .stat-num').each(function() {
        let $t = $(this), n = parseInt($t.text().replace(/\D/g,'')) || 0;
        if (n < 2) return;
        $t.prop('Counter',0).animate({ Counter: n }, { duration: 1200, step: (now) => $t.text(Math.ceil(now).toLocaleString('id-ID')) });
    });
}
