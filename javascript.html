<script>
/**
 * ====================================================================
 * SULTAN CORE ENGINE (v2026.1)
 * Centralized logic for Theme, Networking, UI & Performance.
 * ====================================================================
 */
var Sultan = {
    // 1. CONFIGURATION (Sync with css_sultan.html)
    config: {
        theme: 'Navy Elite',
        version: '2.0-Turbo',
        colors: {
            primary: '#1D3573',
            gold: '#EAC947',
            success: '#059669',
            danger: '#D0412E',
            warning: '#d97706'
        }
    },

    // 2. NETWORKING ENGINE (THE BRIDGE)
    // Standarisasi komunikasi ke Google Apps Script
    bridge: function(method, params, successCallback, failureCallback, loadingMsg) {
        if (typeof google === 'undefined' || !google.script) {
            console.error("Sultan Bridge: Google Script Environment not found.");
            return;
        }
        
        if (loadingMsg) Sultan.notif.loading(loadingMsg);
        
        // Handle single param or array of params
        let runner = google.script.run
            .withSuccessHandler(function(response) {
                if (loadingMsg) Sultan.notif.tutup();
                if (successCallback) successCallback(response);
            })
            .withFailureHandler(function(err) {
                if (loadingMsg) Sultan.notif.tutup();
                console.error("Sultan Bridge Error [" + method + "]:", err);
                Sultan.alert('error', 'Koneksi Gagal', err.message || "Terjadi kesalahan pada server.");
                if (failureCallback) failureCallback(err);
            });
            
        // Dynamic method calling
        if (runner[method]) {
            if (params === undefined) {
                runner[method]();
            } else if (Array.isArray(params)) {
                runner[method].apply(runner, params);
            } else {
                runner[method](params);
            }
        } else {
            console.error("Sultan Bridge: Method '" + method + "' not found.");
        }
    },

    // 3. STORAGE ENGINE (TURBO CACHE)
    db: {
        set: (key, val) => localStorage.setItem('sultan_' + key, JSON.stringify(val)),
        get: (key) => {
            try { 
                let val = localStorage.getItem('sultan_' + key);
                return val ? JSON.parse(val) : null; 
            } catch(e) { return null; }
        },
        sessionSet: (key, val) => sessionStorage.setItem('sultan_tmp_' + key, JSON.stringify(val)),
        sessionGet: (key) => {
            try { 
                let val = sessionStorage.getItem('sultan_tmp_' + key);
                return val ? JSON.parse(val) : null; 
            } catch(e) { return null; }
        },
        clear: () => { 
            // Only clear our own keys to be safe
            Object.keys(localStorage).forEach(k => { if(k.startsWith('sultan_')) localStorage.removeItem(k); });
            sessionStorage.clear(); 
        }
    },

    // 4. NOTIFICATION SYSTEM (Premium UI)
    notif: {
        toast: (type, msg) => {
            const icons = { success:'fa-check-circle', error:'fa-times-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
            const colors = { success:'#059669', error:'#d63031', warning:'#d97706', info:'#1D3573' };
            
            Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true,
                background: 'rgba(255, 255, 255, 0.95)',
                customClass: { popup: 'sultan-alert-popup shadow-sm py-2 px-3', title: 'sultan-alert-text font-weight-bold ml-2' }
            }).fire({
                html: `<div class="d-flex align-items-center" style="color:${colors[type]||colors.info}"><i class="fas ${icons[type]||icons.info} mr-2"></i> ${msg}</div>`
            });
        },
        sukses: (msg) => Sultan.alert('success', 'Berhasil', msg),
        gagal: (msg) => Sultan.alert('error', 'Gagal', msg),
        info: (msg) => Sultan.alert('info', 'Informasi', msg),
        loading: (msg) => {
            Swal.fire({
                html: `<div class="d-flex flex-column align-items-center"><div class="sultan-orbit mb-3"></div><p class="font-weight-bold mb-0">${msg || 'Memproses...'}</p></div>`,
                showConfirmButton: false, allowOutsideClick: false, customClass: { popup: 'sultan-alert-popup' }
            });
        },
        tutup: () => Swal.close()
    },

    // 5. GLOBAL ALERTS & DIALOGS
    alert: (type, title, text) => {
        const typeClass = type === 'success' ? 'sultan-success-popup' : (type === 'warning' ? 'sultan-warning-popup' : 'sultan-error-popup');
        return Swal.fire({
            icon: type, title: title, text: text,
            showConfirmButton: true, confirmButtonText: 'OK', buttonsStyling: false,
            customClass: { popup: `sultan-alert-popup ${typeClass}`, title: 'sultan-alert-text font-weight-bold', confirmButton: 'sultan-swal-confirm' }
        });
    },
    konfirmasi: function(opsi, callbackYa) {
        return Swal.fire({
            icon: 'warning', title: opsi.judul || 'Konfirmasi', text: opsi.teks || 'Apakah Anda yakin?',
            showCancelButton: true, confirmButtonText: opsi.btnYa || 'Ya, Lanjutkan', cancelButtonText: opsi.btnBatal || 'Batal',
            buttonsStyling: false,
            customClass: { popup: 'sultan-alert-popup sultan-error-popup', title: 'sultan-alert-text font-weight-bold', confirmButton: 'sultan-swal-confirm mx-1', cancelButton: 'sultan-swal-cancel mx-1' }
        }).then((res) => { if (res.isConfirmed && callbackYa) callbackYa(); });
    },

    // 6. FORMATTERS (Clean Assets)
    format: {
        strip: (val) => (!val || val == "0" || val == "") ? "-" : val,
        rupiah: (v) => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(v || 0),
        tanggal: (s) => s ? new Date(s).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }) : "-",
        inputDate: (s) => {
            if(!s) return "";
            if(typeof s==='string' && s.match(/^\d{4}-\d{2}-\d{2}$/)) return s;
            let d = new Date(s);
            return isNaN(d) ? "" : d.toISOString().split('T')[0];
        }
    },

    // 7. UI COMPONENTS (Sultan Mode)
    ui: {
        badge: function(status) {
            if (!status || status === "-") return '<i class="fas fa-minus text-black-50 small opacity-25"></i>';
            let s = String(status).trim(), sl = s.toLowerCase();
            if (sl.includes('revisi') || sl.includes('perbaiki')) return `<div class="btn-icon-sultan btn-icon-sultan-warning badge-pulse-warning" title="${s}"><i class="fas fa-sync-alt"></i></div>`;
            if (sl.includes('tolak') || sl.includes('salah')) return `<div class="btn-icon-sultan btn-icon-sultan-danger" title="${s}"><i class="fas fa-times"></i></div>`;
            if (sl.includes('verif') || sl.includes('setuju') || sl.includes('valid')) return `<div class="btn-icon-sultan btn-icon-sultan-success" title="${s}"><i class="fas fa-check"></i></div>`;
            if (sl.includes('proses') || sl.includes('tunggu')) return `<div class="btn-icon-sultan btn-icon-sultan-info badge-pulse-warning" title="${s}"><i class="fas fa-spinner fa-spin"></i></div>`;
            
            let color = 'secondary', pulse = '';
            if (sl.includes('hadir') || sl.includes('aktif') || sl.includes('sudah')) color = 'success';
            else if (sl.includes('belum') || sl.includes('absen')) { color = 'danger'; pulse = 'badge-pulse-danger'; }
            else if (sl.includes('izin') || sl.includes('sakit')) color = 'warning';
            return `<span class="badge badge-pill badge-${color} ${pulse} shadow-sm px-3 py-1 font-weight-bold">${s}</span>`;
        },
        skeleton: function() {
            return `<div class="p-4 p-md-5 animate__animated animate__fadeIn">
                <div class="skeleton-box mb-4" style="width:40%; height:45px; border-radius:12px;"></div>
                <div class="skeleton-grid mt-5">
                    <div class="skeleton-box w-100 mb-3" style="height:120px; border-radius:18px;"></div>
                    <div class="skeleton-box w-100 mb-2" style="height:40px;"></div>
                    <div class="skeleton-box w-100 mb-2" style="height:40px;"></div>
                    <div class="skeleton-box w-75" style="height:40px;"></div>
                </div>
            </div>`;
        }
    }
};

/**
 * ====================================================================
 * CORE SPA ENGINE (ROUTING & APP LIFE CYCLE)
 * ====================================================================
 */
$(document).ready(function() {
    console.log("SIKS-REBORN: Sultan Engine v2.0 Activated.");
    $(document).on('show.bs.modal', '.modal', function () { $(this).appendTo('body'); });
    inisialisasiAplikasi();

    $(document).on('click', '.nav-link[data-page], .btn-home-crumb', function(e) {
        e.preventDefault();
        let page = $(this).data('page') || 'home';
        loadContent(page);
        if ($(window).width() < 768) $('body').removeClass('sidebar-open').addClass('sidebar-collapse');
    });
});

function inisialisasiAplikasi() {
    let preloader = $('#loading-awal');
    try {
        let user = Sultan.db.get('siksUser');
        if (!user) {
            $('#konten-aplikasi').hide(); $('#gerbang-login').fadeIn('fast');
            if (preloader.length) preloader.fadeOut('fast');
            return;
        }
        $('#gerbang-login').hide(); $('#konten-aplikasi').fadeIn('fast');
        updateUI(user); tampilkanMenuAdmin(user); loadContent('home');
        if (preloader.length) preloader.fadeOut('fast');
        
        // Sync Notifications
        setTimeout(sultan_updateAllNotifUI, 2000);
        setInterval(sultan_updateAllNotifUI, 3 * 60 * 1000);
    } catch(e) {
        $('#gerbang-login').hide(); $('#konten-aplikasi').show();
        loadContent('home');
    }
}

/**
 * SPA ROUTER: ANTI-BLINK TURBO MODE (DOUBLE BUFFERING)
 */
function loadContent(pageName) {
    if (!pageName) return;
    
    const $active = $('#app-content-active');
    const $buffer = $('#app-content-buffer');
    
    // Cleanup UI
    $('body > .modal, .modal-backdrop').remove();
    $('body').removeClass('modal-open').css('padding-right', '');
    
    highlightSidebar(pageName);
    updateBreadcrumb(pageName);

    if (window.NProgress) NProgress.start();
    
    // 1. Persiapkan Buffer dengan Skeleton
    $buffer.html(Sultan.ui.skeleton()).show().css('opacity', '0.5');
    
    // 2. Check Cache (Turbo Mode)
    let cached = Sultan.db.sessionGet('cache_page_' + pageName);
    if (cached) {
        if (window.NProgress) NProgress.done();
        setTimeout(function() {
            $buffer.html('<div class="slide-in-right active">' + cached + '</div>');
            $active.fadeOut(50, function() {
                $active.html('').hide();
                $buffer.css({'opacity':'1','display':'block'}).removeClass('buffer').addClass('active').attr('id','app-content-active');
                $active.removeClass('active').addClass('buffer').attr('id','app-content-buffer');
                runCounterUp();
            });
        }, 50);
        return;
    }
    
    // 3. Muat Konten Baru di Background (Server Call)
    Sultan.bridge('loadPage', [pageName], function(html) {
        if (window.NProgress) NProgress.done();
        
        // Simpan ke Cache
        Sultan.db.sessionSet('cache_page_' + pageName, html);
        
        // 4. Masukkan HTML ke Buffer & Tunggu Rendereing Selesai
        $buffer.html('<div class="slide-in-right active">' + html + '</div>');
        
        // 5. INSTANT SWAP (The Double-Buffering Magic)
        $active.fadeOut(100, function() {
            $active.html('').hide(); // Kosongkan active lama
            
            $buffer.css({
                'opacity': '1',
                'display': 'block'
            }).removeClass('buffer').addClass('active').attr('id', 'app-content-active');
            
            $active.removeClass('active').addClass('buffer').attr('id', 'app-content-buffer');
            
            runCounterUp();
        });
    }, function() {
        if (window.NProgress) NProgress.done();
        $buffer.html('<div class="alert alert-danger m-4 shadow-sm border-0" style="border-radius:12px;">Gagal memuat halaman.</div>').css('opacity', '1');
    });
}

/**
 * ====================================================================
 * ANALYTICS & NOTIFICATION ENGINE
 * ====================================================================
 */
function sultan_updateAllNotifUI() {
    let user = Sultan.db.get('siksUser');
    if (!user) return;
    
    let role = user.role || "";
    let isAdmin = role.toLowerCase().includes("admin") || role.toLowerCase().includes("verifikator");
    let identifier = user.npsn || user.unit || user.username || "";
    
    Sultan.bridge('sultan_getUnifiedNotificationCounts', [role, identifier], function(data) {
        if (!data) return;
        
        // Update Sidebars & Navbar (Implementation consistent with blueprint)
        const skb = $('#sk_data_badge'), lbb = $('#lapbul_kelola_badge'), nvb = $('#notif-badge'), nbc = $('#notif-list-container');
        
        if (skb.length) data.sk > 0 ? skb.text(data.sk).show() : skb.hide();
        if (lbb.length) data.lapbul > 0 ? lbb.text(data.lapbul).show() : lbb.hide();
        
        if (nvb.length && data.total > 0) {
            nvb.text(data.total > 99 ? '99+' : data.total).show();
            $('#btn-notif-bell').css('color', Sultan.config.colors.danger);
            
            let html = '';
            (data.rincian || []).forEach(item => {
                html += `<a href="#" class="dropdown-item p-3 border-bottom animate__animated animate__fadeInSmall" onclick="sk_notifNavigate('${item.page}', '${isAdmin?'Diproses':'Revisi'}')">
                    <div class="d-flex align-items-center">
                        <div class="p-2 rounded-circle mr-3 bg-light" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;">
                            <i class="fas fa-bell text-utama"></i>
                        </div>
                        <div style="flex:1;">
                            <p class="mb-0 font-weight-bold text-dark small">${item.modul}</p>
                            <small class="text-muted d-block" style="font-size:11px;">Ada ${item.jumlah} data baru.</small>
                        </div>
                    </div>
                </a>`;
            });
            if (nbc.length) nbc.html(html);
        } else {
            if (nvb.length) nvb.hide();
            if (nbc.length) nbc.html('<div class="text-center p-4 text-muted small">Tidak ada notifikasi</div>');
        }
    });
}

function sk_notifNavigate(page, filter) {
    window.SK_GLOBAL_FILTER_PRESET = filter;
    loadContent(page);
}

/**
 * LOGIN / LOGOUT ENGINE
 */
function handleLoginV2(event) {
    event.preventDefault();
    let btn = $('#tombolLogin'), form = $('#formLogin')[0];
    btn.prop('disabled', true).html('<i class="fas fa-circle-notch fa-spin mr-2"></i> Memproses...');
    
    Sultan.bridge('processLogin', [form], function(res) {
        if (res.status === "success") {
            Sultan.db.set('siksUser', res.userData || res);
            Sultan.notif.sukses('Selamat Datang!');
            setTimeout(() => inisialisasiAplikasi(), 600);
        } else {
            btn.prop('disabled', false).text('MASUK');
            Sultan.alert('error', 'Login Gagal', res.message || "Username/Password salah.");
        }
    }, () => btn.prop('disabled', false).text('MASUK'));
}

function handleLogout() {
    Sultan.konfirmasi({judul: 'Keluar Aplikasi?', teks: 'Sesi Anda akan diakhiri.'}, function() {
        Sultan.db.clear();
        $('#konten-aplikasi').hide();
        $('#app-content').empty();
        $('#gerbang-login').fadeIn('fast');
    });
}

/**
 * UI SYNC HELPERS
 */
function updateUI(u) {
    if (!u) return;
    let name = u.nama_lengkap || u.username || "User";
    let photo = u.photo || u.foto || "";
    let role = u.role || "User";
    let f = photo ? 'https://drive.google.com/thumbnail?id=' + photo + '&sz=200' : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1D3573&color=fff';
    
    $('#nav-user-photo, #dropdown-user-photo, #sidebar-user-photo').attr('src', f);
    $('#nav-user-name, #dropdown-user-name-big').text(name);
    $('#dropdown-user-role').text(role);
}

function tampilkanMenuAdmin(user) {
    let isAdmin = (user.role || "").toLowerCase().includes("admin");
    $(".menu-admin-only")[isAdmin ? 'show' : 'hide']();
}

/**
 * MENU MAPPING & BREADCRUMBS (THEME SYNCED)
 */
function updateBreadcrumb(pageName) {
    let html = `<span class="btn-home-crumb" style="cursor:pointer"><i class="fas fa-home mr-1"></i> Beranda</span>`;
    if (pageName !== 'home') {
        let title = (window.MENU_MAPPING && MENU_MAPPING[pageName]) ? MENU_MAPPING[pageName] : pageName;
        html += ` <i class="fas fa-angle-right mx-2 opacity-50 small"></i> <span class="font-weight-bold">${title}</span>`;
    }
    $('#page-breadcrumb').html(html).addClass('animate__animated animate__fadeIn');
}

function highlightSidebar(page) {
    $('.nav-sidebar .nav-link').removeClass('active');
    $(`.nav-sidebar .nav-link[data-page="${page}"]`).addClass('active').parents('.nav-item').addClass('menu-open');
}

/**
 * LEGACY COMPATIBILITY HELPERS (BRIDGE TO NEW Sultan)
 */
function toast(m, t) { Sultan.notif.toast(t, m); }
function runCounterUp() {
    $('.counter-up, h3.stat, .stat-num').each(function() {
        let $t = $(this), n = parseInt($t.text().replace(/\D/g,'')) || 0;
        if (n < 2) return;
        $t.prop('Counter',0).animate({ Counter: n }, { duration: 1200, step: (now) => $t.text(Math.ceil(now).toLocaleString('id-ID')) });
    });
}

// Global Menu Mapping consistent with app
window.MENU_MAPPING = {
    'home': 'Beranda', 'sk_dashboard': 'Dashboard SK', 'sk_data': 'Data SK', 
    'siaba_dashboard': 'Dashboard SIABA', 'siaba_presensi_harian': 'Harian',
    'efile_dashboard': 'Dashboard E-File','efile_kelola': 'Kelola & Verifikasi'
};
</script>
