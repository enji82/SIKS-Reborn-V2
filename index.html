  <script>
    // THEME ENGINE CORE: Apply dark mode immediately to prevent flash
    if (localStorage.getItem('sultan_darkMode') === 'true' || 
       (!('sultan_darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }

    window.SULTAN_ENGINE_ID = "Elite-v2.5.0-Total";
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {

            stroke: '#E2E8F0',
            body: '#64748B',
            bodydark: '#8A99AF',

            boxdark: '#24303F',

        }
      }
    }
