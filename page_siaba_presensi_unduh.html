<div class="content-header pb-0">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-12">
        <h5 class="m-0 font-weight-bold">
          <i class="fas fa-cloud-download-alt text-maroon mr-2"></i>Unduh Rekap Bulanan
        </h5>
        <div class="sultan-title-line"></div>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12">
        
        <!-- 1. NAVIGATION & FOLDER BAR (STANDARD SULTAN P-3) -->
        <div class="card-sultan p-3 mb-3">
          <div class="d-flex flex-wrap justify-content-between align-items-center">
            
            <div class="d-flex align-items-center flex-wrap" style="gap: 10px;">
              
              <button type="button" id="unduh_btnHome" class="btn btn-sultan-nav shadow-sm bg-white" title="Folder Utama">
                <i class="fas fa-home text-maroon"></i>
              </button>

              <button type="button" id="unduh_btnBack" class="btn btn-sultan-nav shadow-sm bg-white" title="Kembali" style="display:none;">
                <i class="fas fa-level-up-alt text-dark font-weight-bold"></i>
              </button>

              <button type="button" id="unduh_btnRefresh" class="btn btn-sultan-nav shadow-sm bg-white" title="Refresh Folder Ini">
                <i class="fas fa-sync-alt text-blue-sultan"></i>
              </button>

              <div class="divider-vertical d-none d-md-block mx-2"></div>

              <div class="d-flex align-items-center bg-light px-3 py-2 rounded border shadow-sm" style="min-width: 280px; border-color: #dee2e6 !important;">
                  <i class="fas fa-folder-open text-gold-sultan mr-2"></i>
                  <span id="unduh_folderNameLabel" class="font-weight-bold text-dark small text-uppercase" style="letter-spacing: 0.5px;">MEMUAT...</span>
              </div>
            </div>

            <div class="mt-2 mt-xl-0 text-muted small font-weight-bold px-2">
               TOTAL ITEM: <span id="unduh_totalItemCount" class="text-maroon">0</span>
            </div>
          </div>
        </div>

        <div class="card-sultan">
          <div class="card-body p-3">
              
              <div id="unduh_skeletonState">
                  <!-- SKELETON RENDERED VIA JS -->
              </div>

              <div id="unduh_tableState" style="display: none;">
                  <table id="unduh_tabelUtama" class="table table-bordered table-hover table-premium table-sultan-compact mb-0 w-100" style="border-collapse: separate !important; border-spacing: 0 !important;">
                    <thead>
                      <tr>
                        <th class="text-center align-middle" style="width: 40px;">No</th>
                        <th class="text-left align-middle px-3">Nama File / Folder</th>
                        <th class="text-center align-middle" style="width: 100px;">Ukuran</th>
                        <th class="text-center align-middle" style="width: 150px;">Tanggal</th>
                        <th class="text-center align-middle" style="width: 120px;">Aksi</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
              </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<div class="modal fade" id="unduh_modalPreview" tabindex="-1" role="dialog" data-backdrop="static">
  <div class="modal-dialog modal-dialog-full" role="document"> 
    <div class="modal-content modal-content-full-height border-0 shadow-lg modal-content-sultan"> 
      
      <div class="modal-header bg-maroon py-2">
        <h6 class="modal-title font-weight-bold text-white">
            <i class="fas fa-file-alt mr-2"></i> Preview Dokumen
        </h6>
        <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
      </div>
      
      <div class="modal-body modal-body-full bg-dark position-relative p-0" style="height: calc(100vh - 55px);">
          <iframe id="unduh_framePreview" class="iframe-full w-100 h-100 border-0 d-none" src=""></iframe>
          <div id="unduh_loadingPreviewPDF" class="d-flex h-100 align-items-center justify-content-center text-white-50 position-absolute w-100">
              <div class="text-center"><i class="fas fa-circle-notch fa-spin fa-3x mb-3"></i><p>Memuat Dokumen...</p></div>
          </div>
      </div>
      
      <div class="modal-footer justify-content-between bg-white py-2 border-top" style="flex-shrink: 0;">
          <button type="button" class="btn border-tegas shadow-sm font-weight-bold px-4" data-dismiss="modal">Tutup</button>
          
          <a id="unduh_btnDownloadFinal" href="#" target="_blank" class="btn btn-success shadow-sm font-weight-bold px-4">
              <i class="fas fa-download mr-2"></i> UNDUH FILE
          </a>
      </div>

    </div>
  </div>
</div>

<script>
  // =================================================================
  // ISOLASI VARIABEL GLOBAL (PREFIX UNDUH_ MUTLAK)
  // =================================================================
  function unduh_escapeHtml(text) { 
      if(!text) return ""; 
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
  }

  var UNDUH_CURRENT_FOLDER = null; 
  var UNDUH_PARENT_FOLDER = null;
  var UNDUH_TABEL_INSTANCE = null;

  // =================================================================
  // 1. INITIALIZATION & VAKSIN SPA EVENT DELEGATION
  // =================================================================
  $(document).ready(function() {
      
      $(document).off('click', '#unduh_btnHome').on('click', '#unduh_btnHome', unduh_goHome);
      $(document).off('click', '#unduh_btnBack').on('click', '#unduh_btnBack', unduh_navigateUp);
      $(document).off('click', '#unduh_btnRefresh').on('click', '#unduh_btnRefresh', unduh_refreshFolder);
      
      $(document).off('click', '.unduh-btn-folder').on('click', '.unduh-btn-folder', function(e) {
          e.stopPropagation();
          unduh_loadFolder($(this).data('id'));
      });
      $(document).off('click', '.unduh-btn-file').on('click', '.unduh-btn-file', function(e) {
          e.stopPropagation();
          unduh_openPreview($(this).data('id'), $(this).data('mime'));
      });

      $('#unduh_modalPreview').on('hidden.bs.modal', function () {
          $('#unduh_framePreview').attr('src', '').addClass('d-none');
          $('#unduh_loadingPreviewPDF').removeClass('d-none');
      });

      $('#unduh_tabelUtama tbody').on('click', 'tr', function(e) {
          if ($(e.target).is('button') || $(e.target).closest('button').length) return;
          var btn = $(this).find('button.btn-aksi-sultan');
          if(btn.length > 0) { btn[0].click(); }
      });

      unduh_goHome(); 
  });

  // =================================================================
  // 2. LOGIKA LOAD FOLDER (ZERO-BLINK FETCH)
  // =================================================================
  function unduh_loadFolder(folderId) {
      $('#unduh_folderNameLabel').html('<i class="fas fa-spinner fa-spin mr-2"></i> MEMUAT...');
      
      if ($.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
          UNDUH_TABEL_INSTANCE.clear().draw(false);
          $('.dataTables_empty').html('<div class="py-5 text-center text-muted"><i class="fas fa-circle-notch fa-spin fa-2x mb-3 text-maroon"></i><br>Membuka Folder...</div>');
      } else {
          $('#unduh_tableState').hide();
          unduh_renderSkeleton();
          $('#unduh_skeletonState').show();
      }
      
      google.script.run
        .withSuccessHandler(unduh_renderArsipTable)
        .withFailureHandler(function(err) {
           var errMsg = unduh_escapeHtml(err.message);
           if ($.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
               $('.dataTables_empty').html('<div class="py-5 text-center text-danger"><i class="fas fa-wifi fa-2x mb-3"></i><br>Gagal memuat folder:<br>' + errMsg + '</div>');
           } else {
               $('#unduh_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + errMsg + '</h6></div>');
           }
           $('#unduh_folderNameLabel').text('ERROR');
        })
        .getSiabaUnduhData(folderId);
  }

  // =================================================================
  // 3. RENDER ENGINE: PURE ARRAY PUSH (ANTI-GLITZ)
  // =================================================================
  function unduh_renderArsipTable(data) {
      if (data.error) {
          var errTxt = unduh_escapeHtml(data.error);
          if ($.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
              $('.dataTables_empty').html('<div class="py-5 text-center text-danger"><i class="fas fa-exclamation-triangle fa-2x mb-3"></i><br>' + errTxt + '</div>');
          } else {
              $('#unduh_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + errTxt + '</h6></div>');
          }
          $('#unduh_folderNameLabel').text('ERROR AKSES');
          return;
      }

      UNDUH_CURRENT_FOLDER = data.currentId;
      UNDUH_PARENT_FOLDER = data.parentId;
      
      $('#unduh_folderNameLabel').text(data.currentName);
      $('#unduh_totalItemCount').text(data.items ? data.items.length : 0);
      
      if (data.isRoot) $('#unduh_btnBack').hide();
      else $('#unduh_btnBack').show();

      var items = data.items || [];
      var dtArray = [];

      for(var j=0; j<items.length; j++) {
          var item = items[j];
          var arrRow = [];
          var iconHtml = '';
          var btnAction = '';
          var nameHtml = '';
          var safeName = unduh_escapeHtml(item.name);

          if (item.type === 'folder') {
              iconHtml = '<i class="fas fa-folder text-gold-sultan mr-2 fa-lg"></i>';
              nameHtml = '<span class="font-weight-bold text-dark text-nowrap">' + safeName + '</span>';
              btnAction = '<button type="button" class="btn btn-sm btn-outline-primary shadow-sm px-3 font-weight-bold btn-aksi-sultan unduh-btn-folder" data-id="' + item.id + '">Buka Folder</button>';
          } 
          else {
              var mime = item.mimeType;
              if (mime.indexOf('pdf') !== -1) iconHtml = '<i class="fas fa-file-pdf text-danger mr-2 fa-lg"></i>';
              else if (mime.indexOf('image') !== -1) iconHtml = '<i class="fas fa-file-image text-purple-sultan mr-2 fa-lg"></i>';
              else if (mime.indexOf('spreadsheet') !== -1 || mime.indexOf('excel') !== -1) iconHtml = '<i class="fas fa-file-excel text-green-sultan mr-2 fa-lg"></i>';
              else if (mime.indexOf('document') !== -1 || mime.indexOf('word') !== -1) iconHtml = '<i class="fas fa-file-word text-blue-sultan mr-2 fa-lg"></i>';
              else iconHtml = '<i class="fas fa-file text-secondary mr-2 fa-lg"></i>';

              nameHtml = '<span class="text-dark font-weight-bold">' + safeName + '</span>';
              btnAction = '<div class="d-flex flex-nowrap justify-content-center"><button type="button" class="btn btn-sm btn-success shadow-sm px-3 font-weight-bold btn-aksi-sultan unduh-btn-file" data-id="' + item.id + '" data-mime="' + item.mimeType + '"><i class="fas fa-eye mr-1"></i> LIHAT & UNDUH</button></div>';
          }

          arrRow.push('<span class="text-muted font-weight-bold small">' + (j + 1) + '</span>');
          arrRow.push('<div class="d-flex align-items-center">' + iconHtml + ' ' + nameHtml + '</div>');
          arrRow.push('<span class="small font-weight-bold text-muted">' + item.size + '</span>');
          arrRow.push('<span class="small font-weight-bold text-muted">' + item.date + '</span>');
          arrRow.push(btnAction);

          dtArray.push(arrRow);
      }

      if (!$.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
          UNDUH_TABEL_INSTANCE = $('#unduh_tabelUtama').DataTable({
              "data": dtArray,
              "destroy": true,
              "ordering": false, "pageLength": 10, "autoWidth": false,
              "deferRender": true, 
              "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                     "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                     "<'row mt-3'<'col-sm-12 col-md-5 small text-muted'i><'col-sm-12 col-md-7'p>>",
              "language": { 
                  "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", 
                  "search": "", "searchPlaceholder": "Cari File...",
                  "emptyTable": '<div class="py-5 text-center text-muted"><i class="fas fa-folder-open fa-3x mb-3 opacity-30"></i><br>Folder ini kosong.</div>' 
              },
              "columnDefs": [
                  { "targets": [0,2,3,4], "className": "text-center align-middle" },
                  { "targets": 1, "className": "text-left align-middle px-3" }
              ]
          });
          
          $('#unduh_skeletonState').hide();
          $('#unduh_tableState').show();
          setTimeout(function(){ UNDUH_TABEL_INSTANCE.columns.adjust(); }, 150);

      } else {
          UNDUH_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
          
          if ($('#unduh_tableState').is(':hidden')) {
              $('#unduh_skeletonState').hide();
              $('#unduh_tableState').show();
          }
      }
  }

  function unduh_renderSkeleton() {
      var rows = 6;
      var html = '<div class="table-responsive sultan-scroll border rounded overflow-hidden">' +
                 '<table class="table mb-0">' +
                 '<thead><tr class="bg-light">';
      
      for(var h=0; h<5; h++) {
          html += '<th class="py-2 px-3"><div class="sultan-skeleton m-auto" style="height: 14px; width: 60%;"></div></th>';
      }
      
      html += '</tr></thead><tbody>';
      
      for(var i=0; i<rows; i++) {
          html += '<tr>' +
                  '<td class="text-center"><div class="sultan-skeleton m-auto" style="height: 12px; width: 20px;"></div></td>' +
                  '<td><div class="d-flex align-items-center"><div class="sultan-skeleton mr-2" style="height: 20px; width: 20px; border-radius: 4px;"></div><div class="sultan-skeleton" style="height: 12px; width: 70%;"></div></div></td>' +
                  '<td><div class="sultan-skeleton m-auto" style="height: 12px; width: 50px;"></div></td>' +
                  '<td><div class="sultan-skeleton m-auto" style="height: 12px; width: 80px;"></div></td>' +
                  '<td><div class="sultan-skeleton m-auto" style="height: 24px; width: 100px; border-radius: 4px;"></div></td>' +
                  '</tr>';
      }
      
      html += '</tbody></table></div>';
      
      // SAFE SET
      var container = document.getElementById('unduh_skeletonState');
      if (container) { container.innerHTML = html; }
  }

  // =================================================================
  // 4. KONTROL NAVIGASI
  // =================================================================
  function unduh_navigateUp() { if (UNDUH_PARENT_FOLDER) unduh_loadFolder(UNDUH_PARENT_FOLDER); }
  function unduh_goHome() { unduh_loadFolder(null); }
  function unduh_refreshFolder() { unduh_loadFolder(UNDUH_CURRENT_FOLDER); }

  // =================================================================
  // 5. PREVIEW & DOWNLOAD MODAL
  // =================================================================
  function unduh_openPreview(fileId, mimeType) {
      if (mimeType === 'application/vnd.google-apps.folder') return;

      var previewUrl = 'https://drive.google.com/file/d/' + fileId + '/preview';
      var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + fileId;

      $('#unduh_loadingPreviewPDF').removeClass('d-none');
      $('#unduh_framePreview').addClass('d-none').attr('src', previewUrl);
      $('#unduh_btnDownloadFinal').attr('href', downloadUrl);

      $('#unduh_modalPreview').modal('show');

      $('#unduh_framePreview').off('load').on('load', function() {
          $('#unduh_loadingPreviewPDF').addClass('d-none');
          $(this).removeClass('d-none');
      });

      setTimeout(function() {
          $('#unduh_loadingPreviewPDF').addClass('d-none');
          $('#unduh_framePreview').removeClass('d-none');
      }, 2500);
  }
</script>

<style>
/* SULTAN ULTRA-COMPACT TABLE OVERRIDES */
#unduh_tabelUtama thead th { 
    font-size: 0.72rem !important; 
    font-weight: 800; 
    text-transform: uppercase; 
    border-bottom: 2px solid #adb5bd !important; 
    padding: 2px 4px !important; 
    letter-spacing: 0.2px; 
    line-height: 1.1 !important;
    background-color: #dee2e6 !important;
    color: #1a202c !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 10 !important;
}

#unduh_tabelUtama tbody td { 
    padding: 0px 8px !important; 
    border-bottom: 1px solid #f1f5f9; 
    line-height: 1.0 !important; 
    position: relative !important; 
}

#unduh_tabelUtama tbody tr:hover td::after { 
    content: ""; 
    position: absolute; 
    top: 0; left: 0; right: 0; bottom: 0; 
    background-color: rgba(0, 0, 0, 0.05); 
    pointer-events: none; 
    z-index: 2; 
}

.btn-sultan-nav {
    border: 1px solid #dee2e6 !important;
    padding: 0.25rem 0.5rem !important;
    border-radius: 6px !important;
    transition: all 0.2s ease;
}

.btn-sultan-nav:hover {
    background-color: #f8f9fa !important;
    border-color: #adb5bd !important;
    transform: translateY(-1px);
}

.text-gold-sultan { color: #d4af37 !important; }
.text-purple-sultan { color: #6b46c1 !important; }
.text-green-sultan { color: #2f855a !important; }
.text-blue-sultan { color: #2b6cb0 !important; }
</style>
