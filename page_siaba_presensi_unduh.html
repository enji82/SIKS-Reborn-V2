<div class="flex flex-col gap-4 md:gap-6 2xl:gap-7.5 animate-reveal">

  <!-- NAVIGATION & FOLDER BAR -->
  <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark">
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
      
      <div class="flex flex-wrap items-center gap-2.5 w-full sm:w-auto">
        <button type="button" id="unduh_btnHome" class="flex items-center justify-center rounded border border-stroke dark:border-strokedark hover:bg-gray-2 dark:hover:bg-meta-4 py-2 px-3 text-center transition" title="Folder Utama">
          <i class="fas fa-home text-primary"></i>
        </button>

        <button type="button" id="unduh_btnBack" class="flex items-center justify-center rounded border border-stroke dark:border-strokedark hover:bg-gray-2 dark:hover:bg-meta-4 py-2 px-3 text-center transition" title="Kembali" style="display:none;">
          <i class="fas fa-level-up-alt text-black dark:text-white"></i>
        </button>

        <button type="button" id="unduh_btnRefresh" class="flex items-center justify-center rounded border border-stroke dark:border-strokedark hover:bg-gray-2 dark:hover:bg-meta-4 py-2 px-3 text-center transition" title="Refresh Folder Ini">
          <i class="fas fa-sync-alt text-primary"></i>
        </button>

        <div class="hidden sm:block h-8 w-px bg-stroke dark:bg-strokedark mx-1"></div>

        <div class="flex items-center bg-gray-2 dark:bg-meta-4 px-4 py-2 rounded-md border border-stroke dark:border-strokedark flex-grow sm:flex-grow-0" style="min-width: 250px;">
            <i class="fas fa-folder-open text-[#FFB018] mr-3"></i>
            <span id="unduh_folderNameLabel" class="font-bold text-black dark:text-white text-sm uppercase tracking-wide">MEMUAT...</span>
        </div>
      </div>

      <div class="text-sm font-medium text-body dark:text-bodydark">
          TOTAL ITEM: <span id="unduh_totalItemCount" class="text-primary font-bold">0</span>
      </div>
      
    </div>
  </div>

  <!-- TABLE CONTAINER -->
  <div class="rounded-sm border border-stroke bg-white px-5 pt-6 pb-2.5 shadow-default dark:border-strokedark dark:bg-boxdark sm:px-7.5 xl:pb-1">
      <div id="unduh_skeletonState">
          <!-- SKELETON RENDERED VIA JS -->
      </div>

      <div id="unduh_tableState" style="display: none;" class="overflow-x-auto w-full custom-scrollbar pb-4">
          <table id="unduh_tabelUtama" class="w-full table-auto text-sm" style="border-collapse: separate !important; border-spacing: 0 !important;">
            <thead>
              <tr class="bg-gray-2 dark:bg-meta-4 text-left">
                <th class="text-center py-3 px-4 font-semibold text-black dark:text-white border-b border-stroke dark:border-strokedark" style="width: 40px;">No</th>
                <th class="text-left py-3 px-4 font-semibold text-black dark:text-white border-b border-stroke dark:border-strokedark">Nama File / Folder</th>
                <th class="text-center py-3 px-4 font-semibold text-black dark:text-white border-b border-stroke dark:border-strokedark" style="width: 100px;">Ukuran</th>
                <th class="text-center py-3 px-4 font-semibold text-black dark:text-white border-b border-stroke dark:border-strokedark" style="width: 150px;">Tanggal</th>
                <th class="text-center py-3 px-4 font-semibold text-black dark:text-white border-b border-stroke dark:border-strokedark" style="width: 120px;">Aksi</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
      </div>
  </div>

</div>

<!-- PREVIEW MODAL -->
<div class="modal fade" id="unduh_modalPreview" tabindex="-1" role="dialog" data-backdrop="static">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 95vw; height: 95vh; margin: 2.5vh auto;" role="document"> 
    <div class="modal-content border-0 shadow-default dark:bg-boxdark h-full flex flex-col rounded-md overflow-hidden bg-white"> 
      
      <!-- Modal Header -->
      <div class="flex justify-between items-center px-4 py-3 border-b border-stroke dark:border-strokedark bg-gray-2 dark:bg-meta-4 shrink-0">
        <div class="flex items-center gap-3">
            <i class="fas fa-file-pdf text-danger text-lg"></i>
            <h3 class="font-bold text-black dark:text-white text-base">Pratinjau Dokumen Rekap</h3>
        </div>
        <div class="flex items-center gap-2 sm:gap-4">
            <a href="#" id="unduh_linkDownloadHeader" class="text-sm font-medium text-primary hover:text-opacity-80" target="_blank" title="Unduh File"><i class="fas fa-download mr-1"></i> UNDUH</a>
            <a href="#" id="unduh_linkTabHeader" class="text-sm font-medium text-meta-5 hover:text-opacity-80 border-l border-stroke dark:border-strokedark pl-2 sm:pl-4" target="_blank" title="Buka di Tab Baru"><i class="fas fa-external-link-alt mr-1"></i> TAB BARU</a>
            
            <button type="button" class="text-black dark:text-white hover:text-danger border-l border-stroke dark:border-strokedark pl-2 sm:pl-4 transition" data-dismiss="modal" aria-label="Close">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
      </div>
      
      <!-- Modal Body -->
      <div class="relative flex-grow w-full bg-body bg-opacity-5 dark:bg-black p-0 m-0 overflow-hidden">
          <iframe id="unduh_framePreview" class="w-full h-full border-0 hidden" src=""></iframe>
          
          <!-- Loading overlay -->
          <div id="unduh_loadingPreviewPDF" class="absolute inset-0 flex flex-col items-center justify-center bg-white dark:bg-boxdark z-10 transition-opacity">
              <div class="h-10 w-10 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent mb-4"></div>
              <p class="text-sm font-bold text-body dark:text-bodydark tracking-widest uppercase">MEMUAT DOKUMEN...</p>
          </div>
      </div>
    </div>
  </div>
</div>

<script>
  // =================================================================
  // ISOLASI VARIABEL GLOBAL (PREFIX UNDUH_ MUTLAK)
  // =================================================================
  function unduh_escapeHtml(text) { 
      if(!text) return ""; 
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
  }

  var UNDUH_CURRENT_FOLDER = null; 
  var UNDUH_PARENT_FOLDER = null;
  var UNDUH_TABEL_INSTANCE = null;

  // =================================================================
  // 1. INITIALIZATION & VAKSIN SPA EVENT DELEGATION
  // =================================================================
  $(document).ready(function() {
      
      $(document).off('click', '#unduh_btnHome').on('click', '#unduh_btnHome', unduh_goHome);
      $(document).off('click', '#unduh_btnBack').on('click', '#unduh_btnBack', unduh_navigateUp);
      $(document).off('click', '#unduh_btnRefresh').on('click', '#unduh_btnRefresh', unduh_refreshFolder);
      
      $(document).off('click', '.unduh-btn-folder').on('click', '.unduh-btn-folder', function(e) {
          e.stopPropagation();
          unduh_loadFolder($(this).data('id'));
      });
      $(document).off('click', '.unduh-btn-file').on('click', '.unduh-btn-file', function(e) {
          e.stopPropagation();
          unduh_openPreview($(this).data('id'), $(this).data('mime'));
      });

      $('#unduh_modalPreview').on('hidden.bs.modal', function () {
          $('#unduh_framePreview').attr('src', '').addClass('d-none');
          $('#unduh_loadingPreviewPDF').removeClass('d-none');
      });

      $('#unduh_tabelUtama tbody').on('click', 'tr', function(e) {
          if ($(e.target).is('button') || $(e.target).closest('button').length) return;
          var btn = $(this).find('button.btn-aksi-sultan');
          if(btn.length > 0) { btn[0].click(); }
      });

      unduh_goHome(); 
  });

  // =================================================================
  // 2. LOGIKA LOAD FOLDER (ZERO-BLINK FETCH)
  // =================================================================
  function unduh_loadFolder(folderId) {
      $('#unduh_folderNameLabel').html('<i class="fas fa-spinner fa-spin mr-2"></i> MEMUAT...');
      
      // SULTAN UX: Selalu tampilkan skeleton saat transisi folder (Anti-Spinner)
      $('#unduh_tableState').hide();
      unduh_renderSkeleton();
      $('#unduh_skeletonState').show();
      
      google.script.run
        .withSuccessHandler(unduh_renderArsipTable)
        .withFailureHandler(function(err) {
           var errMsg = unduh_escapeHtml(err.message);
           if ($.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
               $('.dataTables_empty').html('<div class="py-5 text-center text-danger"><i class="fas fa-wifi fa-2x mb-3"></i><br>Gagal memuat folder:<br>' + errMsg + '</div>');
           } else {
               $('#unduh_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + errMsg + '</h6></div>');
           }
           $('#unduh_folderNameLabel').text('ERROR');
        })
        .getSiabaUnduhData(folderId);
  }

  // =================================================================
  // 3. RENDER ENGINE: PURE ARRAY PUSH (ANTI-GLITZ)
  // =================================================================
  function unduh_renderArsipTable(data) {
      if (data.error) {
          var errTxt = unduh_escapeHtml(data.error);
          if ($.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
              $('.dataTables_empty').html('<div class="py-5 text-center text-danger"><i class="fas fa-exclamation-triangle fa-2x mb-3"></i><br>' + errTxt + '</div>');
          } else {
              $('#unduh_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + errTxt + '</h6></div>');
          }
          $('#unduh_folderNameLabel').text('ERROR AKSES');
          return;
      }

      UNDUH_CURRENT_FOLDER = data.currentId;
      UNDUH_PARENT_FOLDER = data.parentId;
      
      $('#unduh_folderNameLabel').text(data.currentName);
      $('#unduh_totalItemCount').text(data.items ? data.items.length : 0);
      
      if (data.isRoot) $('#unduh_btnBack').hide();
      else $('#unduh_btnBack').show();

      var items = data.items || [];
      var dtArray = [];

      for(var j=0; j<items.length; j++) {
          var item = items[j];
          var arrRow = [];
          var iconHtml = '';
          var btnAction = '';
          var nameHtml = '';
          var safeName = unduh_escapeHtml(item.name);

          if (item.type === 'folder') {
              iconHtml = '<i class="fas fa-folder text-[#FFB018] mr-3 text-lg"></i>';
              nameHtml = '<span class="font-bold text-black dark:text-white text-base truncate block max-w-[200px] sm:max-w-[400px] cursor-pointer hover:text-primary transition unduh-btn-folder" data-id="' + item.id + '">' + safeName + '</span>';
              btnAction = '<button type="button" class="inline-flex rounded border border-primary px-3 py-1.5 text-xs font-medium text-primary hover:bg-primary hover:text-white transition unduh-btn-folder" data-id="' + item.id + '">Buka Folder</button>';
          } 
          else {
              var mime = item.mimeType;
              if (mime.indexOf('pdf') !== -1) iconHtml = '<i class="fas fa-file-pdf text-danger mr-3 text-lg"></i>';
              else if (mime.indexOf('image') !== -1) iconHtml = '<i class="fas fa-file-image text-meta-5 mr-3 text-lg"></i>';
              else if (mime.indexOf('spreadsheet') !== -1 || mime.indexOf('excel') !== -1) iconHtml = '<i class="fas fa-file-excel text-meta-3 mr-3 text-lg"></i>';
              else if (mime.indexOf('document') !== -1 || mime.indexOf('word') !== -1) iconHtml = '<i class="fas fa-file-word text-primary mr-3 text-lg"></i>';
              else iconHtml = '<i class="fas fa-file text-body dark:text-bodydark mr-3 text-lg"></i>';

              nameHtml = '<span class="font-medium text-black dark:text-white text-sm truncate block max-w-[200px] sm:max-w-[400px]">' + safeName + '</span>';
              btnAction = '<button type="button" class="inline-flex items-center gap-1.5 rounded bg-meta-3 px-3 py-1.5 text-xs font-medium text-white hover:bg-opacity-90 transition unduh-btn-file" data-id="' + item.id + '" data-mime="' + item.mimeType + '"><i class="fas fa-eye"></i> LIHAT</button>';
          }

          arrRow.push('<span class="text-body dark:text-bodydark font-medium text-sm">' + (j + 1) + '</span>');
          arrRow.push('<div class="flex items-center">' + iconHtml + nameHtml + '</div>');
          arrRow.push('<span class="text-sm font-medium text-body dark:text-bodydark">' + item.size + '</span>');
          arrRow.push('<span class="text-sm font-medium text-body dark:text-bodydark">' + item.date + '</span>');
          arrRow.push('<div class="flex justify-center">' + btnAction + '</div>');

          dtArray.push(arrRow);
      }

      if (!$.fn.DataTable.isDataTable('#unduh_tabelUtama')) {
          UNDUH_TABEL_INSTANCE = $('#unduh_tabelUtama').DataTable({
              "data": dtArray,
              "destroy": true,
              "ordering": false, "pageLength": 10, "autoWidth": false,
              "deferRender": true, 
              "dom": "<'flex flex-col sm:flex-row justify-between items-center mb-4 gap-4'<'w-full sm:w-auto text-sm'l><'w-full sm:w-auto text-sm'f>>" +
                     "<'w-full overflow-x-auto dt-scroll-parent custom-scrollbar'tr>" +
                     "<'flex flex-col sm:flex-row justify-between items-center mt-4 gap-4'<'w-full sm:w-auto text-sm text-body dark:text-bodydark'i><'w-full sm:w-auto mt-2 sm:mt-0 text-sm'p>>",
              "language": { 
                  "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", 
                  "search": "", "searchPlaceholder": "Cari File/Folder...",
                  "emptyTable": '<div class="py-10 text-center"><i class="fas fa-folder-open text-5xl mb-4 text-body dark:text-bodydark opacity-50"></i><br><p class="text-black dark:text-white font-medium text-lg">Folder ini kosong</p></div>' 
              },
              "columnDefs": [
                  { "targets": [0,2,3,4], "className": "text-center align-middle border-b border-stroke dark:border-strokedark px-4 py-3" },
                  { "targets": 1, "className": "text-left align-middle px-4 py-3 border-b border-stroke dark:border-strokedark" }
              ]
          });
          
          $('#unduh_skeletonState').hide();
          $('#unduh_tableState').show();
          setTimeout(function(){ UNDUH_TABEL_INSTANCE.columns.adjust(); }, 150);

      } else {
          UNDUH_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
          
          if ($('#unduh_tableState').is(':hidden')) {
              $('#unduh_skeletonState').hide();
              $('#unduh_tableState').show();
          }
      }
  }

  function unduh_renderSkeleton() {
      var rows = 6;
      var html = '<div class="rounded-sm border border-stroke bg-white dark:border-strokedark dark:bg-boxdark overflow-hidden w-full">' +
                 '<table class="w-full table-auto">' +
                 '<thead><tr class="bg-gray-2 dark:bg-meta-4">';
      
      for(var h=0; h<5; h++) {
          html += '<th class="py-3 px-4"><div class="h-4 bg-stroke dark:bg-strokedark animate-pulse rounded w-2/3 mx-auto"></div></th>';
      }
      
      html += '</tr></thead><tbody>';
      
      for(var i=0; i<rows; i++) {
          html += '<tr class="border-b border-stroke dark:border-strokedark">' +
                  '<td class="py-3 px-4 text-center"><div class="h-3 w-6 bg-stroke dark:bg-strokedark animate-pulse rounded mx-auto"></div></td>' +
                  '<td class="py-3 px-4"><div class="flex items-center gap-3"><div class="h-5 w-5 bg-stroke dark:bg-strokedark animate-pulse rounded"></div><div class="h-3 w-48 bg-stroke dark:bg-strokedark animate-pulse rounded"></div></div></td>' +
                  '<td class="py-3 px-4"><div class="h-3 w-12 bg-stroke dark:bg-strokedark animate-pulse rounded mx-auto"></div></td>' +
                  '<td class="py-3 px-4"><div class="h-3 w-20 bg-stroke dark:bg-strokedark animate-pulse rounded mx-auto"></div></td>' +
                  '<td class="py-3 px-4"><div class="h-6 w-20 bg-stroke dark:bg-strokedark animate-pulse rounded mx-auto"></div></td>' +
                  '</tr>';
      }
      
      html += '</tbody></table></div>';
      
      // SAFE SET
      var container = document.getElementById('unduh_skeletonState');
      if (container) { container.innerHTML = html; }
  }

  // =================================================================
  // 4. KONTROL NAVIGASI
  // =================================================================
  function unduh_navigateUp() { if (UNDUH_PARENT_FOLDER) unduh_loadFolder(UNDUH_PARENT_FOLDER); }
  function unduh_goHome() { unduh_loadFolder(null); }
  function unduh_refreshFolder() { unduh_loadFolder(UNDUH_CURRENT_FOLDER); }

  // =================================================================
  // 5. PREVIEW & DOWNLOAD MODAL
  // =================================================================
  function unduh_openPreview(fileId, mimeType) {
      if (mimeType === 'application/vnd.google-apps.folder') return;

      var previewUrl = 'https://drive.google.com/file/d/' + fileId + '/preview';
      var downloadUrl = 'https://drive.google.com/uc?export=download&id=' + fileId;

      $('#unduh_loadingPreviewPDF').removeClass('d-none');
      $('#unduh_framePreview').addClass('d-none').attr('src', previewUrl);
      
      // Update header links
      $('#unduh_linkDownloadHeader').attr('href', downloadUrl);
      $('#unduh_linkTabHeader').attr('href', 'https://drive.google.com/file/d/' + fileId + '/view');

      $('#unduh_modalPreview').modal('show');

      $('#unduh_framePreview').off('load').on('load', function() {
          $('#unduh_loadingPreviewPDF').addClass('d-none');
          $(this).removeClass('d-none');
      });

      setTimeout(function() {
          $('#unduh_loadingPreviewPDF').addClass('d-none');
          $('#unduh_framePreview').removeClass('d-none');
      }, 2500);
  }
</script>

<style>
/* SULTAN ULTRA-COMPACT TABLE OVERRIDES */
#unduh_tabelUtama thead th { 
    font-size: 0.72rem !important; 
    font-weight: 800; 
    text-transform: uppercase; 
    border-bottom: 1px solid var(--color-stroke) !important; 
    padding: 12px 16px !important; 
    letter-spacing: 0.2px; 
    position: sticky !important;
    top: 0 !important;
    z-index: 10 !important;
}

#unduh_tabelUtama tbody td { 
    border-bottom: 1px solid var(--color-stroke) !important; 
    position: relative !important; 
    padding-top: 8px !important;
    padding-bottom: 8px !important;
}

/* Hover Background Effect */
#unduh_tabelUtama tbody tr:hover td::after { 
    content: ""; 
    position: absolute; 
    top: 0; left: 0; right: 0; bottom: 0; 
    background-color: var(--color-gray-2); 
    pointer-events: none; 
    z-index: 2; 
}
.dark #unduh_tabelUtama tbody tr:hover td::after { 
    background-color: var(--color-meta-4); 
}

/* Prevent tooltip hiding */
.modal-open .modal { overflow-x: hidden; overflow-y: auto; }
</style>
