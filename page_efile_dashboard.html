<div class="flex flex-col gap-4 md:gap-6 2xl:gap-7.5 animate-reveal">

  <!-- 1. FILTER BAR -->
  <div class="rounded-sm border border-stroke bg-white px-5 py-4 shadow-default dark:border-strokedark dark:bg-boxdark">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div class="flex flex-wrap items-center gap-4">
        <!-- Kategori -->
        <select id="efiledash_filterKategori" class="rounded border border-stroke bg-transparent py-2 px-4 text-sm font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark text-primary">
            <option value="">- Memuat Kategori... -</option>
        </select>
        <!-- Tahun -->
        <select id="efiledash_filterTahun" class="rounded border border-stroke bg-transparent py-2 px-4 text-sm font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark">
            <option value="SEMUA">- Semua Tahun -</option>
        </select>
        <!-- Unit (Admin Only) -->
        <div id="efiledash_filterContainer" style="display: none;">
            <select id="efiledash_filterUnit" class="rounded border border-stroke bg-gray-2 dark:bg-strokedark py-2 px-4 text-sm font-bold outline-none transition focus:border-primary active:border-primary dark:border-strokedark" disabled>
                <option value="">- Memvalidasi Akses... -</option>
            </select>
        </div>
      </div>
      <div>
        <button type="button" id="efiledash_btnRefresh" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-stroke bg-white text-body hover:text-primary dark:border-strokedark dark:bg-boxdark shadow-sm">
            <i class="fab fa-gg"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 2. LOADING STATE -->
  <div id="efiledash_loadingState">
    <div class="flex flex-col items-center justify-center py-20">
        <div class="h-16 w-16 animate-spin rounded-full border-4 border-solid border-primary border-t-transparent"></div>
        <h6 class="mt-5 font-bold text-black dark:text-white" id="efiledash_loadingText">MEMPERSIAPKAN ENGINE DASBOR...</h6>
    </div>
  </div>

  <!-- 3. DASHBOARD CONTENT -->
  <div id="efiledash_dashboardState" style="display: none;" class="flex flex-col gap-4 md:gap-6 2xl:gap-7.5">
    
    <!-- KPI Metrics -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <!-- Target Sasaran -->
        <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-meta-2 dark:bg-meta-4 mb-3">
                <i class="fas fa-users text-primary text-xl"></i>
            </div>
            <div>
                <h4 class="text-2xl font-bold text-black dark:text-white" id="efiledash_cardTotalAsn">0</h4>
                <span class="text-sm font-medium text-body">Target Sasaran Pegawai</span>
            </div>
        </div>
        <!-- Sudah Unggah -->
        <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark">
            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-success/10 mb-3">
                <i class="fas fa-check-circle text-success text-xl"></i>
            </div>
            <div>
                <h4 class="text-2xl font-bold text-black dark:text-white" id="efiledash_cardSudah">0</h4>
                <span class="text-sm font-medium text-body">Sudah Unggah Berkas</span>
            </div>
        </div>
        <!-- Belum Unggah -->
        <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark border-l-4 border-l-danger">
            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-danger/10 mb-3">
                <i class="fas fa-times-circle text-danger text-xl"></i>
            </div>
            <div>
                <h4 class="text-2xl font-bold text-black dark:text-white" id="efiledash_cardBelum">0</h4>
                <span class="text-sm font-medium text-body">Belum Unggah Berkas</span>
            </div>
        </div>
    </div>

    <!-- Data Sections -->
    <div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
        <!-- Rekap Table -->
        <div class="col-span-1 lg:col-span-8 rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark overflow-hidden">
            <div class="border-b border-stroke py-4 px-6.5 dark:border-strokedark flex items-center justify-between">
                <h3 class="font-bold text-black dark:text-white flex items-center gap-2">
                    <i class="fas fa-building text-primary"></i> Rekapitulasi per Unit Kerja
                </h3>
                <span class="inline-flex rounded-full bg-primary/10 py-1 px-3 text-xs font-medium text-primary" id="efiledash_lblTableKategori">Loading...</span>
            </div>
            <div class="p-4 overflow-x-auto">
                <table id="efiledash_tabelRekap" class="w-full table-auto border-collapse">
                    <thead>
                        <tr class="bg-gray-2 text-left dark:bg-meta-4">
                            <th class="py-4 px-4 font-medium text-black dark:text-white">Unit Kerja</th>
                            <th class="py-4 px-4 font-medium text-black dark:text-white text-center">Jml Pegawai</th>
                            <th class="py-4 px-4 font-medium text-black dark:text-white text-center">Sudah</th>
                            <th class="py-4 px-4 font-medium text-black dark:text-white text-center text-danger">Belum</th>
                            <th class="py-4 px-4 font-medium text-black dark:text-white text-center">Capaian</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Belum Unggah List -->
        <div class="col-span-1 lg:col-span-4 rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark overflow-hidden">
            <div class="border-b border-stroke py-4 px-6.5 dark:border-strokedark flex items-center justify-between bg-danger/[0.03]">
                <h3 class="font-bold text-danger flex items-center gap-2">
                    <i class="fas fa-user-times"></i> Belum Unggah
                </h3>
                <button type="button" id="efiledash_btnSalinWa" class="text-xs font-bold text-primary hover:underline">
                    <i class="fas fa-copy"></i> SALIN (WA)
                </button>
            </div>
            <div class="p-4 bg-gray-2 dark:bg-strokedark">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2">
                        <i class="fas fa-search text-body"></i>
                    </span>
                    <input type="text" id="efiledash_inputCariBelum" placeholder="Cari nama / instansi..." class="w-full rounded-full border border-stroke bg-white py-2 pl-12 pr-4 outline-none transition focus:border-primary dark:border-strokedark dark:bg-boxdark shadow-sm text-sm">
                </div>
            </div>
            <div class="max-h-[400px] overflow-y-auto sultan-scroll">
                <ul class="flex flex-col" id="efiledash_listBelum">
                    <li class="flex items-center justify-center py-10 text-body">
                        <i class="fas fa-spinner fa-spin mr-2"></i> Memuat daftar...
                    </li>
                </ul>
            </div>
        </div>
    </div>
  </div>

</div>
  </div>
</section>

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL (MASTER BLUEPRINT V8)
// ======================================================================
var EFILEDASH_CACHE_REKAP = [];
var EFILEDASH_CACHE_BELUM = [];
var EFILEDASH_KATEGORI_MAP = []; // Menyimpan A:Rekap, B:Lapor
var EFILEDASH_TABEL_INSTANCE = null;
var EFILEDASH_PENDING_REQ = 0; 

var EFILEDASH_USER_AKTIF = "";
var EFILEDASH_IS_ADMIN = false;
var EFILEDASH_UNIT_TERKUNCI = ""; 
var EFILEDASH_USER_NPSN = "";

// =================================================================
// 1. INITIALIZATION & DELEGATION
// =================================================================
$(document).ready(function() {
    EFILEDASH_TABEL_INSTANCE = null;
    $('#efiledash_dashboardState').hide();
    $('#efiledash_loadingState').show();
    $('#efiledash_filterContainer').hide();

    try {
        var user = typeof getSesiUser === 'function' ? getSesiUser() : {};
        EFILEDASH_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        var rStr = String(user.role || "").toLowerCase();
        EFILEDASH_IS_ADMIN = (typeof checkUserRoleIsAdmin==='function' && checkUserRoleIsAdmin()) || rStr.includes("admin") || rStr.includes("verifikator");
        EFILEDASH_USER_NPSN = user.npsn || user.unit || user.username || ""; 
    } catch(e) { EFILEDASH_USER_NPSN = ""; EFILEDASH_IS_ADMIN = false; }
    
    $(document).off('click', '#efiledash_btnRefresh').on('click', '#efiledash_btnRefresh', function() {
        var k = $('#efiledash_filterKategori').val(); if(k) efiledash_loadDataKategori(k);
    }); 
    
    $(document).off('change', '#efiledash_filterKategori').on('change', '#efiledash_filterKategori', function() {
        var k = $(this).val(); if(k) efiledash_loadDataKategori(k);
    });

    $(document).off('change', '#efiledash_filterUnit, #efiledash_filterTahun').on('change', '#efiledash_filterUnit, #efiledash_filterTahun', efiledash_terapkanFilterLokal);
    $(document).off('click', '#efiledash_btnSalinWa').on('click', '#efiledash_btnSalinWa', efiledash_salinKeWA);

    $(document).off('keyup', '#efiledash_inputCariBelum').on('keyup', '#efiledash_inputCariBelum', function() {
        var val = $(this).val().toLowerCase();
        $('.efiledash-item-belum').filter(function() { $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1); });
    });

    efiledash_initMasterAccess();
});

// =================================================================
// 2. GATEKEEPER & INITIAL SETUP
// =================================================================
function efiledash_initMasterAccess() {
    var targetNpsn = EFILEDASH_IS_ADMIN ? "" : EFILEDASH_USER_NPSN;

    if (EFILEDASH_IS_ADMIN) {
        $('#efiledash_filterContainer').show();
        $('#efiledash_filterUnit').empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
    } else if (!EFILEDASH_USER_NPSN) {
        $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-ban mb-2"></i><br>Akses ditolak: Sesi login tidak valid.</span>'); return;
    }

    google.script.run.withSuccessHandler(function(json) {
        var res = JSON.parse(json);
        if(!res.success) { $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efiledash_escapeHtml(res.message) + '</span>'); return; }
        
        EFILEDASH_KATEGORI_MAP = res.kategori || [];
        if (!EFILEDASH_IS_ADMIN && res.myUnit) {
            EFILEDASH_UNIT_TERKUNCI = res.myUnit;
            $('#efiledash_filterContainer').show();
            $('#efiledash_filterUnit').empty().append($('<option>', {value: EFILEDASH_USER_NPSN, text: EFILEDASH_UNIT_TERKUNCI})).prop('disabled', true);
        }

        if(EFILEDASH_KATEGORI_MAP.length === 0) {
            $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>Belum ada Master Kategori di Sheet Dashboard.</span>'); return;
        }

        var selectKat = $('#efiledash_filterKategori');
        selectKat.empty();
        EFILEDASH_KATEGORI_MAP.forEach(function(k, idx) {
            selectKat.append($('<option>', { value: idx, text: k.namaKategori }));
        });

        // Trigger muat data untuk kategori pertama
        efiledash_loadDataKategori(0);

    }).withFailureHandler(function(err){
        $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + efiledash_escapeHtml(err.message) + '</span>');
    }).getEfileDashboardInit(targetNpsn);
}

// =================================================================
// 3. FETCH DATA SPESIFIK KATEGORI
// =================================================================
function efiledash_loadDataKategori(indexMap) {
    if (EFILEDASH_PENDING_REQ > 0) return; 
    EFILEDASH_PENDING_REQ = 1;

    var mapData = EFILEDASH_KATEGORI_MAP[indexMap];
    if(!mapData) return;

    var btn = $('#efiledash_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    $('#efiledash_filterKategori, #efiledash_filterTahun, #efiledash_filterUnit').prop('disabled', true);

    $('#efiledash_lblTableKategori').text(mapData.namaKategori);

    if (!$.fn.DataTable.isDataTable('#efiledash_tabelRekap')) {
        $('#efiledash_dashboardState').hide();
        $('#efiledash_loadingText').html('Menyinkronkan data dasbor ' + mapData.namaKategori + '...');
        $('#efiledash_loadingState').show();
    }

    google.script.run.withSuccessHandler(function(jsonStr) {
        EFILEDASH_PENDING_REQ = 0;
        btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
        $('#efiledash_filterKategori, #efiledash_filterTahun').prop('disabled', false);
        if(EFILEDASH_IS_ADMIN) $('#efiledash_filterUnit').prop('disabled', false);
        
        var data = JSON.parse(jsonStr);
        if (!data.success) { 
            $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-exclamation-triangle mb-2"></i><br>' + efiledash_escapeHtml(data.message) + '</span>'); return; 
        }
        
        EFILEDASH_CACHE_REKAP = data.rekap || [];
        EFILEDASH_CACHE_BELUM = data.belum || [];
        
        if (EFILEDASH_IS_ADMIN) efiledash_initDropdownUnit();
        efiledash_initDropdownTahun();

        if (!$.fn.DataTable.isDataTable('#efiledash_tabelRekap')) {
            EFILEDASH_TABEL_INSTANCE = $('#efiledash_tabelRekap').DataTable({
                "destroy": true, "ordering": true, "pageLength": 10, "autoWidth": false, "deferRender": true, 
                "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                       "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                       "<'row mt-2'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
                "columnDefs": [ 
                    { "targets": 0, "width": "auto", "className": "col-sticky-left bg-white align-middle border-right text-left font-weight-bold text-nowrap" }, 
                    { "targets": [1,2,3,4], "width": "1%", "className": "text-center align-middle text-nowrap" }
                ],
                "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", "emptyTable": "Tidak ada data pada kategori ini." }
            });
        }

        efiledash_terapkanFilterLokal();

        $('#efiledash_loadingState').hide();
        $('#efiledash_dashboardState').show();
        if(EFILEDASH_TABEL_INSTANCE) { setTimeout(function() { EFILEDASH_TABEL_INSTANCE.columns.adjust(); }, 150); }

    }).withFailureHandler(function(err) {
        EFILEDASH_PENDING_REQ = 0; btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
        $('#efiledash_filterKategori').prop('disabled', false);
        $('#efiledash_loadingText').html('<span class="text-danger"><i class="fas fa-wifi mb-2"></i><br>Koneksi Terputus: ' + efiledash_escapeHtml(err.message) + '</span>');
    }).getEfileDashboardData(mapData.sheetRekap, mapData.sheetLapor); 
}

function efiledash_initDropdownUnit() {
    var unique = new Set();
    EFILEDASH_CACHE_REKAP.forEach(function(r) { var unit = String(r.unit || "").trim(); if(unit) unique.add(unit); });
    var sorted = Array.from(unique).sort();
    var select = $('#efiledash_filterUnit'); var curVal = select.val();
    select.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
    sorted.forEach(function(u) { select.append(`<option value="${efiledash_escapeHtml(u)}">${efiledash_escapeHtml(u)}</option>`); });
    if(curVal && unique.has(curVal)) { select.val(curVal); }
}

function efiledash_initDropdownTahun() {
    var unique = new Set();
    EFILEDASH_CACHE_REKAP.forEach(function(r) { var thn = String(r.tahun || "").trim(); if(thn) unique.add(thn); });
    var sorted = Array.from(unique).sort().reverse(); // Terbaru di atas
    var select = $('#efiledash_filterTahun'); var curVal = select.val();
    select.empty().append('<option value="SEMUA">- Semua Tahun -</option>');
    sorted.forEach(function(t) { select.append(`<option value="${efiledash_escapeHtml(t)}">${efiledash_escapeHtml(t)}</option>`); });
    if(curVal && unique.has(curVal)) { select.val(curVal); }
}

// =================================================================
// 4. ZERO-BLINK FILTERING
// =================================================================
function efiledash_terapkanFilterLokal() {
    var fUnit = EFILEDASH_IS_ADMIN ? String($('#efiledash_filterUnit').val() || "").trim().toUpperCase() : String(EFILEDASH_UNIT_TERKUNCI).trim().toUpperCase();
    var fTahun = String($('#efiledash_filterTahun').val() || "").trim().toUpperCase();
    
    var filterRekap = EFILEDASH_CACHE_REKAP.filter(function(r) {
        if (fUnit !== "SEMUA" && fUnit !== "" && String(r.unit || "").trim().toUpperCase() !== fUnit) return false;
        if (fTahun !== "SEMUA" && fTahun !== "" && String(r.tahun || "").trim().toUpperCase() !== fTahun) return false;
        return true;
    });

    var filterBelum = EFILEDASH_CACHE_BELUM.filter(function(r) {
        if (fUnit !== "SEMUA" && fUnit !== "" && String(r.unit || "").trim().toUpperCase() !== fUnit) return false;
        if (fTahun !== "SEMUA" && fTahun !== "" && String(r.tahun || "").trim().toUpperCase() !== fTahun) return false;
        return true;
    });

    efiledash_renderDashboard(filterRekap, filterBelum);
}

function efiledash_renderDashboard(dataRekap, dataBelum) {
    var totAsn = 0, totSudah = 0, totBelum = 0;
    var dtArray = [];

    dataRekap.forEach(function(r) {
        var cAsn = parseInt(r.jml) || 0;
        var cSudah = parseInt(r.sudah) || 0;
        var cBelum = parseInt(r.belum) || 0;
        
        totAsn += cAsn; totSudah += cSudah; totBelum += cBelum;

        var persen = cAsn === 0 ? 0 : Math.round((cSudah / cAsn) * 100);
        var bgProgress = persen >= 80 ? 'bg-success' : (persen >= 50 ? 'bg-warning' : 'bg-danger');
        
        var uiPersen = `
            <div class="flex items-center justify-center gap-2">
                <span class="text-xs font-bold text-black dark:text-white">${persen}%</span>
                <div class="h-1.5 w-12 rounded-full bg-stroke dark:bg-strokedark overflow-hidden">
                    <div class="h-full ${bgProgress}" style="width: ${persen}%"></div>
                </div>
            </div>`;
        
        var txtUnit = EFILEDASH_IS_ADMIN ? `<div><div class="font-bold text-black dark:text-white">${efiledash_escapeHtml(r.unit)}</div><div class="text-[10px] text-body">Tahun ${r.tahun}</div></div>` : `<div class="font-bold text-black dark:text-white">${efiledash_escapeHtml(r.unit)}</div>`;

        dtArray.push([
            txtUnit,
            `<div class="text-center font-medium">${cAsn}</div>`,
            `<div class="text-center font-medium text-success">${cSudah}</div>`,
            `<div class="text-center font-medium text-danger">${cBelum}</div>`,
            uiPersen
        ]);
    });

    $('#efiledash_cardTotalAsn').text(totAsn.toLocaleString('id-ID'));
    $('#efiledash_cardSudah').text(totSudah.toLocaleString('id-ID'));
    $('#efiledash_cardBelum').text(totBelum.toLocaleString('id-ID'));

    if (EFILEDASH_TABEL_INSTANCE) { EFILEDASH_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false); }

    var uiList = "";
    if (dataBelum.length === 0) {
        uiList = `<li class="list-group-item text-center py-5">
                    <i class="fas fa-check-circle fa-3x text-success mb-3 opacity-50"></i><br>
                    <h6 class="font-weight-bold text-dark">Luar Biasa!</h6>
                    <small class="text-muted">Tidak ada pegawai yang belum unggah untuk filter ini.</small>
                  </li>`;
    } else {
        dataBelum.forEach(function(b) {
            uiList += `
            <li class="flex items-center justify-between border-b border-stroke py-3 px-4.5 last:border-0 hover:bg-gray-2 dark:border-strokedark dark:hover:bg-meta-4 transition efiledash-item-belum" data-unit="${efiledash_escapeHtml(b.unit)}">
                <div class="flex flex-col gap-0.5">
                    <h5 class="text-sm font-bold text-black dark:text-white uppercase">${efiledash_escapeHtml(b.nama)}</h5>
                    <p class="text-xs text-body">${efiledash_escapeHtml(b.nip)}</p>
                    <p class="text-[10px] font-bold text-danger uppercase mt-1">${efiledash_escapeHtml(b.unit)} <span class="text-body opacity-50">(${b.tahun})</span></p>
                </div>
                <div class="flex h-7 w-7 items-center justify-center rounded-full bg-danger/10 text-danger">
                    <i class="fas fa-exclamation-circle text-xs"></i>
                </div>
            </li>`;
        });
    }
    $('#efiledash_listBelum').html(uiList); $('#efiledash_inputCariBelum').val(""); 
}

// =================================================================
// 5. API SALIN KE WHATSAPP (GROUPING CERDAS)
// =================================================================
function efiledash_salinKeWA() {
    var listEl = $('.efiledash-item-belum:visible');
    if (listEl.length === 0) { Sultan.notif.info('Tidak ada data pada daftar untuk disalin.'); return; }
    
    var selNamaKat = $('#efiledash_filterKategori option:selected').text();
    var selTahun = $('#efiledash_filterTahun').val() === "SEMUA" ? "Semua Tahun" : $('#efiledash_filterTahun').val();
    var selUnitFilter = EFILEDASH_IS_ADMIN ? $('#efiledash_filterUnit').val() : EFILEDASH_UNIT_TERKUNCI;
    var namaUnitDisplay = (selUnitFilter === "SEMUA" || selUnitFilter === "") ? "Seluruh Unit" : selUnitFilter;
    
    var teks = `🚨 *DAFTAR BELUM UNGGAH E-FILE* 🚨\n`;
    teks += `Kategori: ${selNamaKat}\n`;
    teks += `Tahun: ${selTahun}\n`;
    teks += `Filter Unit: ${namaUnitDisplay}\n`;
    teks += `Total Belum Unggah: ${listEl.length} Orang\n\n`;

    var mapUnit = {};
    listEl.each(function() {
        var nama = $(this).find('.nama-asn').text().trim();
        var unitRaw = $(this).attr('data-unit') || $(this).find('.unit-asn').text().split('(')[0].trim();
        if(!mapUnit[unitRaw]) { mapUnit[unitRaw] = []; }
        mapUnit[unitRaw].push(nama);
    });

    var sortedUnits = Object.keys(mapUnit).sort();
    sortedUnits.forEach(function(unitName) {
        teks += `🏢 *${unitName}*\n`; 
        var sortedNames = mapUnit[unitName].sort();
        sortedNames.forEach(function(namaASN, idx) { teks += `  ${idx + 1}. ${namaASN}\n`; });
        teks += `\n`; 
    });

    teks += `Mohon segera mengunggah dokumen elektronik Anda melalui sistem SIKS. Terima kasih. 🙏`;

    navigator.clipboard.writeText(teks).then(function() {
        Sultan.notif.sukses('Daftar berhasil disalin ke Clipboard (Siap Paste di WhatsApp).');
    }).catch(function() { Sultan.alert('error', 'Gagal Menyalin', 'Browser Anda tidak mendukung Clipboard API.'); });
}
