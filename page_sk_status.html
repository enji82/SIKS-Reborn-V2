            <!-- Table Matrix Structure (NO GRID LINES - JUST LIKE IMAGE 1) -->
            <div id="statussk_tableState" style="display: none;" class="overflow-x-auto sultan-scroll">

                    <thead>
                        <tr id="statussk_headerTabel" class="sms-thead-executive bg-slate-50 dark:bg-black/20">

<script>
    var STATUSSK_CACHE_DATA = [];
    var STATUSSK_TABEL_INSTANCE = null;
    var STATUSSK_RAW_HEADER = null;
    var STATUSSK_IS_ADMIN = false;
    var STATUSSK_USER_NPSN = "";

    $(document).ready(function () {
        try {
            var user = (typeof Sultan !== 'undefined' && Sultan.db) ? Sultan.db.get('siksUser') : {};
            STATUSSK_IS_ADMIN = (user.role || "").toLowerCase().includes("admin") || (user.role || "").toLowerCase().includes("verifikator");
            STATUSSK_USER_NPSN = user.npsn || user.username || "";
        } catch (e) { STATUSSK_IS_ADMIN = false; }
        statussk_validasiAksesUser();
    });

    function statussk_validasiAksesUser() {
        if (STATUSSK_IS_ADMIN) {
            statussk_tarikDataServer();
        } else {
            google.script.run.withSuccessHandler(function (resUnit) {
                var dataUnit = JSON.parse(resUnit);
                $('#statussk_filterSekolah').empty().append($('<option>', {value: dataUnit.unitKerja, text: dataUnit.unitKerja})).prop('disabled', true);
                statussk_tarikDataServer();
            }).getUnitKerjaByNpsnPTK(STATUSSK_USER_NPSN);
        }
    }

    function statussk_tarikDataServer() {
        var btn = $('#statussk_btnCari');
        btn.prop('disabled', true).html('<i class="fab fa-gg fa-spin text-primary"></i>');
        google.script.run.withSuccessHandler(function (res) {
            btn.prop('disabled', false).html('<i class="fab fa-gg text-primary"></i>');
            STATUSSK_CACHE_DATA = res.rows || [];
            STATUSSK_RAW_HEADER = res.headers || null;
            statussk_populateDropdown(res.schools || []);
            statussk_renderTabel(STATUSSK_CACHE_DATA);
        }).getSiabaStatusData();
    }

    function statussk_populateDropdown(schools) {
        if (STATUSSK_IS_ADMIN) {
            var h = '<option value="SEMUA">- Semua Sekolah -</option>';
            schools.forEach(function (s) { h += '<option value="' + statussk_escapeHtml(s) + '">' + statussk_escapeHtml(s) + '</option>'; });
            $('#statussk_filterSekolah').html(h).prop('disabled', false);
        }
    }

    function statussk_renderTabel(rows) {
        var dtArray = [];
        // Header: REMOVED ALL VERTICAL BORDERS
        var headerHtml = '<th class="sms-th-executive text-left px-4 py-3 text-[12px] font-bold text-primary border-b border-slate-200 dark:border-white/10" style="min-width: 280px;">NAMA SEKOLAH / SATDIK</th>';
        
        if (STATUSSK_RAW_HEADER && STATUSSK_RAW_HEADER.length >= 2) {
            var hRow1 = STATUSSK_RAW_HEADER[0], hRow2 = STATUSSK_RAW_HEADER[1];
            for (var i = 1; i < hRow2.length; i++) {
                var year = ""; for (var k = i; k >= 1; k--) { if (hRow1[k]) { year = hRow1[k]; break; } }
                headerHtml += '<th class="sms-th-executive text-center border-b border-slate-200 dark:border-white/10 px-2 py-3">' +
                              '<div class="text-[11px] font-normal opacity-60 text-slate-500 dark:text-gray-400">' + year + '</div>' +
                              '<div class="tracking-widest uppercase text-[12px]">' + hRow2[i].replace("SEMESTER ", "SEM ") + '</div></th>';
            }
        }
        $('#statussk_headerTabel').html(headerHtml);

        rows.forEach(function (row) {
            var rowData = [], parts = String(row[0] || "").split('|');
            // TD: REMOVED ALL VERTICAL BORDERS
            rowData.push('<div class="text-left align-middle px-4 py-3">' + 
                         '<div class="text-[14px] font-bold text-slate-800 dark:text-white leading-tight">' + statussk_escapeHtml(parts[0]) + '</div>' + 
                         '<div class="text-[12px] text-slate-400 dark:text-gray-500 font-normal mt-1">' + statussk_escapeHtml(parts[1] || "-") + '</div>' + 
                         '</div>');
            for (var i = 1; i < row.length; i++) { rowData.push(statussk_buildBadgeSultan(row[i])); }
            dtArray.push(rowData);
        });

        if (STATUSSK_TABEL_INSTANCE) STATUSSK_TABEL_INSTANCE.destroy();
        STATUSSK_TABEL_INSTANCE = $('#statussk_tabelUtama').DataTable({
            "data": dtArray, "ordering": false, "pageLength": 10, "autoWidth": false, "deferRender": true,
            "dom": '<"px-6 py-3 border-b border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-black/20"<"flex items-center justify-between gap-4"l f>>' +
                   '<"sultan-scroll overflow-x-auto"t>' +
                   '<"px-6 py-3 border-t border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-black/20"<"flex items-center justify-between"i p>>',
            "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json" },
            "columnDefs": [ { "targets": "_all", "className": "text-center align-middle" } ]
        });
        $('#statussk_loadingState').hide(); $('#statussk_tableState').show();
    }

    function statussk_buildBadgeSultan(s) {
        if (!s || s === "-" || s === "") return '<i class="fas fa-minus text-slate-300 dark:text-gray-700 small"></i>';
        var parts = String(s).split('|'), raw = parts[0].toLowerCase(), icon = "";
        var baseCls = "inline-flex h-6 px-3 items-center justify-center rounded-full border-2 font-black text-[10px] uppercase tracking-widest transition-all";
        
        if (raw.includes('revisi')) icon = '<span class="' + baseCls + ' bg-blue-50 dark:bg-blue-600/20 text-blue-600 dark:text-blue-400 border-blue-200 dark:border-blue-500/30">REVISI</span>';
        else if (raw.includes('tolak')) icon = '<span class="' + baseCls + ' bg-rose-50 dark:bg-rose-600/20 text-rose-600 dark:text-rose-400 border-rose-200 dark:border-rose-500/30">DITOLAK</span>';
        else if (raw.includes('verif') || raw.includes('valid') || raw.includes('ok')) icon = '<span class="' + baseCls + ' bg-emerald-50 dark:bg-emerald-600/20 text-emerald-600 dark:text-emerald-400 border-emerald-200 dark:border-emerald-500/40 shadow-sm">DISETUJUI</span>';
        else if (raw.includes('proses')) icon = '<span class="' + baseCls + ' bg-amber-50 dark:bg-amber-600/20 text-amber-600 dark:text-amber-400 border-amber-200 dark:border-amber-500/30">PROSES</span>';
        else icon = '<span class="font-bold text-slate-500">' + statussk_escapeHtml(parts[0]) + '</span>';
        return icon;
    }
    function statussk_escapeHtml(t) { return String(t || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
</script>
