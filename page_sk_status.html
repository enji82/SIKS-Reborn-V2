                  <!-- SKELETON RENDERED VIA JS -->

<script>
    var STATUSSK_CACHE_DATA = [];
    var STATUSSK_TABEL_INSTANCE = null;
    var STATUSSK_RAW_HEADER = null;
    var STATUSSK_IS_ADMIN = false;
    var STATUSSK_USER_NPSN = "";
    var STATUSSK_UNIT_TERKUNCI = "";

    $(document).ready(function () {
        statussk_renderSkeleton();
        
        try {
            var user = (typeof Sultan !== 'undefined' && Sultan.db) ? Sultan.db.get('siksUser') : {};
            STATUSSK_IS_ADMIN = (user.role || "").toLowerCase().includes("admin") || (user.role || "").toLowerCase().includes("verifikator");
            STATUSSK_USER_NPSN = user.npsn || user.username || "";
        } catch (e) { STATUSSK_IS_ADMIN = false; }

        statussk_validasiAksesUser();
    });

    function statussk_validasiAksesUser() {
        if (STATUSSK_IS_ADMIN) {
            statussk_tarikDataServer();
        } else {
            if (!STATUSSK_USER_NPSN) {
                $('#statussk_loadingState').html('<div class="text-center py-5 text-danger"><h6>Sesi login tidak valid.</h6></div>');
                return;
            }
            google.script.run.withSuccessHandler(function (resUnit) {
                var dataUnit = JSON.parse(resUnit);
                if (dataUnit.error) {
                    $('#statussk_loadingState').html('<div class="text-center py-5 text-danger"><h6>' + statussk_escapeHtml(dataUnit.error) + '</h6></div>');
                    return;
                }
                STATUSSK_UNIT_TERKUNCI = dataUnit.unitKerja;
                $('#statussk_filterSekolah').empty().append($('<option>', {value: STATUSSK_UNIT_TERKUNCI, text: STATUSSK_UNIT_TERKUNCI})).prop('disabled', true);
                statussk_tarikDataServer();
            }).getUnitKerjaByNpsnPTK(STATUSSK_USER_NPSN);
        }
    }

    function statussk_tarikDataServer() {
        var btn = $('#statussk_btnCari');
        btn.prop('disabled', true).html('<i class="fab fa-gg fa-spin text-maroon"></i>');

        google.script.run
            .withSuccessHandler(function (res) {
                btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
                if (res.error) {
                    $('#statussk_loadingState').html('<div class="text-center py-5 text-danger"><h6>' + statussk_escapeHtml(res.error) + '</h6></div>');
                    return;
                }
                
                STATUSSK_CACHE_DATA = res.rows || [];
                STATUSSK_RAW_HEADER = res.headers || null;

                statussk_populateDropdown(res.schools || []);
                statussk_renderTabel(STATUSSK_CACHE_DATA);
            })
            .withFailureHandler(function (err) {
                btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
                $('#statussk_loadingState').html('<div class="text-center py-5 text-danger"><h6>Koneksi Terputus</h6></div>');
            })
            .getSiabaStatusData();
    }

    function statussk_populateDropdown(schools) {
        if (STATUSSK_IS_ADMIN) {
            var el = $('#statussk_filterSekolah');
            var h = '<option value="SEMUA">- Semua Sekolah -</option>';
            schools.forEach(function (s) {
                var safeS = statussk_escapeHtml(s);
                h += '<option value="' + safeS + '">' + safeS + '</option>';
            });
            el.html(h).prop('disabled', false).removeClass('bg-light text-maroon');
        }
    }

    $('#statussk_filterSekolah').on('change', function () {
        if (STATUSSK_TABEL_INSTANCE) {
            var val = $(this).val();
            if (val === "SEMUA") STATUSSK_TABEL_INSTANCE.column(0).search('').draw();
            else STATUSSK_TABEL_INSTANCE.column(0).search('^' + val + '$', true, false).draw();
        }
    });

    function statussk_renderTabel(rows) {
        var dtArray = [];
        var headerHtml = '<th class="th-main col-sticky-left align-middle text-left" style="width: 250px;">Unit Kerja / Satdik</th>';

        if (STATUSSK_RAW_HEADER && STATUSSK_RAW_HEADER.length >= 2) {
            var hRow1 = STATUSSK_RAW_HEADER[0];
            var hRow2 = STATUSSK_RAW_HEADER[1];
            for (var i = 1; i < hRow2.length; i++) {
                var year = "";
                for (var k = i; k >= 1; k--) { if (hRow1[k]) { year = hRow1[k]; break; } }
                var smt = hRow2[i].toUpperCase().replace("SEMESTER ", "SEM ").replace("SMT ", "SEM ");
                headerHtml += '<th class="th-main text-center align-middle">' +
                              '<div class="small opacity-50">' + year + '</div>' +
                              '<div>' + smt + '</div></th>';
            }
        }
        $('#statussk_headerTabel').html(headerHtml);

        rows.forEach(function (row) {
            var rowData = [];
            var parts = String(row[0] || "").split('|');
            rowData.push('<div class="text-left px-2 font-weight-bold text-dark">' + statussk_escapeHtml(parts[0]) + '<br><span class="small text-muted font-weight-normal">' + statussk_escapeHtml(parts[1] || "-") + '</span></div>');
            for (var i = 1; i < row.length; i++) { rowData.push(statussk_buildBadgeSultan(row[i])); }
            dtArray.push(rowData);
        });

        if (STATUSSK_TABEL_INSTANCE) STATUSSK_TABEL_INSTANCE.destroy();
        
        STATUSSK_TABEL_INSTANCE = $('#statussk_tabelUtama').DataTable({
            "data": dtArray, "ordering": false, "pageLength": 10, "autoWidth": false,
            "dom": "<'row mb-2'<'col-sm-12 col-md-6'l><'col-sm-12 col-md-6'f>>" +
                   "<'row'<'col-sm-12'<'table-responsive sultan-scroll'tr>>>" +
                   "<'row mt-3'<'col-sm-12 col-md-5 small text-muted'i><'col-sm-12 col-md-7'p>>",
            "language": { "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json" },
            "columnDefs": [ { "targets": 0, "className": "col-sticky-left bg-white align-middle border-right" }, { "targets": "_all", "className": "text-center align-middle" } ]
        });

        $('#statussk_loadingState').hide();
        $('#statussk_tableState').show();
    }

    function statussk_renderSkeleton() {
        var $cont = $('#statussk_loadingState').empty();
        var $table = $('<table/>', { "class": "table table-bordered mb-0 table-header-compact" });
        var $tbody = $('<tbody/>');
        for (var i = 0; i < 5; i++) {
            var $tr = $('<tr/>');
            $tr.append('<td class="bg-white"><div class="sultan-skeleton" style="width:80%; height:12px;"></div></td>');
            for (var j = 0; j < 6; j++) {
                $tr.append('<td class="text-center"><div class="sultan-skeleton mx-auto" style="width:20px; height:20px; border-radius:50%;"></div></td>');
            }
            $tbody.append($tr);
        }
        $table.append($tbody);
        $cont.append($table);
    }

    function statussk_buildBadgeSultan(s) {
        if (!s || s === "-" || s === "") return '<i class="fas fa-minus text-black-50 small opacity-20"></i>';
        var parts = String(s).split('|'), raw = parts[0].toLowerCase(), icon = "";
        if (raw.includes('revisi')) icon = '<span class="badge badge-sultan badge-sultan-light-warning p-2"><i class="fab fa-gg"></i></span>';
        else if (raw.includes('tolak')) icon = '<span class="badge badge-sultan badge-sultan-light-danger p-2"><i class="fas fa-times"></i></span>';
        else if (raw.includes('verif') || raw.includes('valid') || raw.includes('ok')) icon = '<span class="badge badge-sultan badge-sultan-light-success p-2"><i class="fas fa-check"></i></span>';
        else if (raw.includes('proses')) icon = '<span class="badge badge-sultan badge-sultan-light-info p-2"><i class="fas fa-clock"></i></span>';
        else icon = '<span class="font-weight-bold">' + statussk_escapeHtml(parts[0]) + '</span>';
        return icon;
    }

    function statussk_escapeHtml(t) { return String(t || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
</script>
