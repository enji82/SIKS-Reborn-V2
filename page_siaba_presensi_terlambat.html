<div class="flex flex-col gap-4 md:gap-6 2xl:gap-7.5 animate-reveal">

  <!-- KARTU INFORMASI -->
  <div class="rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark border-l-4 border-l-primary" x-data="{ isOpen: false }">
    <div class="border-b border-stroke py-4 px-6.5 dark:border-strokedark cursor-pointer" @click="isOpen = !isOpen">
      <div class="flex justify-between items-center text-primary font-bold">
        <div class="flex items-center"><i class="fas fa-info-circle mr-2"></i> Informasi</div>
        <i class="fas fa-chevron-down text-body dark:text-bodydark text-sm transition-transform" :class="{ 'rotate-180': isOpen }"></i>
      </div>
    </div>
    <div x-show="isOpen" x-transition x-cloak>
      <div class="p-6.5 pt-4">
        <ul class="list-disc pl-5 text-sm text-black dark:text-white space-y-1">
          <li>Data diurutkan berdasarkan <b>Total Menit Terlambat</b> terbanyak.</li>
          <li>Angka yang ditampilkan adalah jumlah menit dan detik keterlambatan setiap bulan.</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- FILTER CONTROLS -->
  <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark">
    <div class="flex flex-wrap items-center gap-3">
        <select id="ta_filterTahun" class="rounded border border-stroke bg-transparent py-2.5 px-4 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input text-sm text-black dark:text-white min-w-[100px]" disabled>
            <option value="">- Tahun -</option>
        </select>
        
        <select id="ta_filterUnit" class="rounded border border-stroke bg-gray-2 py-2.5 px-4 outline-none focus:border-primary dark:border-form-strokedark dark:bg-meta-4 text-sm text-primary font-bold min-w-[250px]" disabled>
            <option value="">- Memvalidasi Akses... -</option>
        </select>

        <div class="hidden sm:block h-8 w-px bg-stroke dark:bg-strokedark mx-1"></div>

        <button type="button" id="ta_btnRefresh" class="flex items-center justify-center rounded border border-stroke dark:border-strokedark hover:bg-gray-2 dark:hover:bg-meta-4 py-2.5 px-4 text-center transition disabled:opacity-50" title="Segarkan Data dari Server" disabled>
            <i class="fab fa-gg text-primary"></i>
        </button>
    </div>
  </div>

  <!-- TABLE CONTAINER -->
  <div class="rounded-sm border border-stroke bg-white px-5 pt-6 pb-2.5 shadow-default dark:border-strokedark dark:bg-boxdark sm:px-7.5 xl:pb-1">
      <div id="ta_skeletonState">
          <!-- SKELETON WILL BE RENDERED HERE -->
      </div>

      <div id="ta_tableState" style="display: none;" class="overflow-x-auto w-full custom-scrollbar pb-4">
          <table id="ta_tabelUtama" class="w-full table-auto text-sm" style="border-collapse: separate !important; border-spacing: 0 !important;">
            <thead>
                <tr id="ta_rowHeaderTop" class="bg-gray-2 dark:bg-meta-4 text-left">
                    <th class="col-sticky-left border-r border-stroke dark:border-strokedark text-left px-3 align-middle py-2 z-10 w-48 text-black dark:text-white font-semibold">Nama ASN</th>
                    <th class="text-center align-middle px-2 py-2 border-b border-stroke dark:border-strokedark text-black dark:text-white font-semibold">Memuat...</th>
                </tr>
                <tr id="ta_rowHeaderSub" class="bg-gray-2 dark:bg-meta-4"></tr>
            </thead>
            <tbody></tbody>
          </table>
      </div>
  </div>

</div>

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL (MASTER BLUEPRINT V8 - DYNAMIC READ ONLY)
// BAB I: Prefix Mutlak ta_
// ======================================================================
function ta_escapeHtml(text) { 
    if(!text) return ""; 
    return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
}

var TA_CACHE_DATA = []; 
var TA_HEADER_TOP = [];
var TA_HEADER_SUB = [];
var TA_CACHE_THN = "";
var TA_TABEL_INSTANCE = null;

var TA_USER_AKTIF = "";
var TA_IS_ADMIN = false;
var TA_UNIT_TERKUNCI = ""; 
var TA_USER_NPSN = "";

// =================================================================
// 1. INITIALIZATION & SPA VACCINE (Hukum Ke-1)
// =================================================================
$(document).ready(function() {
    TA_TABEL_INSTANCE = null;
    $('#ta_tableState').hide();
    ta_renderSkeleton();
    $('#ta_skeletonState').show();

    // Cek Sesi Login
    try {
        var user = (typeof getSesiUser === 'function') ? getSesiUser() : {};
        TA_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        TA_IS_ADMIN = (user.role || "").toLowerCase().includes("admin");
        TA_USER_NPSN = user.npsn || user.username || ""; 
    } catch(e) { TA_USER_NPSN = ""; TA_IS_ADMIN = false; }
    
    // VAKSINASI EVENT SPA DELEGATION (Pemusnahan onClick Inline)
    // 1. Pemicu Dropdown -> Menggunakan Cache (Zero Blink)
    $(document).off('change', '#ta_filterTahun').on('change', '#ta_filterTahun', ta_prosesCariData);
    $(document).off('change', '#ta_filterUnit').on('change', '#ta_filterUnit', ta_terapkanFilterLokal);
    
    // 2. Pemicu Tombol Refresh -> Paksa ambil dari Server (Bypass Cache)
    $(document).off('click', '#ta_btnRefresh').on('click', '#ta_btnRefresh', ta_tarikDataServer);

    ta_initFilters();
});

// =================================================================
// 2. CHAINED INITIALIZATION: FILTERS -> GATEKEEPER -> FETCH
// =================================================================
function ta_initFilters() {

    google.script.run.withSuccessHandler(function(res) {
        var data = JSON.parse(res);
        
        var elThn = $('#ta_filterTahun').empty().append('<option value="">- Tahun -</option>');
        if (data.years && data.years.length > 0) {
            data.years.forEach(y => elThn.append(`<option value="${ta_escapeHtml(y)}">${ta_escapeHtml(y)}</option>`));
        }
        
        var curYear = new Date().getFullYear().toString();
        if ($("#ta_filterTahun option[value='"+curYear+"']").length > 0) {
            $('#ta_filterTahun').val(curYear);
        }
        
        $('#ta_filterTahun, #ta_btnRefresh').prop('disabled', false);

        ta_validasiAksesUser(); 

    }).getSiabaTerlambatFilters();
}

function ta_validasiAksesUser() {

    if (TA_IS_ADMIN) {
        $('#ta_filterUnit').empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
        ta_tarikDataServer(); 
    } else {
        if (!TA_USER_NPSN) {
            $('#ta_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
            $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-ban fa-3x mb-3"></i><br><h6>Akses ditolak: Sesi login tidak valid.</h6></div>');
            return;
        }

        google.script.run
            .withSuccessHandler(function(resUnit) {
                var dataUnit = JSON.parse(resUnit);
                if (dataUnit.error) {
                    $('#ta_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                    $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + ta_escapeHtml(dataUnit.error) + '</h6></div>');
                    return;
                }

                TA_UNIT_TERKUNCI = dataUnit.unitKerja;
                $('#ta_filterUnit').empty().append($('<option>', {value: TA_UNIT_TERKUNCI, text: TA_UNIT_TERKUNCI})).prop('disabled', true);
                
                ta_tarikDataServer();
            })
            .withFailureHandler(function(err) {
                $('#ta_filterUnit').empty().append('<option value="">ERROR SERVER</option>');
                $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + ta_escapeHtml(err.message) + '</h6></div>');
            })
            .getUnitKerjaByNPSN(TA_USER_NPSN); 
    }
}

// =================================================================
// 3. FETCH DATA DARI SERVER (BAB VIII)
// =================================================================
function ta_prosesCariData() {
    var th = $('#ta_filterTahun').val();
    if (!th) { Sultan.notif.info('Pilih Tahun terlebih dahulu.'); return; }
    
    // Filter Lokal (Zero Blink)
    if (th === TA_CACHE_THN && TA_CACHE_DATA.length > 0) { 
        ta_terapkanFilterLokal(); 
    } else { 
        ta_tarikDataServer(); 
    }
}

function ta_tarikDataServer() {
    var th = $('#ta_filterTahun').val();
    if(!th) return;

    var btn = $('#ta_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    if(TA_IS_ADMIN) $('#ta_filterUnit').prop('disabled', true);
    
    // MUNCULKAN RUANG A JIKA TABEL BELUM PERNAH DIBUAT ATAU REFRESH PAKSA
    if (!$.fn.DataTable.isDataTable('#ta_tabelUtama')) {
        $('#ta_tableState').hide();
        ta_renderSkeleton();
        $('#ta_skeletonState').show();
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
            if(TA_IS_ADMIN) $('#ta_filterUnit').prop('disabled', false);
            
            var data;
            try {
                data = typeof res === 'string' ? JSON.parse(res) : res;
            } catch(e) {
                $('#ta_tableState').hide();
                $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>Gagal memproses struktur JSON Server.</h6></div>');
                $('#ta_skeletonState').show();
                return;
            }
            
            if (data && data.error) {
                $('#ta_tableState').hide();
                $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + ta_escapeHtml(data.error) + '</h6></div>');
                $('#ta_skeletonState').show();
                return;
            }
            
            try {
                TA_HEADER_TOP = data.headerTop || [];
                TA_HEADER_SUB = data.headerSub || [];
                TA_CACHE_DATA = data.rows || []; 
                TA_CACHE_THN = th; 
                
                if(TA_IS_ADMIN) ta_populateDropdownUnit();

                // Render Tabel otomatis menghandle Dynamic Header & Injeksi
                ta_terapkanFilterLokal(); 

            } catch(e) { 
                $('#ta_tableState').hide();
                $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>Gagal merakit tabel: ' + ta_escapeHtml(e.message) + '</h6></div>');
                $('#ta_skeletonState').show();
            }
        })
        .withFailureHandler(function(err) {
            btn.prop('disabled', false).html('<i class="fab fa-gg text-maroon"></i>');
            $('#ta_tableState').hide();
            $('#ta_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + ta_escapeHtml(err.message) + '</h6></div>');
            $('#ta_skeletonState').show();
        })
        .getSiabaTerlambatData(th, "SEMUA"); 
}

function ta_populateDropdownUnit() {
    var unique = new Set();
    TA_CACHE_DATA.forEach(function(row) {
        var lastIdx = row.length - 1;
        var unit = String(row[lastIdx]).trim();
        if (unit) unique.add(unit);
    });
    
    var sortedUnits = Array.from(unique).sort();
    var select = $('#ta_filterUnit');
    var currentVal = select.val();
    
    select.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
    sortedUnits.forEach(function(u) { select.append(`<option value="${ta_escapeHtml(u)}">${ta_escapeHtml(u)}</option>`); });
    
    select.prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
    if(currentVal && unique.has(currentVal)) { select.val(currentVal); }
}

function ta_terapkanFilterLokal() {
    var tAdminUnit = TA_IS_ADMIN ? String($('#ta_filterUnit').val() || "").toUpperCase() : "";
    var tUnitUser  = String(TA_UNIT_TERKUNCI || "").trim().toUpperCase();
    
    var hasil = TA_CACHE_DATA.filter(function(row) {
        var lastIdx = row.length - 1; 
        var rUnit = String(row[lastIdx] || "").trim().toUpperCase(); 
        
        if (TA_IS_ADMIN) {
            return (tAdminUnit === "SEMUA" || tAdminUnit === "" || rUnit === tAdminUnit);
        } else {
            return (rUnit === tUnitUser);
        }
    });
    
    ta_renderTabel(hasil);
}

function ta_renderSkeleton() {
    var cols = 12; // Monthly dynamic columns
    var rows = 8;
    var html = `
        <div class="h-8 w-48 animate-pulse rounded-md bg-stroke dark:bg-strokedark mb-4"></div>
        <div class="rounded-sm border border-stroke bg-white dark:border-strokedark dark:bg-boxdark overflow-hidden">
            <table class="w-full table-auto">
                <thead>
                    <tr class="bg-gray-2 dark:bg-meta-4">
                        <th rowspan="2" class="py-3 px-4 col-sticky-left border-r border-stroke dark:border-strokedark text-left" style="width: 200px;"><div class="h-4 w-3/4 animate-pulse rounded bg-stroke dark:bg-strokedark"></div></th>
                        ${Array(cols/2).fill('<th colspan="2" class="border-b border-l border-stroke dark:border-strokedark py-2"><div class="h-4 w-12 animate-pulse rounded bg-stroke dark:bg-strokedark mx-auto"></div></th>').join('')}
                    </tr>
                    <tr class="bg-gray-2 dark:bg-meta-4">
                        ${Array(cols).fill('<th class="border-l border-stroke dark:border-strokedark py-2"><div class="h-3 w-8 animate-pulse rounded bg-stroke dark:bg-strokedark mx-auto"></div></th>').join('')}
                    </tr>
                </thead>
                <tbody>
                    ${Array(rows).fill(`<tr class="border-b border-stroke dark:border-strokedark">
                        <td class="col-sticky-left border-r border-stroke dark:border-strokedark py-3 px-4 bg-white dark:bg-boxdark"><div class="h-3 w-5/6 animate-pulse rounded bg-stroke dark:bg-strokedark mb-1.5"></div><div class="h-2 w-1/2 animate-pulse rounded bg-stroke dark:bg-strokedark"></div></td>
                        ${Array(cols).fill('<td class="py-3 border-l border-stroke dark:border-strokedark"><div class="h-3 w-6 animate-pulse rounded bg-stroke dark:bg-strokedark mx-auto"></div></td>').join('')}
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    $('#ta_skeletonState').html(html);
}

function ta_renderTabel(rows) {
    var isFirstLoad = !$.fn.DataTable.isDataTable('#ta_tabelUtama');

    // --- A. BANGUN HEADER DINAMIS (Dijalankan hanya saat inisialisasi) ---
    if (isFirstLoad) {
        var headerTop = TA_HEADER_TOP; 
        var headerSub = TA_HEADER_SUB; 
        
        var htmlTop = `<th rowspan="2" class="col-sticky-left border-right text-left px-3 align-middle">Nama ASN</th>`;
        var htmlSub = '';

        for (let i = 2; i < headerTop.length; i++) {
            let titleTop = ta_escapeHtml(headerTop[i]);
            let titleSub = ta_escapeHtml(headerSub[i]);

            if (titleTop !== "" && i < headerTop.length - 1) {
                htmlTop += `<th colspan="2" class="text-center align-middle border-bottom px-2">${titleTop}</th>`;
                htmlSub += `<th class="text-center align-middle px-2">${titleSub}</th>`;
            } else if (titleTop === "" && i > 0) {
                htmlSub += `<th class="text-center align-middle px-2">${titleSub}</th>`;
            } else {
                htmlTop += `<th rowspan="2" class="text-center align-middle border-left">${titleTop}</th>`;
            }
        }
        $('#ta_rowHeaderTop').html(htmlTop);
        $('#ta_rowHeaderSub').html(htmlSub);
    }

    // --- B. BANGUN ARRAY DATA ---
    var dtArray = [];
    if (rows && rows.length > 0) {
        rows.forEach(function(row) {
            var arrRow = [];
            
            // Kolom 1 (Index 0): Gabungan Nama & NIP (Vaksin text-nowrap mutlak)
            var safeNama = ta_escapeHtml(row[0]);
            var safeNip  = ta_escapeHtml(row[1]);
            
            // PERSONNEL COLUMN (BOLD NAVY NAME + MUTED NIP, NO UNIT)
            arrRow.push(`<div class="py-0 px-2 text-left">
                <div class="font-bold text-black dark:text-white text-sm" style="line-height:1.2;">${safeNama}</div>
                <div class="text-body dark:text-bodydark font-medium mt-0.5" style="font-size: 11px;">${safeNip}</div>
            </div>`);
            
            // Kolom Angka (Index 2 sampai batas sebelum kolom unit)
            for (var colIdx = 2; colIdx < row.length - 1; colIdx++) {
                var val = row[colIdx];
                arrRow.push(val == 0 || val == "0" || val === "" ? "-" : ta_escapeHtml(val));
            }
            dtArray.push(arrRow);
        });
    }

    // --- C. INISIALISASI & INJEKSI DATA (BAB VII) ---
    if (isFirstLoad) {
        // Kalkulasi matematis jumlah kolom aktif untuk columnDefs (Anti _all)
        var totalCols = (dtArray.length > 0) ? dtArray[0].length : (TA_HEADER_TOP.length - 1);
        var targetDynamicArray = Array.from({length: Math.max(0, totalCols - 1)}, function(_, i) { return i + 1; });

        TA_TABEL_INSTANCE = $('#ta_tabelUtama').DataTable({
            "data": dtArray, 
            "destroy": true, 
            "ordering": false,
            "pageLength": 10,
            "autoWidth": false,
            "deferRender": true, // Performa Turbo
            "dom": "<'flex flex-col sm:flex-row justify-between items-center mb-4 gap-4'<'w-full sm:w-auto text-sm'l><'w-full sm:w-auto text-sm'f>>" +
                   "<'w-full overflow-x-auto dt-scroll-parent custom-scrollbar'tr>" +
                   "<'flex flex-col sm:flex-row justify-between items-center mt-4 gap-4'<'w-full sm:w-auto text-sm text-body dark:text-bodydark'i><'w-full sm:w-auto mt-2 sm:mt-0 text-sm'p>>",
            "language": { 
                "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", 
                "search": "", "searchPlaceholder": "Cari Nama/NIP...",
                "emptyTable": '<div class="py-10 text-center"><div class="mb-3"><i class="fas fa-clipboard-list text-5xl text-body dark:text-bodydark opacity-50"></i></div><h6 class="font-bold text-black dark:text-white mb-2 text-lg">Belum Ada Presensi</h6><p class="text-sm text-body dark:text-bodydark mb-0">Tidak ada data terlambat presensi untuk filter terpilih.</p></div>' 
            },
            "columnDefs": [
                { "targets": 0, "width": "auto", "className": "col-sticky-left align-middle font-bold border-r border-stroke dark:border-strokedark text-black dark:text-white text-left px-3 py-2 bg-white dark:bg-boxdark z-10" },
                { "targets": targetDynamicArray, "className": "text-center align-middle px-2 py-2 border-l border-stroke dark:border-strokedark" }
            ],
            // VAKSIN PERFORMA TURBO: Menggunakan Native DOM murni (membuang jQuery $(this).addClass)
            "createdRow": function(row, data, dataIndex) {
                 var tds = row.children;
                 var lastIdx = tds.length - 1; 
                 var secondLastIdx = tds.length - 2;

                 for (var visIdx = 0; visIdx < tds.length; visIdx++) {
                     var cell = tds[visIdx];
                     var rawVal = cell.textContent.trim();

                     if (visIdx > 0) {
                         cell.className += " border-b border-stroke dark:border-strokedark";
                         // Native class manipulation
                         if (rawVal === "-") {
                             cell.classList.add('text-body', 'dark:text-bodydark', 'opacity-50');
                         } else {
                             if (visIdx === lastIdx || visIdx === secondLastIdx) {
                                 cell.classList.add('text-danger', 'font-bold');
                             } else {
                                 cell.classList.add('text-black', 'dark:text-white'); 
                             }
                         }
                     }
                 }
            }
        });

        // BUKA RUANG B SEKALI SAJA (Instan, No fadeIn)
        $('#ta_skeletonState').hide();
        $('#ta_tableState').show();
        setTimeout(function(){ TA_TABEL_INSTANCE.columns.adjust(); }, 100);
        
    } else {
        TA_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        
        if ($('#ta_tableState').is(':hidden')) {
            $('#ta_skeletonState').hide();
            $('#ta_tableState').show();
        }

        setTimeout(function(){ TA_TABEL_INSTANCE.columns.adjust(); }, 50);
    }
}
</script>

<style>

    font-size: 0.72rem !important; 
    font-weight: 800; 
    text-transform: uppercase; 
    border-bottom: 1px solid var(--color-stroke) !important; 
    padding: 6px 4px !important; 
    letter-spacing: 0.2px; 
    position: sticky !important;
    top: 0 !important;
    z-index: 10 !important;
}

    top: 29px !important; /* Adjust based on first row height */
}

#ta_tabelUtama thead th.col-sticky-left {
    z-index: 11 !important;
}

#ta_tabelUtama tbody td { 
    border-bottom: 1px solid var(--color-stroke) !important; 
    position: relative !important; 
    padding-top: 4px !important;
    padding-bottom: 4px !important;
}

    position: absolute; 
    top: 0; left: 0; right: 0; bottom: 0;

    pointer-events: none; 
    z-index: 2;

}

    position: sticky !important;
    left: 0 !important;
    z-index: 5 !important;
    background-color: inherit !important;
    box-shadow: 4px 0 8px rgba(0,0,0,0.05);
}

#ta_tabelUtama tbody tr:hover td.col-sticky-left {
    z-index: 6 !important;
}
</style>
