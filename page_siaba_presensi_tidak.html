<div class="flex flex-col gap-4 md:gap-6 2xl:gap-7.5 animate-reveal">

  <!-- KARTU INFORMASI -->
  <div class="rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark border-l-4 border-l-primary" x-data="{ isOpen: false }">
    <div class="border-b border-stroke py-4 px-6.5 dark:border-strokedark cursor-pointer" @click="isOpen = !isOpen">
      <div class="flex justify-between items-center text-primary font-bold">
        <div class="flex items-center"><i class="fas fa-info-circle mr-2"></i> Informasi</div>
        <i class="fas fa-chevron-down text-body dark:text-bodydark text-sm transition-transform" :class="{ 'rotate-180': isOpen }"></i>
      </div>
    </div>
    <div x-show="isOpen" x-transition x-cloak>
      <div class="p-6.5 pt-4">
        <ul class="list-disc pl-5 text-sm text-black dark:text-white space-y-1">
          <li>Halaman ini menampilkan rekaman ASN yang tidak melakukan presensi (Alpha/Lupa).</li>
          <li>Data yang ditampilkan diperbarui secara berkala (tidak realtime).</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- FILTER CONTROLS -->
  <div class="rounded-sm border border-stroke bg-white py-4 px-6 shadow-default dark:border-strokedark dark:bg-boxdark">
    <div class="flex flex-wrap items-center gap-3">
        <select id="tp_filterTahun" class="rounded border border-stroke bg-transparent py-2.5 px-4 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input text-sm text-black dark:text-white min-w-[100px]" disabled>
            <option value="">- Tahun -</option>
        </select>
        
        <select id="tp_filterBulan" class="rounded border border-stroke bg-transparent py-2.5 px-4 outline-none focus:border-primary dark:border-form-strokedark dark:bg-form-input text-sm text-black dark:text-white min-w-[120px]" disabled>
            <option value="">- Bulan -</option>
        </select>

        <select id="tp_filterUnit" class="rounded border border-stroke bg-gray-2 py-2.5 px-4 outline-none focus:border-primary dark:border-form-strokedark dark:bg-meta-4 text-sm text-primary font-bold min-w-[250px]" disabled>
            <option value="">- Memvalidasi Akses... -</option>
        </select>

        <div class="hidden sm:block h-8 w-px bg-stroke dark:bg-strokedark mx-1"></div>

        <button type="button" id="tp_btnRefresh" class="flex items-center justify-center rounded border border-stroke dark:border-strokedark hover:bg-gray-2 dark:hover:bg-meta-4 py-2.5 px-4 text-center transition disabled:opacity-50" title="Segarkan Data dari Server" disabled>
            <i class="fas fa-sync-alt text-primary"></i>
        </button>

        <div class="ml-auto d-none d-md-block"></div>
        
        <button type="button" id="tp_btnCopyWA" class="flex items-center justify-center gap-2 rounded bg-meta-3 py-2.5 px-4 text-sm font-medium text-white hover:bg-opacity-90 transition disabled:opacity-50" title="Salin Daftar ASN ke WhatsApp">
            <i class="fab fa-whatsapp"></i> Copy to WA
        </button>
    </div>
  </div>

  <!-- TABLE CONTAINER -->
  <div class="rounded-sm border border-stroke bg-white px-5 pt-6 pb-2.5 shadow-default dark:border-strokedark dark:bg-boxdark sm:px-7.5 xl:pb-1">
      <div id="tp_skeletonState">
          <!-- SKELETON WILL BE RENDERED HERE -->
      </div>

      <div id="tp_tableState" style="display: none;" class="overflow-x-auto w-full custom-scrollbar pb-4">
          <table id="tp_tabelUtama" class="w-full table-auto text-sm" style="border-collapse: separate !important; border-spacing: 0 !important;">
            <thead>
                <tr class="bg-gray-2 dark:bg-meta-4 text-left">
                    <th class="col-sticky-left border-r border-stroke dark:border-strokedark text-left py-3 px-4 z-10 w-48 text-black dark:text-white font-semibold">Nama ASN</th>
                    <th class="text-center py-3 px-4 text-black dark:text-white font-semibold">Total Alpha</th>
                    <th class="text-center py-3 px-4 text-black dark:text-white font-semibold">Tdk Datang</th>
                    <th class="text-center py-3 px-4 text-black dark:text-white font-semibold">Tdk Pulang</th>
                    <th class="text-center py-3 px-4 text-black dark:text-white font-semibold" style="min-width: 150px;">Detail Tanggal</th>
                </tr>
            </thead>
            <tbody></tbody>
          </table>
      </div>
  </div>

</div>

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL (MASTER BLUEPRINT V8 - READ ONLY)
// BAB I: Prefix Mutlak tp_
// ======================================================================
var TP_CACHE_DATA = []; 
var TP_CACHE_THN = "";
var TP_CACHE_BLN = "";
var TP_TABEL_INSTANCE = null;
var TP_HASIL_FILTER = []; 

var TP_USER_AKTIF = "";
var TP_IS_ADMIN = false;
var TP_UNIT_TERKUNCI = ""; 
var TP_USER_NPSN = "";

// =================================================================
// 1. INITIALIZATION & SPA VACCINE
// =================================================================
$(document).ready(function() {
    TP_TABEL_INSTANCE = null;
    $('#tp_tableState').hide();
    tp_renderSkeleton();
    $('#tp_skeletonState').show();

    // Cek Sesi Login
    try {
        var user = (typeof getSesiUser === 'function') ? getSesiUser() : {};
        TP_USER_AKTIF = user.nama_lengkap || user.fullname || user.nama || user.username || "User Web";
        TP_IS_ADMIN = (user.role || "").toLowerCase().includes("admin");
        TP_USER_NPSN = user.npsn || user.username || ""; 
    } catch(e) { TP_USER_NPSN = ""; TP_IS_ADMIN = false; }
    
    $(document).off('change', '#tp_filterTahun, #tp_filterBulan').on('change', '#tp_filterTahun, #tp_filterBulan', tp_prosesCariData);
    $(document).off('change', '#tp_filterUnit').on('change', '#tp_filterUnit', tp_terapkanFilterLokal);
    $(document).off('click', '#tp_btnRefresh').on('click', '#tp_btnRefresh', tp_tarikDataServer);
    
    $(document).off('click', '#tp_btnCopyWA').on('click', '#tp_btnCopyWA', tp_salinDataKeWA);

    tp_initFilters();
});

// =================================================================
// 2. CHAINED INITIALIZATION: FILTERS -> GATEKEEPER -> FETCH
// =================================================================
function tp_initFilters() {

    google.script.run.withSuccessHandler(function(res) {
        var data = JSON.parse(res);
        
        var elThn = $('#tp_filterTahun').empty().append('<option value="">- Tahun -</option>');
        if(data.years) data.years.forEach(function(y) { elThn.append('<option value="' + tp_escapeHtml(y) + '">' + tp_escapeHtml(y) + '</option>'); });
        
        var elBln = $('#tp_filterBulan').empty().append('<option value="">- Bulan -</option>');
        if(data.months) data.months.forEach(function(m) { elBln.append('<option value="' + tp_escapeHtml(m) + '">' + tp_escapeHtml(m) + '</option>'); });

        var now = new Date();
        var curYear = now.getFullYear().toString();
        var mNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        var curMonth = mNames[now.getMonth()];

        if ($("#tp_filterTahun option[value='"+curYear+"']").length > 0) $('#tp_filterTahun').val(curYear);
        if ($("#tp_filterBulan option[value='"+curMonth+"']").length > 0) $('#tp_filterBulan').val(curMonth);

        $('#tp_filterTahun, #tp_filterBulan, #tp_btnRefresh').prop('disabled', false);

        tp_validasiAksesUser(); 

    }).getSiabaTidakFilters();
}

function tp_validasiAksesUser() {

    if (TP_IS_ADMIN) {
        $('#tp_filterUnit').empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>').prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
        tp_tarikDataServer(); 
    } else {
        if (!TP_USER_NPSN) {
            $('#tp_filterUnit').empty().append('<option value="">AKSES DITOLAK (NPSN KOSONG)</option>');
            $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-ban fa-3x mb-3"></i><br><h6>Akses ditolak: Sesi login tidak valid.</h6></div>');
            return;
        }

        google.script.run
            .withSuccessHandler(function(resUnit) {
                var dataUnit = JSON.parse(resUnit);
                if (dataUnit.error) {
                    $('#tp_filterUnit').empty().append('<option value="">AKSES DITOLAK</option>');
                    $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + tp_escapeHtml(dataUnit.error) + '</h6></div>');
                    return;
                }

                TP_UNIT_TERKUNCI = dataUnit.unitKerja;
                $('#tp_filterUnit').empty().append('<option value="' + TP_UNIT_TERKUNCI + '">' + TP_UNIT_TERKUNCI + '</option>').prop('disabled', true);
                
                tp_tarikDataServer();
            })
            .withFailureHandler(function(err) {
                $('#tp_filterUnit').empty().append('<option value="">ERROR SERVER</option>');
                $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + tp_escapeHtml(err.message) + '</h6></div>');
            })
            .getUnitKerjaByNPSN(TP_USER_NPSN); 
    }
}

// =================================================================
// 3. FETCH DATA & FILTER MANUAL TRIGGER (BAB VII - Turbo Seamless)
// =================================================================
function tp_prosesCariData() {
    var th = $('#tp_filterTahun').val(); 
    var bl = $('#tp_filterBulan').val();
    if (!th || !bl) { Sultan.notif.info('Pilih Tahun dan Bulan.'); return; }
    
    if (th === TP_CACHE_THN && bl === TP_CACHE_BLN && TP_CACHE_DATA.length > 0) { 
        tp_terapkanFilterLokal(); 
    } else { 
        tp_tarikDataServer(); 
    }
}

function tp_tarikDataServer() {
    var th = $('#tp_filterTahun').val(); 
    var bl = $('#tp_filterBulan').val();
    if(!th || !bl) return;

    var btn = $('#tp_btnRefresh');
    btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin text-maroon"></i>');
    
    if (!$.fn.DataTable.isDataTable('#tp_tabelUtama')) {
        $('#tp_tableState').hide();
        tp_renderSkeleton();
        $('#tp_skeletonState').show();
    }

    google.script.run
        .withSuccessHandler(function(res) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
            
            var data;
            try {
                data = typeof res === 'string' ? JSON.parse(res) : res;
            } catch(e) {
                $('#tp_tableState').hide();
                $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>Gagal memproses struktur JSON Server.</h6></div>');
                $('#tp_skeletonState').show();
                return;
            }
            
            if (data && data.error) {
                $('#tp_tableState').hide();
                $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>' + tp_escapeHtml(data.error) + '</h6></div>');
                $('#tp_skeletonState').show();
                return;
            }
            
            try {
                TP_CACHE_DATA = data.rows || []; 
                TP_CACHE_THN = th;
                TP_CACHE_BLN = bl;

                if(TP_IS_ADMIN) tp_populateDropdownUnit();

                tp_terapkanFilterLokal();
                
            } catch(e) { 
                $('#tp_tableState').hide();
                $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-3x mb-3"></i><br><h6>Gagal merakit tabel: ' + tp_escapeHtml(e.message) + '</h6></div>');
                $('#tp_skeletonState').show();
            }
        })
        .withFailureHandler(function(err) {
            btn.prop('disabled', false).html('<i class="fas fa-sync-alt text-maroon"></i>');
            $('#tp_tableState').hide();
            $('#tp_skeletonState').html('<div class="text-center py-5 text-danger"><i class="fas fa-wifi fa-3x mb-3"></i><br><h6>Koneksi Terputus: ' + tp_escapeHtml(err.message) + '</h6></div>');
            $('#tp_skeletonState').show();
        })
        .getSiabaTidakData(th, bl, "SEMUA"); 
}

function tp_populateDropdownUnit() {
    var unique = new Set();
    TP_CACHE_DATA.forEach(function(row) {
        var lastIdx = row.length - 1;
        var unit = String(row[lastIdx]).trim();
        if (unit) unique.add(unit);
    });
    
    var sortedUnits = Array.from(unique).sort();
    var select = $('#tp_filterUnit');
    var currentVal = select.val();
    
    select.empty().append('<option value="SEMUA">- Semua Unit Kerja -</option>');
    sortedUnits.forEach(function(u) { select.append('<option value="' + tp_escapeHtml(u) + '">' + tp_escapeHtml(u) + '</option>'); });
    
    select.prop('disabled', false).removeClass('bg-light text-maroon font-weight-bold');
    if(currentVal && unique.has(currentVal)) { select.val(currentVal); }
}

// =================================================================
// 4. INJEKSI ZERO BLINK (Hukum Ke-4) & VAKSIN ANTI-CRASH
// =================================================================
function tp_terapkanFilterLokal() {
    var tAdminUnit = TP_IS_ADMIN ? String($('#tp_filterUnit').val() || "").toUpperCase() : "";
    var tUnitUser  = String(TP_UNIT_TERKUNCI || "").trim().toUpperCase();
    
    var hasil = TP_CACHE_DATA.filter(function(row) {
        var lastIdx = row.length - 1;
        var rUnit = String(row[lastIdx] || "").trim().toUpperCase(); 
        
        if (TP_IS_ADMIN) {
            return (tAdminUnit === "SEMUA" || tAdminUnit === "" || rUnit === tAdminUnit);
        } else {
            return (rUnit === tUnitUser);
        }
    });

    TP_HASIL_FILTER = hasil; 
    tp_renderTabel(hasil);
}

function tp_renderSkeleton() {
    var cols = 4; // Data columns after Name
    var rows = 8;
    var html = `
        <div class="h-8 w-48 animate-pulse rounded-md bg-stroke dark:bg-strokedark mb-4"></div>
        <div class="rounded-sm border border-stroke bg-white dark:border-strokedark dark:bg-boxdark overflow-hidden">
            <table class="w-full table-auto">
                <thead><tr class="bg-gray-2 dark:bg-meta-4">
                    <th class="py-3 px-4 col-sticky-left border-r border-stroke dark:border-strokedark" style="width: 200px;"><div class="h-4 w-3/4 animate-pulse rounded bg-stroke dark:bg-strokedark"></div></th>
                    ${Array(cols).fill('<th class="py-3 px-4"><div class="h-4 w-20 animate-pulse rounded bg-stroke dark:bg-strokedark mx-auto"></div></th>').join('')}
                </tr></thead>
                <tbody>
                    ${Array(rows).fill(`<tr class="border-b border-stroke dark:border-strokedark">
                        <td class="col-sticky-left border-r border-stroke dark:border-strokedark py-3 px-4 bg-white dark:bg-boxdark"><div class="h-3 w-5/6 animate-pulse rounded bg-stroke dark:bg-strokedark mb-1.5"></div><div class="h-2 w-1/2 animate-pulse rounded bg-stroke dark:bg-strokedark"></div></td>
                        ${Array(cols).fill('<td class="py-3 px-4"><div class="h-3 w-12 animate-pulse rounded bg-stroke dark:bg-strokedark mx-auto"></div></td>').join('')}
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    $('#tp_skeletonState').html(html);
}

function tp_renderTabel(dataRows) {
    var dtArray = []; 
    
    dataRows.forEach(function(row) {
        var arrRow = [];
        
        var safeNama = tp_escapeHtml(row[0]);
        var safeNip  = tp_escapeHtml(row[1]);
        
        // PERSONNEL COLUMN (NAVY NAME + MUTED NIP, NO UNIT)
        arrRow.push(`<div class="py-0 px-2 text-left">
            <div class="font-bold text-black dark:text-white text-sm" style="line-height:1.2;">${safeNama}</div>
            <div class="text-body dark:text-bodydark font-medium mt-0.5" style="font-size: 11px;">${safeNip}</div>
        </div>`);
        
        arrRow.push(row[2] == 0 || row[2] === "" ? `<span class="opacity-50">-</span>` : `<span class="inline-flex rounded bg-danger px-2 py-1 text-xs font-bold text-white">${tp_escapeHtml(row[2])}</span>`);
        arrRow.push(row[3] == 0 || row[3] === "" ? `<span class="opacity-50">-</span>` : `<span class="font-bold text-danger">${tp_escapeHtml(row[3])}</span>`);
        arrRow.push(row[4] == 0 || row[4] === "" ? `<span class="opacity-50">-</span>` : `<span class="font-bold text-danger">${tp_escapeHtml(row[4])}</span>`);
        arrRow.push(row[5] === "" || row[5] === "-" ? `<span class="opacity-50">-</span>` : `<span class="text-black dark:text-white font-bold" style="white-space:normal; font-size: 0.72rem; opacity: 0.9;">${tp_escapeHtml(row[5])}</span>`);

        dtArray.push(arrRow);
    });

    if (!$.fn.DataTable.isDataTable('#tp_tabelUtama')) {
        TP_TABEL_INSTANCE = $('#tp_tabelUtama').DataTable({
            "data": dtArray, 
            "destroy": true, "ordering": false, "pageLength": 10, "autoWidth": false,
            "deferRender": true, 
            "dom": "<'flex flex-col sm:flex-row justify-between items-center mb-4 gap-4'<'w-full sm:w-auto text-sm'l><'w-full sm:w-auto text-sm'f>>" +
                   "<'w-full overflow-x-auto dt-scroll-parent custom-scrollbar'tr>" +
                   "<'flex flex-col sm:flex-row justify-between items-center mt-4 gap-4'<'w-full sm:w-auto text-sm text-body dark:text-bodydark'i><'w-full sm:w-auto mt-2 sm:mt-0 text-sm'p>>",
            "language": { 
                "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/Indonesian.json", 
                "search": "", "searchPlaceholder": "Cari Nama...",
                "emptyTable": '<div class="py-10 text-center"><div class="mb-3"><i class="fas fa-user-check text-5xl text-body dark:text-bodydark opacity-50"></i></div><h6 class="font-bold text-black dark:text-white mb-2 text-lg">Tidak Ada Data</h6><p class="text-sm text-body dark:text-bodydark mb-0">Tidak ditemukan rekap data alpha/lupa untuk filter ini.</p></div>' 
            },
            "columnDefs": [
                { "targets": 0, "width": "auto", "className": "col-sticky-left align-middle font-bold border-r border-b border-stroke dark:border-strokedark text-black dark:text-white text-left px-3 py-3 bg-white dark:bg-boxdark z-10" },
                { "targets": [1,2,3,4], "className": "text-center align-middle border-b border-stroke dark:border-strokedark px-2 py-3" }
            ]
        });

        $('#tp_skeletonState').hide();
        $('#tp_tableState').show();
        setTimeout(function(){ TP_TABEL_INSTANCE.columns.adjust(); }, 100);
    } 
    else {
        TP_TABEL_INSTANCE.clear().rows.add(dtArray).draw(false);
        
        if ($('#tp_tableState').is(':hidden')) {
            $('#tp_skeletonState').hide();
            $('#tp_tableState').show();
            setTimeout(function(){ TP_TABEL_INSTANCE.columns.adjust(); }, 100);
        }
    }
}

// =================================================================
// 5. FITUR COPY TO WA (ALGORITMA GROUPING + DETAIL)
// =================================================================
function tp_salinDataKeWA() {
    if (TP_HASIL_FILTER.length === 0) {
        Sultan.alert('warning', 'Tabel Kosong', 'Tidak ada data ASN yang bisa disalin.');
        return;
    }

    var bln = $('#tp_filterBulan').val();
    var thn = $('#tp_filterTahun').val();
    var fUnit = $('#tp_filterUnit').val();

    var txt = "*DAFTAR ASN BELUM PRESENSI SIABA BULAN " + String(bln).toUpperCase() + " " + thn + "*\n";

    // Fungsi perakit string Guru + Detail
    function formatBarisGuru(row) {
        var nama = String(row[0]).trim();
        var jumlah = String(row[2] || "-").trim();
        var tanggal = String(row[5] || "-").trim();
        return "- " + nama + ", Jumlah: " + jumlah + ", Tanggal: " + tanggal + "\n";
    }

    if (fUnit !== "SEMUA" && fUnit !== "") {
        txt += String(fUnit).toUpperCase() + "\n";
        TP_HASIL_FILTER.forEach(function(row) {
            txt += formatBarisGuru(row);
        });
    } else {
        var dataGroup = {};
        
        TP_HASIL_FILTER.forEach(function(row) {
            var unit = String(row[row.length - 1]).trim().toUpperCase();
            if (!dataGroup[unit]) { dataGroup[unit] = []; }
            dataGroup[unit].push(formatBarisGuru(row));
        });

        Object.keys(dataGroup).sort().forEach(function(unitKey) {
            txt += unitKey + "\n";
            dataGroup[unitKey].forEach(function(strBaris) {
                txt += strBaris;
            });
        });
    }

    txt += "\n_Mohon segera melengkapi presensi agar bisa dicetak rekap Siaba._";

    navigator.clipboard.writeText(txt).then(function() {
        Sultan.notif.sukses('Daftar berhasil disalin! Silakan paste (tempel) di Grup WhatsApp.');
    }).catch(function(err) {
        Sultan.alert('error', 'Gagal Menyalin', 'Browser Anda tidak mengizinkan akses ke Clipboard.');
    });
}

// =================================================================
// 6. HELPER UTILITIES: PEMBERSIH XSS
// =================================================================
function tp_escapeHtml(text) { 
    if(!text) return ""; 
    return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
}
</script>
