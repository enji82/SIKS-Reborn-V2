<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<div class="content-header pb-0">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-12">
        <h5 class="m-0 font-weight-bold">
          <i class="fas fa-tachometer-alt text-maroon mr-2"></i>Dashboard Laporan Bulan
        </h5>
        <div class="sultan-title-line"></div>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    
    <!-- 1. FILTER PERIODE (MODE ANTI-BLINK READY) -->
    <div class="row justify-content-center mb-4">
        <div class="col-12">
            <div class="card-sultan p-3 shadow-sm border-left-dark">
                <div class="d-flex-gap align-items-center justify-content-center flex-wrap">
                    <label class="mb-0 mr-2 font-weight-bold text-maroon"><i class="fas fa-calendar-alt mr-1"></i> PERIODE DATA:</label>
                    <select id="dashlapbul_dashTahun" class="form-control form-control-sultan input-auto-width font-weight-bold" style="min-width: 120px;" disabled></select>
                    <select id="dashlapbul_dashBulan" class="form-control form-control-sultan input-auto-width font-weight-bold text-dark" style="min-width: 150px;">
                        <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                        <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                        <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                    <button type="button" id="dashlapbul_btnTampilkan" class="btn btn-maroon shadow-sm ml-2 font-weight-bold px-4" disabled>
                        <i class="fas fa-sync-alt mr-1"></i> TAMPILKAN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. WADAH KONTEN (SKELETON BASE) -->
    <div id="dashlapbul_contentDash" class="row">
        
        <!-- KOLOM STATS (4 JENJANG) -->
        <div class="col-lg-3 col-6 mb-3 dashlapbul-stat-col" data-jenjang="sd">
            <!-- Skeleton or Real Content will be here -->
        </div>
        <div class="col-lg-3 col-6 mb-3 dashlapbul-stat-col" data-jenjang="tk">
            <!-- Skeleton or Real Content will be here -->
        </div>
        <div class="col-lg-3 col-6 mb-3 dashlapbul-stat-col" data-jenjang="kb">
            <!-- Skeleton or Real Content will be here -->
        </div>
        <div class="col-lg-3 col-6 mb-3 dashlapbul-stat-col" data-jenjang="sps">
            <!-- Skeleton or Real Content will be here -->
        </div>

        <!-- KOLOM BELUM LAPOR -->
        <div class="col-12 mt-2">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="font-weight-bold text-maroon m-0">
                    <i class="fas fa-exclamation-circle mr-2"></i>Daftar Sekolah Belum Lapor
                </h6>
                <button id="dashlapbul_btnCopyUtama" class="btn btn-sm btn-outline-danger shadow-sm font-weight-bold rounded-pill px-3" title="Salin Semua Data ke WhatsApp">
                    <i class="fas fa-copy mr-1"></i> Salin Semua (WA)
                </button>
            </div>
            
            <div class="row">
                <div class="col-lg-3 col-md-6 mb-3 dashlapbul-list-col" data-jenjang="sd"></div>
                <div class="col-lg-3 col-md-6 mb-3 dashlapbul-list-col" data-jenjang="tk"></div>
                <div class="col-lg-3 col-md-6 mb-3 dashlapbul-list-col" data-jenjang="kb"></div>
                <div class="col-lg-3 col-md-6 mb-3 dashlapbul-list-col" data-jenjang="sps"></div>
            </div>
        </div>

        <!-- KOLOM GRAFIK -->
        <div class="col-12 mt-2">
            <div class="row">
                <div class="col-lg-8 mb-3">
                    <div class="card-sultan h-100 shadow-sm border-0">
                        <div class="card-header border-0 pb-0">
                            <h6 class="card-title font-weight-bold text-navy"><i class="fas fa-chart-bar mr-2"></i>Komparasi Status Antar Jenjang</h6>
                        </div>
                        <div class="card-body p-4 pt-2">
                            <div id="dashlapbul_chartBarWrapper" style="height: 320px; width: 100%;">
                                <canvas id="dashlapbul_chartLapbul"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4 mb-3">
                    <div class="card-sultan h-100 shadow-sm border-0">
                        <div class="card-header border-0 pb-0">
                            <h6 class="card-title font-weight-bold text-navy"><i class="fas fa-chart-pie mr-2"></i>Proporsi Total</h6>
                        </div>
                        <div class="card-body p-4 pt-2">
                            <div id="dashlapbul_chartPieWrapper" style="height: 180px; position: relative;" class="mb-4">
                                <canvas id="dashlapbul_chartTotalStatus"></canvas>
                            </div>
                            <div id="dashlapbul_legendWrapper">
                                <table class="table table-sm table-borderless small mb-0">
                                    <tbody id="dashlapbul_tableSummary">
                                        <!-- Will be filled by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
  </div>
</section>

<!-- MODAL BELUM LAPOR -->
<div class="modal fade" id="dashlapbul_modalBelumLapor" tabindex="-1" role="dialog" data-backdrop="static">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content border-0 shadow-lg modal-content-sultan overflow-hidden">
            <div class="modal-header bg-maroon text-white py-3 border-0">
                <h5 class="modal-title font-weight-bold"><i class="fas fa-clipboard-list mr-2"></i>Daftar Sekolah Belum Lapor</h5>
                <button type="button" class="close text-white opacity-10" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body bg-light p-4">
                <div class="alert alert-warning mb-3 py-2 px-3 small shadow-sm border-0" style="border-radius: 12px; border-left: 4px solid #f6c23e !important;">
                    <i class="fas fa-info-circle mr-1"></i> Menampilkan data periode terpilih.
                </div>
                <div class="input-group mb-3 shadow-sm" style="border-radius: 12px; overflow: hidden;">
                    <div class="input-group-prepend"><span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-muted"></i></span></div>
                    <input type="text" class="form-control form-control-sultan border-left-0 font-weight-bold" id="dashlapbul_cariBelumModal" placeholder="Ketik nama sekolah untuk mencari cepat...">
                </div>
                
                <div class="bg-white border-0 rounded shadow-sm sultan-scroll" style="max-height: 400px; overflow-y: auto; border-radius: 16px !important;">
                    <table class="table table-sm table-hover table-striped mb-0 small">
                        <tbody id="dashlapbul_listBelumBodyModal"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer bg-white p-3 justify-content-between border-0">
                <button type="button" class="btn btn-light shadow-sm font-weight-bold px-4 rounded-pill" data-dismiss="modal">Tutup</button>
                <button type="button" class="btn btn-maroon font-weight-bold shadow-sm px-4 rounded-pill" id="dashlapbul_btnCopyModal">
                    <i class="fas fa-copy mr-1"></i> Salin Daftar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// ======================================================================
// ISOLASI VARIABEL GLOBAL & PENCEGAH RACE CONDITION SPA
// ======================================================================
var DASHLAPBUL_CHART_INSTANCE = null;
var DASHLAPBUL_CHART_TOTAL_INSTANCE = null; 

var DASHLAPBUL_DASH_DATA = {
    sd:  { ok:0, pro:0, rev:0, no:0, blm:0, total:0, sudah:0, persen:0 },
    tk:  { ok:0, pro:0, rev:0, no:0, blm:0, total:0, sudah:0, persen:0 },
    kb:  { ok:0, pro:0, rev:0, no:0, blm:0, total:0, sudah:0, persen:0 },
    sps: { ok:0, pro:0, rev:0, no:0, blm:0, total:0, sudah:0, persen:0 }
};

var DASHLAPBUL_GLOBAL_BELUM_LAPOR = { sd: [], tk: [], kb: [], sps: [] };
var dashlapbul_isFetching = false;

// =================================================================
// 1. INITIALIZATION (ANTI-BLINK READY)
// =================================================================
$(document).ready(function() {
    if ($('#dashlapbul_dashTahun').data('spa-init')) return;
    $('#dashlapbul_dashTahun').data('spa-init', true);

    // 1. LOGIKA TANGGAL: DEFAULT BULAN LALU (VAKSIN OVERFLOW HARI)
    var d = new Date(); 
    d.setDate(1); 
    d.setMonth(d.getMonth() - 1); 
    var thn = d.getFullYear(); 
    var bln = d.getMonth() + 1; 

    // 2. POPULASI FILTER TAHUN
    var currentRealYear = new Date().getFullYear();
    var $sel = $('#dashlapbul_dashTahun').empty();
    for(var i = currentRealYear + 1; i >= currentRealYear - 4; i--) { 
        var selectedStr = (i === thn) ? ' selected' : '';
        $sel.append('<option value="' + i + '"' + selectedStr + '>' + i + '</option>'); 
    }
    $('#dashlapbul_dashTahun').prop('disabled', false);
    $('#dashlapbul_dashBulan').val(bln);

    // VAKSIN EVENT DELEGATION
    $(document).off('click', '#dashlapbul_btnTampilkan').on('click', '#dashlapbul_btnTampilkan', dashlapbul_loadDashboard);
    $(document).off('click', '#dashlapbul_btnCopyUtama').on('click', '#dashlapbul_btnCopyUtama', dashlapbul_copySemuaBelumLapor);
    $(document).off('click', '#dashlapbul_btnCopyModal').on('click', '#dashlapbul_btnCopyModal', dashlapbul_copySemuaBelumLapor);
    $(document).off('keyup', '#dashlapbul_cariBelumModal').on('keyup', '#dashlapbul_cariBelumModal', dashlapbul_filterBelumModal);

    // Anti-Blink: Render Skeletons first
    dashlapbul_renderSkeleton();
    dashlapbul_initChart(); 
    
    $('#dashlapbul_btnTampilkan').prop('disabled', false);
    setTimeout(function() { dashlapbul_loadDashboard(); }, 100);
});

// ======================================================================
// 2. MODE TURBO: UNIFIED DATA FETCHING
// ======================================================================
function dashlapbul_loadDashboard() {
    if (dashlapbul_isFetching) return;
    dashlapbul_isFetching = true;
    
    $('#dashlapbul_btnTampilkan').prop('disabled', true).html('<i class="fas fa-sync-alt fa-spin mr-1"></i> MEMPROSES');
    
    // Inisiasi Skeleton State
    dashlapbul_renderSkeleton();
    
    var t = $('#dashlapbul_dashTahun').val();
    var b = $('#dashlapbul_dashBulan').val();

    google.script.run
        .withSuccessHandler(function(json) {
            dashlapbul_isFetching = false;
            $('#dashlapbul_btnTampilkan').prop('disabled', false).html('<i class="fas fa-sync-alt mr-1"></i> TAMPILKAN');
            
            var res = JSON.parse(json);
            if (res.error) {
                Sultan.alert('error', 'Gagal Muat Data', res.error);
                return;
            }

            // Sync Data Store
            dashlapbul_processResponse(res);
            
            // Render UI Components
            dashlapbul_renderStatsCards();
            dashlapbul_renderAllLists();
            dashlapbul_updateChartsData();
        })
        .withFailureHandler(function(e) {
            dashlapbul_isFetching = false;
            $('#dashlapbul_btnTampilkan').prop('disabled', false).html('<i class="fas fa-sync-alt mr-1"></i> TAMPILKAN');
            Sultan.alert('error', 'Koneksi Terputus', e.message);
        })
        .getLapbulMetric_Unified(t, b);
}

function dashlapbul_processResponse(res) {
    var jens = ['sd', 'tk', 'kb', 'sps'];
    jens.forEach(function(j) {
        var s = res[j] || { ok:0, pro:0, rev:0, no:0, blm:0, total:0, sudah:0, persen:0 };
        DASHLAPBUL_DASH_DATA[j] = {
            ok: s.disetujui || 0,
            pro: s.diproses || 0,
            rev: s.revisi || 0,
            no: s.ditolak || 0,
            blm: s.belum || 0,
            total: s.total || 0,
            sudah: s.sudah || 0,
            persen: s.persen || 0
        };
        DASHLAPBUL_GLOBAL_BELUM_LAPOR[j] = s.listBelum || [];
    });
}

// ======================================================================
// 3. UI RENDERING (SKELETON & REAL COMPONENTS)
// ======================================================================
function dashlapbul_renderSkeleton() {
    // Render Statistics Skeletons
    var statTitles = { sd: 'JENJANG SD', tk: 'JENJANG TK', kb: 'JENJANG KB', sps: 'JENJANG SPS' };
    var statIcons = { sd: 'fa-school', tk: 'fa-child', kb: 'fa-shapes', sps: 'fa-home' };
    var statColors = { sd: 'info', tk: 'warning', kb: 'success', sps: 'primary' };

    $('.dashlapbul-stat-col').each(function() {
        var j = $(this).data('jenjang');
        var html = `
            <div class="card-sultan border-left-${statColors[j]} h-100 shadow-sm transition-all overflow-hidden">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <small class="font-weight-bold text-${statColors[j]}">${statTitles[j]}</small>
                        <i class="fas ${statIcons[j]} text-gray-200"></i>
                    </div>
                    <div class="sultan-skeleton mb-2" style="height: 32px; width: 60px;"></div>
                    <div class="progress mb-2" style="height: 6px; background: #f1f5f9;"><div class="sultan-skeleton-pulse w-100 h-100"></div></div>
                    <div class="d-flex justify-content-between">
                        <div class="sultan-skeleton" style="height:12px; width:45px;"></div>
                        <div class="sultan-skeleton" style="height:12px; width:45px;"></div>
                    </div>
                </div>
            </div>`;
        $(this).html(html);
    });

    // Render List Skeletons
    $('.dashlapbul-list-col').each(function() {
        var j = $(this).data('jenjang').toUpperCase();
        var html = `
            <div class="card-sultan h-100 border-top-light shadow-sm">
                <div class="card-header bg-light border-0 py-2 d-flex justify-content-between">
                    <span class="small font-weight-bold opacity-75">${j} Belum Lapor</span>
                    <div class="sultan-skeleton" style="width:20px; height:18px;"></div>
                </div>
                <div class="card-body p-3">
                    <div class="sultan-skeleton mb-2 w-100" style="height:14px;"></div>
                    <div class="sultan-skeleton mb-2 w-75" style="height:14px;"></div>
                    <div class="sultan-skeleton mb-0 w-85" style="height:14px;"></div>
                </div>
            </div>`;
        $(this).html(html);
    });
}

function dashlapbul_renderStatsCards() {
    var statTitles = { sd: 'JENJANG SD', tk: 'JENJANG TK', kb: 'JENJANG KB', sps: 'JENJANG SPS' };
    var statIcons = { sd: 'fa-school', tk: 'fa-child', kb: 'fa-shapes', sps: 'fa-home' };
    var statColors = { sd: 'info', tk: 'warning', kb: 'success', sps: 'primary' };
    
    // Warna Background Soft (Light Palette)
    var bgColors = { 
        sd: 'rgba(23, 162, 184, 0.08)',    // Info Soft
        tk: 'rgba(255, 193, 7, 0.08)',     // Warning Soft
        kb: 'rgba(40, 167, 69, 0.08)',    // Success Soft
        sps: 'rgba(0, 175, 239, 0.08)'    // Primary/Blue Soft
    };

    $('.dashlapbul-stat-col').each(function() {
        var j = $(this).data('jenjang');
        var d = DASHLAPBUL_DASH_DATA[j];
        var html = `
            <div class="card-sultan border-left-${statColors[j]} h-100 shadow-sm premium-hover cursor-pointer" 
                 onclick="dashlapbul_bukaModalList('${j}')" 
                 style="background-color: ${bgColors[j]} !important;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <small class="font-weight-bold text-${statColors[j]}" style="letter-spacing: 0.5px;">${statTitles[j]}</small>
                        <i class="fas ${statIcons[j]} text-${statColors[j]} opacity-50 fa-lg"></i>
                    </div>
                    <div class="d-flex align-items-baseline">
                        <h3 class="font-weight-bold text-navy mb-1" id="dashlapbul_count_${j}">${d.persen}%</h3>
                    </div>
                    <div class="progress mb-2" style="height: 6px; background: rgba(0,0,0,0.05); border-radius: 10px;">
                        <div class="progress-bar bg-${statColors[j]} progress-bar-striped progress-bar-animated" style="width: ${d.persen}%"></div>
                    </div>
                    <div class="d-flex justify-content-between small text-muted">
                        <span>Lapor: <b class="text-dark">${d.sudah}</b></span>
                        <span>Total: <b>${d.total}</b></span>
                    </div>
                </div>
            </div>`;
        $(this).html(html);
        dashlapbul_animateCounter(`dashlapbul_count_${j}`, 0, d.persen, "%");
    });
}

function dashlapbul_renderAllLists() {
    var statColors = { sd: 'info', tk: 'warning', kb: 'success', sps: 'primary' };
    $('.dashlapbul-list-col').each(function() {
        var j = $(this).data('jenjang');
        var list = DASHLAPBUL_GLOBAL_BELUM_LAPOR[j];
        var jUpper = j.toUpperCase();
        
        var ulHtml = "";
        if (list.length === 0) {
            ulHtml = `<div class="text-center py-4 text-success opacity-75"><i class="fas fa-check-circle fa-2x mb-1"></i><br><small class="font-weight-bold">Sempurna!</small></div>`;
        } else {
            ulHtml = `<ul class="list-group list-group-flush sultan-scroll" style="max-height: 200px; overflow-y: auto;">`;
            list.forEach(function(nama, i) {
                if(i < 5) ulHtml += `<li class="list-group-item py-2 px-1 border-0 small text-truncate"><i class="fas fa-angle-right text-gray-300 mr-1"></i> ${nama}</li>`;
            });
            if (list.length > 5) ulHtml += `<li class="list-group-item py-2 px-1 border-0 text-center"><small class="text-maroon font-weight-bold cursor-pointer" onclick="dashlapbul_bukaModalList('${j}')">+ ${list.length - 5} lainnya...</small></li>`;
            ulHtml += `</ul>`;
        }

        var html = `
            <div class="card-sultan h-100 border-top-${statColors[j]} shadow-sm">
                <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
                    <span class="small font-weight-bold text-navy">${jUpper} Belum Lapor</span>
                    <span class="badge badge-${statColors[j]} rounded-pill">${list.length}</span>
                </div>
                <div class="card-body p-2 mt-1">
                    ${ulHtml}
                </div>
            </div>`;
        $(this).html(html);
    });
}

// ======================================================================
// 4. CHART.JS ELITE CONFIGURATION
// ======================================================================
function dashlapbul_initChart() {
    var ctxBar = document.getElementById('dashlapbul_chartLapbul').getContext('2d');
    DASHLAPBUL_CHART_INSTANCE = new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['SD', 'TK', 'KB', 'SPS'],
            datasets: [
                { label: 'Disetujui', backgroundColor: '#059669', data: [0,0,0,0], borderRadius: 4 },
                { label: 'Diproses', backgroundColor: '#00AFEF', data: [0,0,0,0], borderRadius: 4 },
                { label: 'Revisi', backgroundColor: '#EAC947', data: [0,0,0,0], borderRadius: 4 },
                { label: 'Ditolak', backgroundColor: '#D0412E', data: [0,0,0,0], borderRadius: 4 },
                { label: 'Belum Lapor', backgroundColor: '#94A3B8', data: [0,0,0,0], borderRadius: 4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
                legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 11, family: 'Poppins' } } },
                tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 12, cornerRadius: 10 }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { family: 'Poppins', weight: '600' } } },
                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { stepSize: 10 } }
            }
        }
    });

    var ctxPie = document.getElementById('dashlapbul_chartTotalStatus').getContext('2d');
    DASHLAPBUL_CHART_TOTAL_INSTANCE = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: ['Disetujui', 'Diproses', 'Revisi', 'Ditolak', 'Belum Lapor'],
            datasets: [{
                data: [1, 0, 0, 0, 0], 
                backgroundColor: ['#f1f5f9', '#00AFEF', '#EAC947', '#D0412E', '#94A3B8'],
                borderWidth: 0, hoverOffset: 12, cutout: '75%'
            }]
        },
        options: {
            maintainAspectRatio: false, responsive: true,
            plugins: { legend: { display: false }, tooltip: { enabled: true } },
            animation: { animateScale: true, animateRotate: true }
        }
    });
}

function dashlapbul_updateChartsData() {
    if(!DASHLAPBUL_CHART_INSTANCE) return;
    var d = DASHLAPBUL_DASH_DATA;
    
    // Bar Chart
    DASHLAPBUL_CHART_INSTANCE.data.datasets[0].data = [d.sd.ok, d.tk.ok, d.kb.ok, d.sps.ok];
    DASHLAPBUL_CHART_INSTANCE.data.datasets[1].data = [d.sd.pro, d.tk.pro, d.kb.pro, d.sps.pro];
    DASHLAPBUL_CHART_INSTANCE.data.datasets[2].data = [d.sd.rev, d.tk.rev, d.kb.rev, d.sps.rev];
    DASHLAPBUL_CHART_INSTANCE.data.datasets[3].data = [d.sd.no, d.tk.no, d.kb.no, d.sps.no];
    DASHLAPBUL_CHART_INSTANCE.data.datasets[4].data = [d.sd.blm, d.tk.blm, d.kb.blm, d.sps.blm];
    DASHLAPBUL_CHART_INSTANCE.update();

    // Summary Table & Doughnut
    var tot = { ok:0, pro:0, rev:0, no:0, blm:0 };
    ['sd','tk','kb','sps'].forEach(function(j){
        tot.ok += d[j].ok; tot.pro += d[j].pro; tot.rev += d[j].rev; tot.no += d[j].no; tot.blm += d[j].blm;
    });

    var totalSum = tot.ok + tot.pro + tot.rev + tot.no + tot.blm;
    var pieData = totalSum === 0 ? [1,0,0,0,0] : [tot.ok, tot.pro, tot.rev, tot.no, tot.blm];
    var pieColors = totalSum === 0 ? ['#f1f5f9'] : ['#059669', '#00AFEF', '#EAC947', '#D0412E', '#94A3B8'];
    
    DASHLAPBUL_CHART_TOTAL_INSTANCE.data.datasets[0].data = pieData;
    DASHLAPBUL_CHART_TOTAL_INSTANCE.data.datasets[0].backgroundColor = pieColors;
    DASHLAPBUL_CHART_TOTAL_INSTANCE.update();

    $('#dashlapbul_tableSummary').html(`
        <tr><td><i class="fas fa-circle mr-2" style="color:#059669"></i> Disetujui</td><td class="text-right font-weight-bold text-navy">${tot.ok}</td></tr>
        <tr><td><i class="fas fa-circle mr-2" style="color:#00AFEF"></i> Diproses</td><td class="text-right font-weight-bold text-navy">${tot.pro}</td></tr>

}

function dashlapbul_bukaModalList(j) {
    var list = DASHLAPBUL_GLOBAL_BELUM_LAPOR[j];
    var tbody = $('#dashlapbul_listBelumBodyModal').empty();
    if(list.length === 0) {
        tbody.append('<tr><td class="text-center py-4 text-success font-weight-bold">Semua sekolah sudah lapor!</td></tr>');
    } else {
        list.forEach(function(nama, i) {
            tbody.append(`<tr><td class="px-3 py-2 font-weight-bold text-dark"><span class="badge badge-light border mr-2">${i+1}</span> ${nama}</td></tr>`);
        });
    }
    $('#dashlapbul_modalBelumLapor').modal('show');
}

function dashlapbul_animateCounter(id, start, end, suffix) {
    var obj = document.getElementById(id);
    if(!obj) return;
    
    // VAKSIN: Jika start == end, langsung set dan keluar
    if (start == end) {
        obj.innerText = end + (suffix || "");
        return;
    }

    var current = start;
    var range = end - start;
    var increment = end > start ? 1 : -1;
    var stepTime = Math.abs(Math.floor(800 / range));
    if(stepTime < 10) stepTime = 10;
    
    var timer = setInterval(function() {
        current += increment;
        
        // VAKSIN: Cek apakah sudah terlampaui (mencegah loop tak hingga)
        if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
            current = end;
            obj.innerText = current + (suffix || "");
            clearInterval(timer);
        } else {
            obj.innerText = current + (suffix || "");
        }
    }, stepTime);
}

function dashlapbul_copySemuaBelumLapor() {
    var th = $('#dashlapbul_dashTahun').val();
    var blnText = $('#dashlapbul_dashBulan option:selected').text();
    var txt = `*DAFTAR SEKOLAH BELUM LAPOR BULANAN*\nPeriode: ${blnText} ${th}\n\n`;
    ['sd', 'tk', 'kb', 'sps'].forEach(function(j) {
        var list = DASHLAPBUL_GLOBAL_BELUM_LAPOR[j];
        txt += `*JENJANG ${j.toUpperCase()}:*\n`;
        if (list.length === 0) txt += `_Selesai_ ✅\n\n`;
        else {
            list.forEach((n, i) => { txt += `${i + 1}. ${n}\n`; });
            txt += `\n`;
        }
    });
    txt += `_Mohon segera mengirimkan laporan ke sistem SIKS-REBORN._`;
    navigator.clipboard.writeText(txt).then(() => Sultan.notif.sukses('Daftar berhasil disalin!'));
}

function dashlapbul_filterBelumModal() {
    var val = $('#dashlapbul_cariBelumModal').val().toLowerCase();
    $("#dashlapbul_listBelumBodyModal tr").filter(function() { 
        $(this).toggle($(this).text().toLowerCase().indexOf(val) > -1) 
    });
}
